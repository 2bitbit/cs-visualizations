<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 交互式可视化 · Interactive CS Visualizations</title>
    <meta name="description" content="50 个交互式浏览器演示，覆盖大学计算机科学核心概念。算法、体系结构、网络、安全。">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

        :root {
            --bg: #22272e;
            --surface: #2d333b;
            --border: #444c56;
            --text: #adbac7;
            --text-heading: #cdd9e5;
            --muted: #768390;
            --accent: #539bf5;
            --green: #57ab5a;
            --purple: #986ee2;
            --item-bg: transparent;
            --item-hover: #2d333b;
            --item-border: transparent;
            --item-hover-border: #444c56;
            --tab-bg: transparent;
            --tab-active-bg: #2d333b;
            --tab-active-border: #444c56;
            --input-bg: #2d333b;
            --hero-border: #373e47;
            --shadow: none;
            --toggle-icon: '☀';
        }

        .light {
            --bg: #faf8f5;
            --surface: #ffffff;
            --border: #e6e2dd;
            --text: #3d3929;
            --text-heading: #1a1814;
            --muted: #78756e;
            --accent: #d97706;
            --green: #1b7f3b;
            --purple: #7c3aed;
            --item-bg: #ffffff;
            --item-hover: #faf8f5;
            --item-border: #ede9e3;
            --item-hover-border: #d97706;
            --tab-bg: transparent;
            --tab-active-bg: #ffffff;
            --tab-active-border: #e6e2dd;
            --input-bg: #ffffff;
            --hero-border: #e6e2dd;
            --shadow: 0 1px 3px rgba(0,0,0,0.04);
            --toggle-icon: '☾';
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* Hero */
        .hero {
            padding: 4rem 0 2rem;
            border-bottom: 1px solid var(--hero-border);
            text-align: center;
            position: relative;
        }
        .hero h1 {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--text-heading);
        }
        .hero p {
            color: var(--muted);
            font-size: 1rem;
            margin-top: 0.5rem;
            max-width: 520px;
            margin-left: auto; margin-right: auto;
        }
        .hero .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1rem;
            font-size: 0.875rem;
            color: var(--muted);
        }
        .hero .stats strong { color: var(--text-heading); font-weight: 600; }

        /* Theme toggle */
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 2rem;
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
            line-height: 1;
        }
        .theme-toggle:hover { border-color: var(--accent); }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.25rem;
            margin: 2rem 0 1.5rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.45rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            background: var(--tab-bg);
            color: var(--muted);
            border: 1px solid transparent;
            user-select: none;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--text-heading); background: var(--tab-active-bg); border-color: var(--tab-active-border); }

        /* Search */
        .search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .search-rel { position: relative; width: 100%; max-width: 480px; }
        .search-input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--accent); }
        .search-input::placeholder { color: var(--muted); }
        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.625rem;
        }
        .item {
            display: flex;
            align-items: flex-start;
            gap: 0.625rem;
            padding: 0.7rem 0.85rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text);
            font-size: 0.875rem;
            border: 1px solid var(--item-border);
            background: var(--item-bg);
            box-shadow: var(--shadow);
            line-height: 1.4;
        }
        .item:hover {
            background: var(--item-hover);
            border-color: var(--item-hover-border);
            color: var(--text-heading);
        }
        .item .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 0.45em;
        }
        .dot-algo { background: var(--green); }
        .dot-arch { background: var(--accent); }
        .dot-net { background: var(--purple); }
        .item .name { flex: 1; }
        .item .tag {
            font-size: 0.7rem;
            padding: 0.12rem 0.4rem;
            border-radius: 4px;
            font-weight: 500;
            flex-shrink: 0;
            white-space: nowrap;
            margin-top: 0.15em;
        }
        .tag-algo { background: rgba(74,222,128,0.12); color: var(--green); }
        .tag-arch { background: rgba(96,165,250,0.12); color: var(--accent); }
        .tag-net { background: rgba(192,132,252,0.12); color: var(--purple); }
        .light .tag-algo { background: rgba(27,127,59,0.08); }
        .light .tag-arch { background: rgba(217,119,6,0.08); }
        .light .tag-net { background: rgba(124,58,237,0.08); }

        .empty {
            text-align: center;
            padding: 3rem 0;
            color: var(--muted);
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            padding: 3rem 0 2rem;
            color: var(--muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--hero-border);
            margin-top: 3rem;
        }
        footer a { color: var(--muted); text-decoration: none; }
        footer a:hover { color: var(--text); }

        @media (max-width: 640px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.75rem; }
            .grid { grid-template-columns: 1fr; }
            .theme-toggle { top: 1rem; right: 1rem; }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <button class="theme-toggle" id="themeBtn" aria-label="切换主题"></button>
            <h1>CS 交互式可视化合集</h1>
            <p>覆盖算法、体系结构、网络与安全的交互式演示。每一步可追溯，每一帧可推演。</p>
            <div class="stats">
                <span><strong>64</strong> 可视化</span>
                <span><strong>3</strong> 领域</span>
                <span><strong>0</strong> 依赖</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="tabs">
            <div class="tab active" data-cat="all">全部</div>
            <div class="tab" data-cat="algo">算法设计</div>
            <div class="tab" data-cat="arch">体系结构</div>
            <div class="tab" data-cat="net">网络与安全</div>
        </div>

        <div class="search-wrap">
            <div class="search-rel">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="search-input" id="search" type="text" placeholder="搜索可视化...">
            </div>
        </div>

        <div class="grid" id="grid"></div>
        <div class="empty" id="empty" style="display:none">没有匹配的可视化</div>
    </main>

    <footer>
        <div class="container">
            <p><a href="https://github.com/2bitbit/cs-visualizations">GitHub</a> · <a href="https://github.com/2bitbit">2bitbit</a> × <a href="https://github.com/nousresearch/hermes-agent">Hermes Agent</a></p>
        </div>
    </footer>

    <script>
        const items = [
            { n: "单纯形法动态可视化", f: "单纯形法动态可视化.html", cat: "algo", tag: "单纯形法" },
            { n: "单纯形法双空间映射揭秘", f: "单纯形法双空间映射揭秘.html", cat: "algo", tag: "单纯形法" },
            { n: "0-1 背包：优先队列分支限界法", f: "分支限界法下的0-1背包问题.html", cat: "algo", tag: "分支限界" },
            { n: "TSP 分支限界法可视化", f: "分支限界法下的TSP问题.html", cat: "algo", tag: "分支限界" },
            { n: "TSP 回溯算法可视化", f: "TSP问题.html", cat: "algo", tag: "回溯" },
            { n: "快速排序 (Quick Sort)", f: "快速排序.html", cat: "algo", tag: "排序" },
            { n: "最近点对问题 — 分治法", f: "最近点对问题.html", cat: "algo", tag: "分治法" },
            { n: "Karatsuba 大整数乘法", f: "大整数乘法.html", cat: "algo", tag: "分治法" },
            { n: "循环赛日程表 — 分治法", f: "循环赛日程表.html", cat: "algo", tag: "分治法" },
            { n: "棋盘覆盖分治算法", f: "棋盘覆盖.html", cat: "algo", tag: "分治法" },
            { n: "棋盘覆盖（含障碍）方案计数", f: "有障碍的棋盘覆盖求方案个数的问题.html", cat: "algo", tag: "DP" },
            { n: "BFPRT 线性时间选择", f: "线性时间选择中位数的中位数.html", cat: "algo", tag: "选择" },
            { n: "最大子段和 — DP", f: "最大子段和.html", cat: "algo", tag: "DP" },
            { n: "最长公共子序列 (LCS)", f: "最长公共子序列LCS.html", cat: "algo", tag: "DP" },
            { n: "哈夫曼编码 — 贪心", f: "哈夫曼编码.html", cat: "algo", tag: "贪心" },
            { n: "活动安排问题 — 贪心", f: "活动安排问题.html", cat: "algo", tag: "贪心" },
            { n: "区间覆盖问题 — 贪心", f: "区间覆盖问题.html", cat: "algo", tag: "贪心" },
            { n: "最小生成树 Kruskal & Prim", f: "最小生成树.html", cat: "algo", tag: "图论" },
            { n: "矩阵连乘 — DP", f: "矩阵连乘.html", cat: "algo", tag: "DP" },
            { n: "凸多边形最优三角剖分 — DP", f: "凸多边形最优三角剖分.html", cat: "algo", tag: "DP" },
            { n: "三角剖分与矩阵连乘同构", f: "矩阵连乘与三角剖分同构可视化.html", cat: "algo", tag: "DP" },
            { n: "最优二叉搜索树 (OBST)", f: "最优二叉搜索树.html", cat: "algo", tag: "DP" },
            { n: "多边形游戏 — 环形DP", f: "多边形游戏.html", cat: "algo", tag: "DP" },
            { n: "图像压缩 — DP", f: "图像压缩.html", cat: "algo", tag: "DP" },
            { n: "分硬币最小化差值 — DP", f: "分硬币最小化差值问题.html", cat: "algo", tag: "DP" },
            { n: "N 后问题 — 回溯", f: "n后问题.html", cat: "algo", tag: "回溯" },
            { n: "最大团问题 — 回溯", f: "最大团问题.html", cat: "algo", tag: "回溯" },
            { n: "符号三角形 — 回溯", f: "符号三角形.html", cat: "algo", tag: "回溯" },
            { n: "图的 m 着色问题", f: "图的m着色问题.html", cat: "algo", tag: "回溯" },
            { n: "装载问题 — 回溯", f: "能不能装下的问题.html", cat: "algo", tag: "回溯" },
            { n: "矩阵乘法 6 种视角与 Cache 优化", f: "矩阵乘法哪种遍历方案对缓存最友好.html", cat: "arch", tag: "Cache" },
            { n: "内存映射与缺页中断全流程", f: "内存映射的整个流程.html", cat: "arch", tag: "OS" },
            { n: "CSAPP 链接机制全景演示", f: "CSAPP静态链接可视化.html", cat: "arch", tag: "链接" },
            { n: "ELF PLT/GOT 延迟绑定", f: "ELF_PLT_GOT动态链接原理.html", cat: "arch", tag: "链接" },
            { n: "x86 栈帧 (32-bit cdecl)", f: "x86_cdecl_32位栈帧可视化.html", cat: "arch", tag: "栈帧" },
            { n: "System V AMD64 栈帧 — Linux", f: "SystemV_AMD64_ABI栈帧与红区分析.html", cat: "arch", tag: "栈帧" },
            { n: "Windows x64 栈帧", f: "Windows_x64_ABI栈帧分析.html", cat: "arch", tag: "栈帧" },
            { n: "VIPT/PIPT/TLB 缓存架构", f: "VIPT_PIPT硬件缓存架构并行流转.html", cat: "arch", tag: "Cache" },
            { n: "华莱士树乘法器", f: "Wallace树.html", cat: "arch", tag: "ALU" },
            { n: "模型机 — 从零手搓CPU", f: "index.html", cat: "arch", tag: "CPU" },
            { n: "脉动阵列 Systolic Array GEMM", f: "脉动阵列.html", cat: "arch", tag: "NPU" },
            { n: "MESI 缓存一致性协议", f: "缓存一致性与MESI协议.html", cat: "arch", tag: "Cache" },
            { n: "跨缓存行边界读取与对齐", f: "跨缓存行边界读取通过对齐解决性能损耗问题.html", cat: "arch", tag: "Cache" },
            { n: "Cache 相联度可视化引擎", f: "组相联全相联高组相联.html", cat: "arch", tag: "Cache" },
            { n: "Cache 寻址可视化", f: "一题讲清缓存定位.html", cat: "arch", tag: "Cache" },
            { n: "CPU 流水线与循环展开深度解析", f: "循环展开所有章节的一个综合应用.html", cat: "arch", tag: "流水线" },
            { n: "BLIS 架构：GEMM Pack 策略", f: "HPC_BLIS原理.html", cat: "arch", tag: "HPC" },
            { n: "BLIS 架构：HPC 内存层级", f: "矩阵计算的一些trick.html", cat: "arch", tag: "HPC" },
            { n: "IP 路由与 NAT 转换可视化", f: "NAT和桥接.html", cat: "net", tag: "网络" },
            { n: "栈溢出与 ROP 栈对齐攻击", f: "Ret2Text 栈溢出缓冲区溢出劫持.html", cat: "net", tag: "安全" },
            { n: "0-1 背包问题", f: "0-1背包.html", cat: "algo", tag: "DP" },
            { n: "动态链接与延迟绑定 PLT/GOT", f: "CSAPP动态链接与延迟绑定可视化.html", cat: "arch", tag: "链接" },
            { n: "GPU CUDA 层次可视化", f: "CUDA层次可视化.html", cat: "arch", tag: "GPU" },
            { n: "CPU 流水线与数据冒险", f: "优化程序性能一.html", cat: "arch", tag: "流水线" },
            { n: "VIPT vs PIPT 缓存架构对比", f: "VIPT_vs_PIPT架构级对比.html", cat: "arch", tag: "Cache" },
            { n: "局域网/子网/网卡基础概念", f: "公网局域网网卡子网一文分清.html", cat: "net", tag: "网络" },
            { n: "最大团问题 — 分支限界法", f: "分支限界法下的最大团问题.html", cat: "algo", tag: "分支限界" },
            { n: "最小权顶点覆盖 — 分支限界法", f: "分支限界法下的最小权顶点覆盖问题.html", cat: "algo", tag: "分支限界" },
            { n: "批处理作业调度 — 分支限界法", f: "分支限界法解决流水作业调度问题M2完成时间和.html", cat: "algo", tag: "分支限界" },
            { n: "无分隔符字典问题 — DP", f: "动态规划解决无分隔符字典问题.html", cat: "algo", tag: "DP" },
            { n: "最优批处理问题 — DP", f: "最优批处理问题.html", cat: "algo", tag: "DP" },
            { n: "最大装载量问题 — 回溯", f: "最大装载量问题.html", cat: "algo", tag: "回溯" },
            { n: "流水作业调度问题 — 贪心", f: "流水作业调度问题两台机器总时间.html", cat: "algo", tag: "贪心" },
            { n: "无分隔符字典问题 — 记忆化搜索", f: "记忆化搜索解决无分隔符字典问题.html", cat: "algo", tag: "搜索" },
        ];

        const grid = document.getElementById('grid');
        const empty = document.getElementById('empty');
        const search = document.getElementById('search');
        let activeCat = 'all';

        function dotClass(cat) { return cat === 'algo' ? 'dot-algo' : cat === 'arch' ? 'dot-arch' : 'dot-net'; }
        function tagClass(cat) { return cat === 'algo' ? 'tag-algo' : cat === 'arch' ? 'tag-arch' : 'tag-net'; }

        function render() {
            const q = search.value.toLowerCase().trim();
            const filtered = items.filter(i => {
                if (activeCat !== 'all' && i.cat !== activeCat) return false;
                if (q && !i.n.toLowerCase().includes(q) && !i.tag.toLowerCase().includes(q)) return false;
                return true;
            });
            if (filtered.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
            empty.style.display = 'none';
            grid.innerHTML = filtered.map(i =>
                `<a href="visualizations/${i.f}" class="item">
                    <span class="dot ${dotClass(i.cat)}"></span>
                    <span class="name">${i.n}</span>
                    <span class="tag ${tagClass(i.cat)}">${i.tag}</span>
                </a>`
            ).join('');
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeCat = tab.dataset.cat;
                render();
            });
        });
        search.addEventListener('input', render);
        render();

        // Theme toggle
        const themeBtn = document.getElementById('themeBtn');
        const html = document.documentElement;
        const saved = localStorage.getItem('theme');
        if (saved === 'light') html.classList.add('light');

        function updateIcon() {
            themeBtn.textContent = html.classList.contains('light') ? '☾' : '☀';
        }
        updateIcon();

        themeBtn.addEventListener('click', () => {
            html.classList.toggle('light');
            localStorage.setItem('theme', html.classList.contains('light') ? 'light' : 'dark');
            updateIcon();
        });
    </script>
</body>
</html>
