<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 交互式可视化 · Interactive CS Visualizations</title>
    <meta name="description" content="50 个交互式浏览器演示，覆盖大学计算机科学核心概念。算法、体系结构、网络、安全。">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
        :root {
            --bg: #080c14;
            --surface: #111827;
            --border: #1e293b;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #60a5fa;
            --green: #4ade80;
            --purple: #c084fc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }

        /* Hero */
        .hero {
            padding: 4rem 0 2rem;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: #fff;
        }
        .hero p {
            color: var(--muted);
            font-size: 1.05rem;
            margin-top: 0.5rem;
            max-width: 560px;
            margin-left: auto; margin-right: auto;
        }
        .hero .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: var(--muted);
        }
        .hero .stats strong { color: #fff; font-weight: 600; }

        /* Tabs */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.25rem;
            margin: 2rem 0 2.5rem;
            flex-wrap: wrap;
        }
        .tab {
            padding: 0.5rem 1.25rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            color: var(--muted);
            border: 1px solid transparent;
            user-select: none;
        }
        .tab:hover { color: #fff; background: rgba(255,255,255,0.04); }
        .tab.active { color: #fff; background: var(--surface); border-color: var(--border); }

        /* Search */
        .search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        .search-input {
            width: 100%;
            max-width: 480px;
            padding: 0.65rem 1rem 0.65rem 2.5rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-input:focus { border-color: #3b82f6; }
        .search-input::placeholder { color: #475569; }
        .search-icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            pointer-events: none;
        }
        .search-rel { position: relative; width: 100%; max-width: 480px; }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.5rem;
        }
        .item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 0.75rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            color: var(--text);
            font-size: 0.875rem;
            border: 1px solid transparent;
        }
        .item:hover {
            background: var(--surface);
            border-color: var(--border);
            color: #fff;
        }
        .item .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .dot-algo { background: var(--green); }
        .dot-arch { background: var(--accent); }
        .dot-net { background: var(--purple); }
        .item .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item .tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.45rem;
            border-radius: 4px;
            font-weight: 500;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .tag-algo { background: rgba(74,222,128,0.12); color: #4ade80; }
        .tag-arch { background: rgba(96,165,250,0.12); color: #60a5fa; }
        .tag-net { background: rgba(192,132,252,0.12); color: #c084fc; }

        .empty {
            text-align: center;
            padding: 3rem 0;
            color: var(--muted);
            grid-column: 1 / -1;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 3rem 0 2rem;
            color: #334155;
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }
        footer a { color: #475569; text-decoration: none; }
        footer a:hover { color: var(--muted); }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 0 1rem; }
            .hero h1 { font-size: 1.75rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>CS 交互式可视化合集</h1>
            <p>覆盖算法、体系结构、网络与安全的交互式演示。每一步可追溯，每一帧可推演。</p>
            <div class="stats">
                <span><strong>50</strong> 可视化</span>
                <span><strong>3</strong> 领域</span>
                <span><strong>0</strong> 依赖</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="tabs">
            <div class="tab active" data-cat="all">全部</div>
            <div class="tab" data-cat="algo">算法设计</div>
            <div class="tab" data-cat="arch">体系结构</div>
            <div class="tab" data-cat="net">网络与安全</div>
        </div>

        <div class="search-wrap">
            <div class="search-rel">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input class="search-input" id="search" type="text" placeholder="搜索可视化...">
            </div>
        </div>

        <div class="grid" id="grid"></div>
        <div class="empty" id="empty" style="display:none">没有匹配的可视化</div>
    </main>

    <footer>
        <div class="container">
            <p><a href="https://github.com/2bitbit/cs-visualizations">GitHub</a> · 由 <a href="https://github.com/2bitbit">2bitbit</a> 与 <a href="https://github.com/nousresearch/hermes-agent">Hermes Agent</a> 协作出品 · AI 辅助生成，逐帧审校</p>
        </div>
    </footer>

    <script>
        const items = [
            // Algorithms
            { n: "单纯形法动态可视化", f: "simplex-method.html", cat: "algo", tag: "单纯形法" },
            { n: "单纯形法双空间映射揭秘", f: "simplex-dual-space.html", cat: "algo", tag: "单纯形法" },
            { n: "0-1 背包：优先队列分支限界法", f: "branch-bound-01knapsack.html", cat: "algo", tag: "分支限界" },
            { n: "TSP 分支限界法可视化", f: "branch-bound-tsp.html", cat: "algo", tag: "分支限界" },
            { n: "TSP 回溯算法可视化", f: "tsp-backtracking.html", cat: "algo", tag: "回溯" },
            { n: "快速排序 (Quick Sort)", f: "quicksort.html", cat: "algo", tag: "排序" },
            { n: "最近点对问题 — 分治法", f: "closest-pair.html", cat: "algo", tag: "分治法" },
            { n: "Karatsuba 大整数乘法", f: "karatsuba.html", cat: "algo", tag: "分治法" },
            { n: "循环赛日程表 — 分治法", f: "round-robin.html", cat: "algo", tag: "分治法" },
            { n: "棋盘覆盖分治算法", f: "chessboard-cover.html", cat: "algo", tag: "分治法" },
            { n: "棋盘覆盖（含障碍）方案计数", f: "chessboard-obstacle.html", cat: "algo", tag: "DP" },
            { n: "BFPRT 线性时间选择", f: "bfprt-select.html", cat: "algo", tag: "选择" },
            { n: "最大子段和 — DP", f: "max-subarray.html", cat: "algo", tag: "DP" },
            { n: "最长公共子序列 (LCS)", f: "lcs.html", cat: "algo", tag: "DP" },
            { n: "哈夫曼编码 — 贪心", f: "huffman.html", cat: "algo", tag: "贪心" },
            { n: "活动安排问题 — 贪心", f: "activity-selection.html", cat: "algo", tag: "贪心" },
            { n: "区间覆盖问题 — 贪心", f: "interval-covering.html", cat: "algo", tag: "贪心" },
            { n: "最小生成树 Kruskal & Prim", f: "mst.html", cat: "algo", tag: "图论" },
            { n: "矩阵连乘 — DP", f: "matrix-chain.html", cat: "algo", tag: "DP" },
            { n: "凸多边形最优三角剖分", f: "convex-triangulation.html", cat: "algo", tag: "DP" },
            { n: "三角剖分与矩阵连乘同构", f: "triangulation-isomorphism.html", cat: "algo", tag: "DP" },
            { n: "最优二叉搜索树 (OBST)", f: "obst.html", cat: "algo", tag: "DP" },
            { n: "多边形游戏 — 环形DP", f: "polygon-game.html", cat: "algo", tag: "DP" },
            { n: "图像压缩 — DP", f: "image-compression.html", cat: "algo", tag: "DP" },
            { n: "分硬币最小化差值 — DP", f: "coin-partition.html", cat: "algo", tag: "DP" },
            { n: "N 后问题 — 回溯", f: "n-queens.html", cat: "algo", tag: "回溯" },
            { n: "最大团问题 — 回溯", f: "max-clique.html", cat: "algo", tag: "回溯" },
            { n: "符号三角形 — 回溯", f: "sign-triangle.html", cat: "algo", tag: "回溯" },
            { n: "图的 m 着色问题", f: "m-coloring.html", cat: "algo", tag: "回溯" },
            { n: "装载问题 — 回溯", f: "container-loading.html", cat: "algo", tag: "回溯" },
            // Architecture
            { n: "矩阵乘法 6 种视角与 Cache 优化", f: "matrix-cache.html", cat: "arch", tag: "Cache" },
            { n: "内存映射与缺页中断全流程", f: "memory-mapping.html", cat: "arch", tag: "OS" },
            { n: "CSAPP 链接机制全景演示", f: "linking.html", cat: "arch", tag: "链接" },
            { n: "ELF PLT/GOT 延迟绑定", f: "plt-got.html", cat: "arch", tag: "链接" },
            { n: "x86 栈帧 (32-bit cdecl)", f: "stack-x86.html", cat: "arch", tag: "栈帧" },
            { n: "System V AMD64 栈帧 — Linux", f: "stack-linux-x64.html", cat: "arch", tag: "栈帧" },
            { n: "Windows x64 栈帧", f: "stack-win64.html", cat: "arch", tag: "栈帧" },
            { n: "VIPT/PIPT/TLB 缓存架构", f: "cache-tlb.html", cat: "arch", tag: "Cache" },
            { n: "华莱士树乘法器", f: "wallace-tree.html", cat: "arch", tag: "ALU" },
            { n: "模型机 — 从零手搓CPU", f: "model-cpu.html", cat: "arch", tag: "CPU" },
            { n: "脉动阵列 Systolic Array GEMM", f: "systolic-array.html", cat: "arch", tag: "NPU" },
            { n: "MESI 缓存一致性协议", f: "cache-mesi.html", cat: "arch", tag: "Cache" },
            { n: "跨缓存行边界读取与对齐", f: "cache-line-boundary.html", cat: "arch", tag: "Cache" },
            { n: "Cache 相联度可视化引擎", f: "cache-associativity.html", cat: "arch", tag: "Cache" },
            { n: "Cache 寻址可视化", f: "cache-addressing.html", cat: "arch", tag: "Cache" },
            { n: "CPU 流水线与循环展开", f: "cpu-pipeline-unroll.html", cat: "arch", tag: "流水线" },
            { n: "BLIS 架构：GEMM Pack 策略", f: "blis-gemm-pack.html", cat: "arch", tag: "HPC" },
            { n: "BLIS 架构：HPC 内存层级", f: "blis-gemm-hpc.html", cat: "arch", tag: "HPC" },
            // Networking & Security
            { n: "IP 路由与 NAT 转换可视化", f: "nat-bridge.html", cat: "net", tag: "网络" },
            { n: "栈溢出与 ROP 栈对齐攻击", f: "rop-stack-overflow.html", cat: "net", tag: "安全" },
        ];

        const grid = document.getElementById('grid');
        const empty = document.getElementById('empty');
        const search = document.getElementById('search');
        let activeCat = 'all';

        function dotClass(cat) {
            if (cat === 'algo') return 'dot-algo';
            if (cat === 'arch') return 'dot-arch';
            return 'dot-net';
        }
        function tagClass(cat) {
            if (cat === 'algo') return 'tag-algo';
            if (cat === 'arch') return 'tag-arch';
            return 'tag-net';
        }

        function render() {
            const q = search.value.toLowerCase().trim();
            const filtered = items.filter(i => {
                if (activeCat !== 'all' && i.cat !== activeCat) return false;
                if (q && !i.n.toLowerCase().includes(q) && !i.tag.toLowerCase().includes(q)) return false;
                return true;
            });
            if (filtered.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';
            grid.innerHTML = filtered.map(i =>
                `<a href="visualizations/${i.f}" class="item">
                    <span class="dot ${dotClass(i.cat)}"></span>
                    <span class="name">${i.n}</span>
                    <span class="tag ${tagClass(i.cat)}">${i.tag}</span>
                </a>`
            ).join('');
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                activeCat = tab.dataset.cat;
                render();
            });
        });

        search.addEventListener('input', render);
        render();
    </script>
</body>
</html>
