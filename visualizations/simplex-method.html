<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单纯形法动态可视化 (Simplex Method)</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        /* Prevent layout shift by enforcing strict heights */
        .fixed-height-container { height: calc(100vh - 5rem); min-height: 600px; }
        .table-container { min-height: 280px; }
        .explanation-container { min-height: 180px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // We pre-calculate the states of the simplex method for the specific problem to ensure smooth, bug-free pedagogical flow.
        // Max Z = 3x1 + 5x2
        // Subj: x1 <= 4; 2x2 <= 12; 3x1 + 2x2 <= 18
        
        const stepsData = [
            {
                step: 0,
                title: "初始状态 (原点)",
                description: "一开始我们在原点 (0,0)，也就是什么都不生产。所有的约束等式都由'松弛变量'(s1, s2, s3)来填补。此时利润 Z = 0。因为目标函数中 x1 和 x2 的系数都是负的（在等式左边），说明增加它们可以增加利润。",
                point: {x: 0, y: 0},
                path: [{x: 0, y: 0}],
                pivotRow: null,
                pivotCol: null,
                tableau: [
                    ["基变量", "x1", "x2", "s1", "s2", "s3", "常数项(RHS)", "比值测试(Ratio)"],
                    ["s1", "1", "0", "1", "0", "0", "4", "-"],
                    ["s2", "0", "2", "0", "1", "0", "12", "-"],
                    ["s3", "3", "2", "0", "0", "1", "18", "-"],
                    ["Z", "-3", "-5", "0", "0", "0", "0", ""]
                ],
                zLine: 0
            },
            {
                step: 1,
                title: "第一步：选择换入变量与换出变量",
                description: "【寻找方向】：Z行中最负的数是 -5 (对应 x2)，说明多生产 x2 带来的利润提升最快。因此我们把 x2 选为换入变量（高亮列）。\n【寻找底线】：如果不限制，能生产多少 x2？看比值测试：s2行的限制最严格（12/2 = 6），超过 6 就会违背约束。所以选择 s2 作为换出变量（高亮行）。交叉点 '2' 就是主元。",
                point: {x: 0, y: 0},
                path: [{x: 0, y: 0}],
                pivotRow: 2, // Index in tableau (s2 row)
                pivotCol: 2, // Index in tableau (x2 col)
                tableau: [
                    ["基变量", "x1", "x2", "s1", "s2", "s3", "常数项(RHS)", "比值测试(Ratio)"],
                    ["s1", "1", "0", "1", "0", "0", "4", "4 / 0 = ∞"],
                    ["s2", "0", "2", "0", "1", "0", "12", "12 / 2 = 6 (最小)"],
                    ["s3", "3", "2", "0", "0", "1", "18", "18 / 2 = 9"],
                    ["Z", "-3", "-5", "0", "0", "0", "0", ""]
                ],
                zLine: 0
            },
            {
                step: 2,
                title: "第二步：完成第一次矩阵旋转 (移动到新顶点)",
                description: "通过行变换，我们将主元列除了主元外都变成了 0。在几何图上，我们沿着 y 轴爬到了顶点 (0, 6)。此时我们满负荷生产产品 x2（椅子 6 把），消耗完了 s2 的闲置量。当前总利润 Z = 30。Z 行还有负数 (-3)，说明还没到最高点，继续！",
                point: {x: 0, y: 6},
                path: [{x: 0, y: 0}, {x: 0, y: 6}],
                pivotRow: null,
                pivotCol: null,
                tableau: [
                    ["基变量", "x1", "x2", "s1", "s2", "s3", "常数项(RHS)", "比值测试(Ratio)"],
                    ["s1", "1", "0", "1", "0", "0", "4", "-"],
                    ["x2", "0", "1", "0", "0.5", "0", "6", "-"],
                    ["s3", "3", "0", "0", "-1", "1", "6", "-"],
                    ["Z", "-3", "0", "0", "2.5", "0", "30", ""]
                ],
                zLine: 30
            },
            {
                step: 3,
                title: "第三步：再次寻找提升方向",
                description: "【寻找方向】：Z行中最负的数现在是 -3 (对应 x1)，我们把 x1 选为新的换入变量（高亮列）。\n【寻找底线】：进行比值测试，s3行的限制最严格（6/3 = 2）。意味着在保持 x2 不超标的情况下，我们最多还能生产 2 单位的 x1。s3 成为换出变量，交叉点 '3' 是主元。",
                point: {x: 0, y: 6},
                path: [{x: 0, y: 0}, {x: 0, y: 6}],
                pivotRow: 3, // Index for s3 row
                pivotCol: 1, // Index for x1 col
                tableau: [
                    ["基变量", "x1", "x2", "s1", "s2", "s3", "常数项(RHS)", "比值测试(Ratio)"],
                    ["s1", "1", "0", "1", "0", "0", "4", "4 / 1 = 4"],
                    ["x2", "0", "1", "0", "0.5", "0", "6", "6 / 0 = ∞"],
                    ["s3", "3", "0", "0", "-1", "1", "6", "6 / 3 = 2 (最小)"],
                    ["Z", "-3", "0", "0", "2.5", "0", "30", ""]
                ],
                zLine: 30
            },
            {
                step: 4,
                title: "第四步：到达全局最优解！",
                description: "矩阵旋转完成！在几何上，我们走到了顶点 (2, 6)。此时观察最下面的 Z 行：所有的检验数都是正数或零 (0, 0, 0, 1.5, 1)。这意味着无论怎么调整生产计划，都不可能再增加利润了。\n我们找到了最终答案：生产 2 单位 x1，6 单位 x2，最大利润 Z = 36。",
                point: {x: 2, y: 6},
                path: [{x: 0, y: 0}, {x: 0, y: 6}, {x: 2, y: 6}],
                pivotRow: null,
                pivotCol: null,
                tableau: [
                    ["基变量", "x1", "x2", "s1", "s2", "s3", "常数项(RHS)", "比值测试(Ratio)"],
                    ["s1", "0", "0", "1", "1/3", "-1/3", "2", "-"],
                    ["x2", "0", "1", "0", "0.5", "0", "6", "-"],
                    ["x1", "1", "0", "0", "-1/3", "1/3", "2", "-"],
                    ["Z", "0", "0", "0", "1.5", "1", "36", ""]
                ],
                zLine: 36
            }
        ];

        const { useState, useEffect, useRef } = React;

        const CanvasGraph = ({ point, path, zLine }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const padding = 50;

                // Math domain mapping: X[0, 8], Y[0, 8]
                const maxVal = 8;
                const scaleX = (width - 2 * padding) / maxVal;
                const scaleY = (height - 2 * padding) / maxVal;

                const cx = (x) => padding + x * scaleX;
                const cy = (y) => height - padding - y * scaleY;

                // Clear canvas
                ctx.clearRect(0, 0, width, height);

                // Draw Grid
                ctx.strokeStyle = "#e2e8f0"; // slate-200
                ctx.lineWidth = 1;
                for (let i = 0; i <= maxVal; i++) {
                    ctx.beginPath(); ctx.moveTo(cx(i), cy(0)); ctx.lineTo(cx(i), cy(maxVal)); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx(0), cy(i)); ctx.lineTo(cx(maxVal), cy(i)); ctx.stroke();
                }

                // Draw Feasible Region (Polygon)
                // Vertices: (0,0), (4,0), (4,3), (2,6), (0,6)
                ctx.fillStyle = "rgba(167, 243, 208, 0.5)"; // emerald-200 with alpha
                ctx.beginPath();
                ctx.moveTo(cx(0), cy(0));
                ctx.lineTo(cx(4), cy(0));
                ctx.lineTo(cx(4), cy(3));
                ctx.lineTo(cx(2), cy(6));
                ctx.lineTo(cx(0), cy(6));
                ctx.closePath();
                ctx.fill();

                // Draw Constraints Lines
                ctx.lineWidth = 2;
                
                // x1 = 4
                ctx.strokeStyle = "#ef4444"; // red-500
                ctx.beginPath(); ctx.moveTo(cx(4), cy(0)); ctx.lineTo(cx(4), cy(maxVal)); ctx.stroke();
                
                // 2x2 = 12 -> x2 = 6
                ctx.strokeStyle = "#3b82f6"; // blue-500
                ctx.beginPath(); ctx.moveTo(cx(0), cy(6)); ctx.lineTo(cx(maxVal), cy(6)); ctx.stroke();
                
                // 3x1 + 2x2 = 18 -> y = 9 - 1.5x
                ctx.strokeStyle = "#eab308"; // yellow-500
                ctx.beginPath(); ctx.moveTo(cx(0), cy(9)); ctx.lineTo(cx(6), cy(0)); ctx.stroke();

                // Draw Axes
                ctx.strokeStyle = "#334155"; // slate-700
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(cx(0), cy(0)); ctx.lineTo(cx(maxVal+0.5), cy(0)); ctx.stroke(); // X
                ctx.beginPath(); ctx.moveTo(cx(0), cy(0)); ctx.lineTo(cx(0), cy(maxVal+0.5)); ctx.stroke(); // Y

                // Axis Labels
                ctx.fillStyle = "#334155";
                ctx.font = "14px sans-serif";
                ctx.fillText("x1 (桌子产量)", cx(maxVal) - 40, cy(0) + 20);
                ctx.fillText("x2 (椅子产量)", cx(0) - 40, cy(maxVal) - 10);
                for (let i = 1; i <= maxVal; i++) {
                    ctx.fillText(i, cx(i) - 4, cy(0) + 16);
                    ctx.fillText(i, cx(0) - 20, cy(i) + 4);
                }

                // Draw Z line (Objective Function: 3x1 + 5x2 = zLine)
                // x2 = (zLine - 3x1) / 5
                if (zLine > 0) {
                    ctx.strokeStyle = "#a855f7"; // purple-500
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]); // dashed
                    ctx.beginPath();
                    // point 1: x1 = 0
                    let y1 = zLine / 5;
                    // point 2: y2 = 0
                    let x2 = zLine / 3;
                    ctx.moveTo(cx(0), cy(y1));
                    ctx.lineTo(cx(x2), cy(0));
                    ctx.stroke();
                    ctx.setLineDash([]); // reset
                    ctx.fillStyle = "#a855f7";
                    ctx.fillText(`Z = ${zLine}`, cx(x2/2) + 10, cy(y1/2) + 10);
                }

                // Draw Path (Red arrows)
                ctx.strokeStyle = "#dc2626"; // red-600
                ctx.lineWidth = 3;
                if (path && path.length > 1) {
                    for (let i = 0; i < path.length - 1; i++) {
                        const start = path[i];
                        const end = path[i+1];
                        
                        // Draw line
                        ctx.beginPath();
                        ctx.moveTo(cx(start.x), cy(start.y));
                        ctx.lineTo(cx(end.x), cy(end.y));
                        ctx.stroke();

                        // Draw arrowhead
                        const angle = Math.atan2(cy(end.y) - cy(start.y), cx(end.x) - cx(start.x));
                        ctx.beginPath();
                        ctx.moveTo(cx(end.x), cy(end.y));
                        ctx.lineTo(cx(end.x) - 10 * Math.cos(angle - Math.PI / 6), cy(end.y) - 10 * Math.sin(angle - Math.PI / 6));
                        ctx.lineTo(cx(end.x) - 10 * Math.cos(angle + Math.PI / 6), cy(end.y) - 10 * Math.sin(angle + Math.PI / 6));
                        ctx.lineTo(cx(end.x), cy(end.y));
                        ctx.fillStyle = "#dc2626";
                        ctx.fill();
                    }
                }

                // Draw Current Point
                ctx.fillStyle = "#dc2626"; // red-600
                ctx.beginPath();
                ctx.arc(cx(point.x), cy(point.y), 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Point Label
                ctx.fillStyle = "#1e293b";
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(`(${point.x}, ${point.y})`, cx(point.x) + 12, cy(point.y) - 12);

                // Draw Legend
                ctx.font = "12px sans-serif";
                ctx.fillStyle = "#ef4444"; ctx.fillRect(width - 150, 20, 15, 15); ctx.fillStyle = "#333"; ctx.fillText("x1 ≤ 4", width - 125, 32);
                ctx.fillStyle = "#3b82f6"; ctx.fillRect(width - 150, 45, 15, 15); ctx.fillStyle = "#333"; ctx.fillText("2x2 ≤ 12", width - 125, 57);
                ctx.fillStyle = "#eab308"; ctx.fillRect(width - 150, 70, 15, 15); ctx.fillStyle = "#333"; ctx.fillText("3x1+2x2 ≤ 18", width - 125, 82);
                ctx.fillStyle = "rgba(167, 243, 208, 0.8)"; ctx.fillRect(width - 150, 95, 15, 15); ctx.fillStyle = "#333"; ctx.fillText("可行域(绿色)", width - 125, 107);

            }, [point, path, zLine]);

            return (
                <canvas 
                    ref={canvasRef} 
                    width={500} 
                    height={500} 
                    className="w-full h-full object-contain bg-white rounded-lg shadow-sm border border-slate-200"
                ></canvas>
            );
        };

        const SimplexTableau = ({ tableau, pivotRow, pivotCol }) => {
            return (
                <div className="w-full overflow-x-auto rounded-lg shadow-sm border border-slate-200">
                    <table className="w-full text-sm text-center border-collapse bg-white">
                        <thead className="bg-slate-50 border-b border-slate-200 text-slate-700">
                            <tr>
                                {tableau[0].map((header, i) => (
                                    <th key={i} className={`p-3 font-semibold ${i === pivotCol ? 'bg-amber-100 text-amber-800' : ''}`}>
                                        {header.includes('x') || header.includes('s') ? (
                                            <span>{header[0]}<sub>{header[1]}</sub></span>
                                        ) : header}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {tableau.slice(1).map((row, rIdx) => {
                                const isZRow = rIdx === tableau.length - 2; // Z row is the last one in body
                                const actualRowIdx = rIdx + 1;
                                const isPivotRow = actualRowIdx === pivotRow;
                                
                                return (
                                    <tr key={rIdx} className={`border-b border-slate-100 ${isZRow ? 'bg-slate-50 font-bold' : ''} ${isPivotRow ? 'bg-indigo-50' : ''}`}>
                                        {row.map((cell, cIdx) => {
                                            const isPivotCol = cIdx === pivotCol;
                                            const isPivotCell = isPivotRow && isPivotCol;
                                            
                                            // Handle subscript rendering for row headers
                                            let displayCell = cell;
                                            if (cIdx === 0 && (cell.startsWith('x') || cell.startsWith('s'))) {
                                                displayCell = <span>{cell[0]}<sub>{cell[1]}</sub></span>;
                                            }

                                            return (
                                                <td key={cIdx} className={`p-2
                                                    ${isPivotCol ? 'bg-amber-50' : ''} 
                                                    ${isPivotRow ? 'bg-indigo-50' : ''}
                                                    ${isPivotCell ? 'bg-indigo-600 text-white font-bold ring-2 ring-indigo-300 shadow-inner' : 'text-slate-600'}
                                                `}>
                                                    {displayCell}
                                                </td>
                                            )
                                        })}
                                    </tr>
                                )
                            })}
                        </tbody>
                    </table>
                </div>
            );
        };

        const App = () => {
            const [currentStepIdx, setCurrentStepIdx] = useState(0);
            const data = stepsData[currentStepIdx];
            const isLastStep = currentStepIdx === stepsData.length - 1;
            const isFirstStep = currentStepIdx === 0;

            const handleNext = () => {
                if (!isLastStep) setCurrentStepIdx(prev => prev + 1);
            };

            const handleReset = () => {
                setCurrentStepIdx(0);
            };

            return (
                <div className="flex flex-col h-screen fixed-height-container p-4 md:p-6 mx-auto max-w-7xl">
                    {/* Header & Controls */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">单纯形法推演可视化</h1>
                            <p className="text-slate-500 text-sm mt-1">目标: Max Z = 3x<sub>1</sub> + 5x<sub>2</sub> | 约束: x<sub>1</sub> ≤ 4, 2x<sub>2</sub> ≤ 12, 3x<sub>1</sub> + 2x<sub>2</sub> ≤ 18</p>
                        </div>
                        <div className="flex gap-4 mt-4 md:mt-0">
                            <button 
                                onClick={handleReset}
                                disabled={isFirstStep}
                                className="px-6 py-2 rounded-lg font-medium transition-colors bg-slate-100 text-slate-600 hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                重置 (Reset)
                            </button>
                            <button 
                                onClick={handleNext}
                                disabled={isLastStep}
                                className={`px-6 py-2 rounded-lg font-bold transition-all shadow-md
                                    ${isLastStep 
                                        ? 'bg-emerald-500 text-white opacity-50 cursor-not-allowed' 
                                        : 'bg-indigo-600 text-white hover:bg-indigo-700 hover:shadow-lg transform active:scale-95'
                                    }`}
                            >
                                {isLastStep ? '已到达最优解' : '下一步 (Next Step) ➔'}
                            </button>
                        </div>
                    </header>

                    {/* Main Content Layout - Split View strictly maintaining absolute/relative positions */}
                    <main className="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 min-h-0">
                        
                        {/* Left Side: Geometric Visualization */}
                        <section className="flex flex-col h-full bg-slate-50 rounded-xl p-4 border border-slate-200 shadow-inner">
                            <h2 className="text-lg font-semibold text-slate-700 mb-2 flex items-center gap-2">
                                <span className="bg-indigo-100 text-indigo-700 px-2 py-1 rounded text-sm">几何视图</span> 
                                顶点移动轨迹
                            </h2>
                            <div className="flex-1 w-full relative bg-white rounded-lg overflow-hidden border border-slate-200 flex items-center justify-center p-2">
                                {/* Using canvas for drawing */}
                                <CanvasGraph point={data.point} path={data.path} zLine={data.zLine} />
                            </div>
                        </section>

                        {/* Right Side: Algebraic (Tableau) & Explanations */}
                        <section className="flex flex-col h-full gap-4 min-h-0">
                            
                            {/* Explanation Panel - Fixed Height Area to prevent bouncing */}
                            <div className="bg-white rounded-xl p-5 border-l-4 border-l-indigo-500 shadow-md explanation-container flex flex-col justify-center">
                                <div className="flex items-center gap-3 mb-3">
                                    <div className="flex items-center justify-center w-8 h-8 rounded-full bg-indigo-100 text-indigo-700 font-bold">
                                        {currentStepIdx}
                                    </div>
                                    <h2 className="text-xl font-bold text-slate-800">{data.title}</h2>
                                </div>
                                <div className="text-slate-600 leading-relaxed whitespace-pre-line text-[15px]">
                                    {data.description}
                                </div>
                            </div>

                            {/* Tableau Matrix - Area */}
                            <div className="flex-1 flex flex-col bg-white rounded-xl p-4 border border-slate-200 shadow-sm table-container">
                                <h2 className="text-lg font-semibold text-slate-700 mb-3 flex items-center gap-2">
                                    <span className="bg-amber-100 text-amber-700 px-2 py-1 rounded text-sm">代数视图</span>
                                    单纯形表 (Simplex Tableau)
                                </h2>
                                <SimplexTableau 
                                    tableau={data.tableau} 
                                    pivotRow={data.pivotRow} 
                                    pivotCol={data.pivotCol} 
                                />
                                {/* Dynamic Legend below table */}
                                <div className="mt-4 flex flex-wrap gap-4 text-sm">
                                    {data.pivotCol !== null && (
                                        <div className="flex items-center gap-2">
                                            <span className="w-3 h-3 bg-amber-100 border border-amber-300 rounded block"></span>
                                            <span className="text-slate-600">进基列 (提升利润的方向)</span>
                                        </div>
                                    )}
                                    {data.pivotRow !== null && (
                                        <div className="flex items-center gap-2">
                                            <span className="w-3 h-3 bg-indigo-50 border border-indigo-200 rounded block"></span>
                                            <span className="text-slate-600">出基行 (最先触碰到的底线)</span>
                                        </div>
                                    )}
                                    {data.pivotRow !== null && data.pivotCol !== null && (
                                        <div className="flex items-center gap-2">
                                            <span className="w-3 h-3 bg-indigo-600 rounded block"></span>
                                            <span className="text-slate-600">主元 (Pivot)</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                        </section>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
