<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>装载问题回溯算法 - Canvas可视化</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; margin: 0; padding: 20px; }
        .canvas-container { overflow-x: auto; overflow-y: hidden; background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // 复杂案例定义
        const WEIGHTS = [20, 15, 25, 10, 30];
        const C1 = 45;
        const N = WEIGHTS.length;
        const TOTAL_WEIGHT = WEIGHTS.reduce((a, b) => a + b, 0);

        // 生成回溯步骤的数据生成器
        function generateBacktrackingSteps() {
            const steps = [];
            let bestw = 0;
            let currentBestPath = [];
            
            // 记录树的结构以便绘制背景骨架
            const treeNodes = new Map(); // pathKey -> { path, cw }
            treeNodes.set('root', { path: [], cw: 0 });

            function backtrack(i, cw, r, path) {
                const pathKey = path.join('');
                
                // 1. 访问当前节点
                steps.push({
                    type: 'VISIT',
                    i, cw, r, bestw, path: [...path],
                    desc: i === 0 ? "根节点开始搜索" : `深入节点: 当前总重 cw=${cw}`
                });

                if (i === N) {
                    if (cw > bestw) {
                        bestw = cw;
                        currentBestPath = [...path];
                        steps.push({
                            type: 'UPDATE_BEST', i, cw, r, bestw, path: [...path], bestPath: [...currentBestPath],
                            desc: `发现更优解! 更新最优重量 bestw=${bestw}`
                        });
                    } else {
                        steps.push({
                            type: 'LEAF', i, cw, r, bestw, path: [...path], bestPath: [...currentBestPath],
                            desc: `到达叶子节点，当前重 ${cw} <= 最优重 ${bestw}，不更新。`
                        });
                    }
                    return;
                }

                r -= WEIGHTS[i];

                // 探索左子树 (选择当前集装箱)
                let leftPath = [...path, 1];
                let leftKey = leftPath.join('');
                treeNodes.set(leftKey, { path: leftPath, cw: cw + WEIGHTS[i] });
                
                if (cw + WEIGHTS[i] <= C1) {
                    steps.push({
                        type: 'TRY_LEFT', i, cw: cw + WEIGHTS[i], r, bestw, path: [...path],
                        desc: `尝试选择集装箱 ${i} (重${WEIGHTS[i]}): ${cw} + ${WEIGHTS[i]} <= ${C1} (容量)。可行。`
                    });
                    backtrack(i + 1, cw + WEIGHTS[i], r, leftPath);
                } else {
                    steps.push({
                        type: 'PRUNE_LEFT', i, cw: cw + WEIGHTS[i], r, bestw, path: [...path], prunedPath: leftPath,
                        desc: `左剪枝: 尝试选择集装箱 ${i}，重量 ${cw + WEIGHTS[i]} 超过容量 ${C1}。剪枝！`
                    });
                }

                // 探索右子树 (不选当前集装箱)
                let rightPath = [...path, 0];
                let rightKey = rightPath.join('');
                treeNodes.set(rightKey, { path: rightPath, cw: cw });
                
                if (cw + r > bestw) {
                     steps.push({
                        type: 'TRY_RIGHT', i, cw, r, bestw, path: [...path],
                        desc: `尝试不选集装箱 ${i}: 潜力 ${cw} + ${r}(剩余) = ${cw + r} > ${bestw}(当前最优)。继续搜索。`
                    });
                    backtrack(i + 1, cw, r, rightPath);
                } else {
                    steps.push({
                        type: 'PRUNE_RIGHT', i, cw, r, bestw, path: [...path], prunedPath: rightPath,
                        desc: `右剪枝: 不选集装箱 ${i}，最大可能总重 ${cw + r} <= ${bestw}(当前最优)。无法产生更优解，剪枝！`
                    });
                }

                r += WEIGHTS[i];
                steps.push({
                    type: 'BACKTRACK', i, cw, r, bestw, path: [...path],
                    desc: `回溯: 离开层级 ${i}，退回到上一状态。`
                });
            }

            backtrack(0, 0, TOTAL_WEIGHT, []);
            return { steps, treeNodes };
        }

        const { steps: ALGO_STEPS, treeNodes: TREE_NODES } = generateBacktrackingSteps();

        const App = () => {
            const canvasRef = useRef(null);
            const [stepIndex, setStepIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(800); // ms per step

            const currentStep = ALGO_STEPS[stepIndex];

            // 播放控制器
            useEffect(() => {
                let timer;
                if (isPlaying && stepIndex < ALGO_STEPS.length - 1) {
                    timer = setTimeout(() => {
                        setStepIndex(prev => prev + 1);
                    }, speed);
                } else if (stepIndex >= ALGO_STEPS.length - 1) {
                    setIsPlaying(false);
                }
                return () => clearTimeout(timer);
            }, [isPlaying, stepIndex, speed]);

            // Canvas 绘制核心逻辑
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;

                ctx.clearRect(0, 0, width, height);

                const getCoords = (path) => {
                    let x = width / 2;
                    let y = 40;
                    let dx = width / 4;
                    for (let p of path) {
                        y += 90; // 层高
                        if (p === 1) x -= dx;
                        else x += dx;
                        dx /= 2;
                    }
                    return { x, y };
                };

                // 1. 绘制静态树骨架 (浅色)
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 1;
                TREE_NODES.forEach(node => {
                    if (node.path.length > 0) {
                        const parentPath = node.path.slice(0, -1);
                        const pCoords = getCoords(parentPath);
                        const cCoords = getCoords(node.path);
                        ctx.beginPath();
                        ctx.moveTo(pCoords.x, pCoords.y);
                        ctx.lineTo(cCoords.x, cCoords.y);
                        ctx.stroke();
                        
                        // 绘制边上的标签 (0 或 1)
                        const mx = (pCoords.x + cCoords.x) / 2;
                        const my = (pCoords.y + cCoords.y) / 2;
                        ctx.fillStyle = '#9ca3af';
                        ctx.font = '12px Arial';
                        ctx.fillText(node.path[node.path.length-1] === 1 ? '选(1)' : '不选(0)', mx - 10, my);
                    }
                });

                // 2. 绘制已经发生的路径和节点状态
                // 通过分析从 0 到当前 stepIndex 的动作，确定每个节点的状态
                const nodeStatus = new Map(); // pathKey -> 'visited' | 'pruned' | 'optimal' | 'active'
                const edges = new Set(); // 记录走过的边
                
                let bestPathFound = null;

                for (let i = 0; i <= stepIndex; i++) {
                    const s = ALGO_STEPS[i];
                    const key = s.path.join('');
                    
                    if (s.type === 'VISIT' || s.type === 'TRY_LEFT' || s.type === 'TRY_RIGHT') {
                        nodeStatus.set(key, 'visited');
                        if (s.path.length > 0) {
                            edges.add(s.path.join(''));
                        }
                    }
                    if (s.type === 'PRUNE_LEFT' || s.type === 'PRUNE_RIGHT') {
                        nodeStatus.set(s.prunedPath.join(''), 'pruned');
                        edges.add(s.prunedPath.join(''));
                    }
                    if (s.type === 'UPDATE_BEST') {
                        bestPathFound = s.bestPath;
                    }
                }

                // 标记当前活动节点
                if (currentStep) {
                    nodeStatus.set(currentStep.path.join(''), 'active');
                }

                // 绘制走过的边
                edges.forEach(edgeKey => {
                    const path = edgeKey.split('').map(Number);
                    const parentPath = path.slice(0, -1);
                    const pCoords = getCoords(parentPath);
                    const cCoords = getCoords(path);
                    
                    ctx.beginPath();
                    ctx.moveTo(pCoords.x, pCoords.y);
                    ctx.lineTo(cCoords.x, cCoords.y);
                    ctx.strokeStyle = nodeStatus.get(edgeKey) === 'pruned' ? '#ef4444' : '#3b82f6';
                    ctx.lineWidth = nodeStatus.get(edgeKey) === 'pruned' ? 2 : 3;
                    ctx.stroke();
                });

                // 绘制节点
                TREE_NODES.forEach(node => {
                    const key = node.path.join('');
                    const coords = getCoords(node.path);
                    const status = nodeStatus.get(key);

                    if (!status) return; // 没遍历到不画大节点

                    ctx.beginPath();
                    ctx.arc(coords.x, coords.y, 16, 0, Math.PI * 2);
                    
                    if (status === 'active') {
                        ctx.fillStyle = '#fbbf24'; // 黄色 高亮
                        ctx.strokeStyle = '#d97706';
                    } else if (status === 'pruned') {
                        ctx.fillStyle = '#fca5a5'; // 红色 剪枝
                        ctx.strokeStyle = '#dc2626';
                    } else {
                         ctx.fillStyle = '#bfdbfe'; // 蓝色 访问过
                         ctx.strokeStyle = '#2563eb';
                    }
                    
                    // 如果是最优解路径上的节点，特殊标记
                    if (bestPathFound && key !== '' && key === bestPathFound.slice(0, node.path.length).join('')) {
                        ctx.fillStyle = '#bbf7d0'; // 绿色
                        ctx.strokeStyle = '#16a34a';
                    }

                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // 节点内的重量文字
                    ctx.fillStyle = '#111827';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.cw, coords.x, coords.y);
                    
                    // 剪枝打个 X
                    if (status === 'pruned') {
                        ctx.beginPath();
                        ctx.moveTo(coords.x - 10, coords.y - 10);
                        ctx.lineTo(coords.x + 10, coords.y + 10);
                        ctx.moveTo(coords.x + 10, coords.y - 10);
                        ctx.lineTo(coords.x - 10, coords.y + 10);
                        ctx.strokeStyle = '#991b1b';
                        ctx.stroke();
                    }
                });

            }, [stepIndex, currentStep]);

            const handleNext = () => setStepIndex(p => Math.min(p + 1, ALGO_STEPS.length - 1));
            const handlePrev = () => setStepIndex(p => Math.max(p - 1, 0));
            const handleReset = () => { setStepIndex(0); setIsPlaying(false); };

            return (
                <div className="max-w-6xl mx-auto flex flex-col gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-8 justify-between items-start">
                        <div className="flex-1">
                            <h1 className="text-2xl font-bold text-gray-800 mb-2">装载问题：回溯与剪枝过程</h1>
                            <div className="text-sm text-gray-600 mb-4 space-y-1">
                                <p><strong>物品重量集合:</strong> [ {WEIGHTS.join(', ')} ] &nbsp;&nbsp;|&nbsp;&nbsp; <strong>船1容量 C1:</strong> {C1}</p>
                                <p><strong>当前目标:</strong> 在不超过 {C1} 的前提下，挑选物品使其重量总和最大化。</p>
                                <p className="text-xs text-gray-500 mt-2">※ 树中的数字代表 <span className="text-blue-600 font-bold">已装载总重量 (cw)</span>，向左走(1)代表装入，向右走(0)代表跳过该物品。</p>
                            </div>
                            
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <h3 className="font-semibold text-gray-700 mb-2">当前执行步骤 ({stepIndex + 1} / {ALGO_STEPS.length})</h3>
                                <p className="text-md text-gray-800 bg-blue-50 p-2 rounded border-l-4 border-blue-500 min-h-[48px]">
                                    {currentStep?.desc}
                                </p>
                                <div className="grid grid-cols-4 gap-4 mt-4 text-center">
                                    <div className="bg-white p-2 rounded shadow-sm">
                                        <div className="text-xs text-gray-500">考察集装箱 i</div>
                                        <div className="font-bold">{currentStep?.i}</div>
                                    </div>
                                    <div className="bg-white p-2 rounded shadow-sm">
                                        <div className="text-xs text-gray-500">当前重 cw</div>
                                        <div className="font-bold text-blue-600">{currentStep?.cw}</div>
                                    </div>
                                    <div className="bg-white p-2 rounded shadow-sm">
                                        <div className="text-xs text-gray-500">剩余重 r</div>
                                        <div className="font-bold text-purple-600">{currentStep?.r}</div>
                                    </div>
                                    <div className="bg-white p-2 rounded shadow-sm">
                                        <div className="text-xs text-gray-500">历史最优 bestw</div>
                                        <div className="font-bold text-green-600">{currentStep?.bestw}</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="w-full md:w-80 flex flex-col gap-4">
                            <div className="flex justify-center gap-2">
                                <button onClick={handlePrev} disabled={stepIndex === 0} className="px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">⏮ 步退</button>
                                <button onClick={() => setIsPlaying(!isPlaying)} className={`px-6 py-2 text-white rounded font-bold ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-green-500 hover:bg-green-600'}`}>
                                    {isPlaying ? '⏸ 暂停' : '▶️ 播放'}
                                </button>
                                <button onClick={handleNext} disabled={stepIndex === ALGO_STEPS.length - 1} className="px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">步进 ⏭</button>
                            </div>
                            <div className="flex flex-col gap-1">
                                <label className="text-xs text-gray-500 text-center">播放速度 (延迟)</label>
                                <input type="range" min="100" max="2000" value={speed} onChange={(e) => setSpeed(Number(e.target.value))} className="w-full" style={{ direction: 'rtl' }} />
                            </div>
                            <button onClick={handleReset} className="px-4 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 font-semibold mt-2">🔄 重置状态</button>
                        </div>
                    </div>

                    <div className="canvas-container relative">
                        <canvas ref={canvasRef} width={1200} height={600} className="block min-w-max"></canvas>
                        <div className="absolute top-4 right-4 bg-white/90 p-3 rounded shadow border border-gray-200 text-xs space-y-2">
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#bfdbfe] border border-[#2563eb] rounded-full"></div> 访问中节点</div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#fbbf24] border border-[#d97706] rounded-full"></div> 当前计算节点</div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#fca5a5] border border-[#dc2626] rounded-full relative"><span className="absolute inset-0 flex items-center justify-center text-[8px] text-red-800">X</span></div> 触发剪枝节点</div>
                            <div className="flex items-center gap-2"><div className="w-3 h-3 bg-[#bbf7d0] border border-[#16a34a] rounded-full"></div> 包含最优解路径</div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
