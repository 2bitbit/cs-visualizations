<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>脉动阵列可视化 Pro (Systolic Array Visualizer)</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --pe-bg: #2d2d2d;
            --pe-border: #444;
            --highlight-green: #00e676;
            --data-a-color: #2979ff; /* 蓝色系 Matrix A */
            --data-b-color: #ff9100; /* 橙色系 Matrix B */
            --text-main: #ffffff;
            --text-sub: #b0b0b0;
            --wire-color: #555;
            --anim-speed: 0.5s; /* 动画速度 */
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        h1 { margin: 10px 0 20px; font-weight: 300; letter-spacing: 1px; }

        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 40px;
            align-items: flex-start;
            justify-content: center;
            width: 100%;
            max-width: 1400px;
            height: 100%;
        }

        .left-col {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 20px;
            max-width: 400px;
        }

        .legend { display: flex; gap: 20px; font-size: 0.9em; margin-bottom: 20px; color: var(--text-sub); }
        .dot { width: 10px; height: 10px; display: inline-block; border-radius: 50%; margin-right: 5px; }

        .controls-wrapper {
            background: var(--panel-bg);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            border: 1px solid #333;
            width: 100%;
            max-width: 500px;
            z-index: 10; /* 保证在动画之上 */
        }

        .btn-group { display: flex; gap: 10px; align-items: center; width: 100%; justify-content: center;}

        button {
            padding: 10px 20px;
            font-size: 0.95em;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 6px;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover:not(:disabled) { background-color: var(--highlight-green); color: #000; border-color: var(--highlight-green); transform: translateY(-1px); }
        button:active:not(:disabled) { transform: translateY(1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        button.primary { background-color: var(--highlight-green); color: #000; border: none; }
        button.primary:hover { background-color: #00c853; }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }
        .progress-bar {
            height: 100%;
            background: var(--highlight-green);
            width: 0%;
            transition: width var(--anim-speed) ease;
        }

        /* --- 核心阵列布局调整 --- */
        .systolic-grid {
            display: grid;
            /* 增大第一列和第一行的尺寸，防止挤压 */
            grid-template-columns: 220px 140px 140px; 
            grid-template-rows: 220px 140px 140px;    
            gap: 20px;
            position: relative;
        }

        /* --- 数据块样式 --- */
        .payload {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.1em;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
            z-index: 100; /* 保证数据块在连线之上 */
            /* 关键：防止被 flex 容器压缩 */
            flex-shrink: 0; 
            /* 默认状态，用于 JS 动画控制 */
            transform-origin: top left;
            will-change: transform, opacity;
        }
        .payload.type-a { background: var(--data-a-color); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .payload.type-b { background: var(--data-b-color); color: black; border: 1px solid rgba(0,0,0,0.1); }
        /* 空泡样式简化，不参与复杂动画 */
        .payload.empty { background: transparent; border: 2px dashed #333; color: transparent; box-shadow: none; opacity: 0.5; }
        
        /* --- 传送带容器 --- */
        .lane-v {
            grid-row: 1;
            display: flex;
            flex-direction: column-reverse; /* 数据从上往下流 */
            align-items: center;
            /* 关键：从底部开始排列，多出的往上溢出（如果 overflow visible） */
            justify-content: flex-start; 
            gap: 15px; /* 增加间距 */
            padding-bottom: 20px;
            position: relative;
            overflow: visible; /* 允许看到未进入的数据 */
        }
        .lane-v::before { content: ''; position: absolute; top: -20px; bottom: 10px; width: 2px; background: #333; z-index: 0; }
        
        .lane-h {
            grid-column: 1;
            display: flex;
            flex-direction: row-reverse; /* 数据从左往右流 */
            align-items: center;
            justify-content: flex-start;
            gap: 15px;
            padding-right: 20px;
            position: relative;
            overflow: visible;
        }
        .lane-h::before { content: ''; position: absolute; left: -20px; right: 10px; height: 2px; background: #333; z-index: 0; }

        .time-label {
            position: absolute;
            font-size: 0.7em;
            color: #555;
            font-family: monospace;
            pointer-events: none;
        }
        .lane-v .time-label { right: 60px; }
        .lane-h .time-label { bottom: -20px; }

        /* PE 单元格 */
        .pe-cell {
            background: var(--pe-bg);
            border: 2px solid var(--pe-border);
            border-radius: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: border-color 0.3s, box-shadow 0.3s, background-color 0.3s;
            z-index: 1; /* 低于 payload */
        }

        .pe-cell.active {
            border-color: var(--highlight-green);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.15);
            background: #333;
        }

        .pe-header { position: absolute; top: 8px; left: 10px; font-size: 0.75em; color: #666; font-weight: bold; }

        .pe-internals {
            display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.3; transition: opacity 0.3s;
        }
        .pe-cell.active .pe-internals { opacity: 1; }
        
        .math-symbol { font-family: monospace; font-size: 1.2em; color: #888; }
        .pe-cell.active .math-symbol { color: #fff; }

        .pe-acc-display {
            font-size: 1.8em; font-weight: 700; color: var(--text-main); z-index: 2; margin: 5px 0; transition: color 0.2s;
        }
        .pe-cell.active .pe-acc-display { color: var(--highlight-green); text-shadow: 0 0 10px rgba(0,230,118,0.4); }

        .calc-popup {
            position: absolute; bottom: 10px; background: rgba(0,0,0,0.9); padding: 4px 8px; border-radius: 4px;
            font-size: 0.9em; color: var(--highlight-green); opacity: 0; transform: translateY(10px);
            transition: all 0.3s; white-space: nowrap; border: 1px solid #444; z-index: 101;
        }
        .pe-cell.active .calc-popup { opacity: 1; transform: translateY(0); }

        .pe-input-holder {
            position: absolute; display: flex; justify-content: center; align-items: center; width: 36px; height: 36px;
        }
        /* 调整位置以适应更大的 Grid */
        .pos-left { left: -18px; top: 50%; transform: translateY(-50%); }
        .pos-top { top: -18px; left: 50%; transform: translateX(-50%); }
        
        .arrow-h::after { content: ''; position: absolute; right: -22px; top: 50%; width: 20px; height: 2px; background: #333; z-index: 0; }
        .arrow-v::after { content: ''; position: absolute; bottom: -22px; left: 50%; height: 20px; width: 2px; background: #333; z-index: 0; }

        .info-panel {
            width: 100%; background: #222; border-left: 4px solid var(--highlight-green); padding: 25px;
            border-radius: 0 12px 12px 0; min-height: 400px; box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .step-title { color: var(--highlight-green); font-weight: bold; font-size: 1.3em; margin-bottom: 15px; display: block; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .step-desc { line-height: 1.8; color: #ddd; font-size: 1.05em; }
        .matrix-preview {
            background: #111; padding: 10px; border-radius: 6px; font-family: monospace; margin-bottom: 15px; color: #ccc; border: 1px solid #333;
        }
        
        .grid-pe00 { grid-column: 2; grid-row: 2; }
        .grid-pe01 { grid-column: 3; grid-row: 2; }
        .grid-pe10 { grid-column: 2; grid-row: 3; }
        .grid-pe11 { grid-column: 3; grid-row: 3; }

        .col-0-lane { grid-column: 2; grid-row: 1; }
        .col-1-lane { grid-column: 3; grid-row: 1; }
        .row-0-lane { grid-column: 1; grid-row: 2; }
        .row-1-lane { grid-column: 1; grid-row: 3; }
        
    </style>
</head>
<body>

    <h1>Systolic Array Visualizer</h1>

    <div class="main-layout">
        
        <div class="left-col">
            <div class="legend">
                <span><span class="dot" style="background:var(--data-a-color)"></span>矩阵 A (Rows)</span>
                <span><span class="dot" style="background:var(--data-b-color)"></span>矩阵 B (Cols)</span>
                <span><span class="dot" style="background:var(--highlight-green)"></span>累加结果</span>
            </div>

            <div class="controls-wrapper">
                <div class="btn-group">
                    <button onclick="handleStep(-1)" id="btnPrev">⏮ 上一步</button>
                    <div style="text-align:center; min-width: 120px;">
                        <div style="font-size:0.7em; color:#888; margin-bottom:2px;">CLOCK CYCLE</div>
                        <div style="font-size:1.5em; font-weight:bold; font-family:monospace; color: var(--highlight-green);" id="cycleVal">0</div>
                    </div>
                    <button onclick="handleStep(1)" id="btnNext" class="primary">下一步 ⏭</button>
                    <button onclick="reset()" style="margin-left:10px;">↺ 重置</button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>

            <div class="systolic-grid" id="gridContainer">
                <div class="lane-v col-0-lane" id="lane-col0"></div>
                <div class="lane-v col-1-lane" id="lane-col1"></div>
                <div class="lane-h row-0-lane" id="lane-row0"></div>
                <div class="lane-h row-1-lane" id="lane-row1"></div>

                <div class="pe-cell grid-pe00 arrow-h arrow-v" id="pe00">
                    <span class="pe-header">PE(0,0)</span>
                    <div class="pe-input-holder pos-left" id="pe00-a"></div> 
                    <div class="pe-input-holder pos-top" id="pe00-b"></div>  
                    <div class="pe-internals"><span class="math-symbol">×</span><span class="math-symbol">+</span></div>
                    <div class="pe-acc-display" id="pe00-acc">0</div>
                    <div class="calc-popup" id="pe00-calc"></div>
                </div>

                <div class="pe-cell grid-pe01 arrow-v" id="pe01">
                    <span class="pe-header">PE(0,1)</span>
                    <div class="pe-input-holder pos-left" id="pe01-a"></div>
                    <div class="pe-input-holder pos-top" id="pe01-b"></div>
                    <div class="pe-internals"><span class="math-symbol">×</span><span class="math-symbol">+</span></div>
                    <div class="pe-acc-display" id="pe01-acc">0</div>
                    <div class="calc-popup" id="pe01-calc"></div>
                </div>

                <div class="pe-cell grid-pe10 arrow-h" id="pe10">
                    <span class="pe-header">PE(1,0)</span>
                    <div class="pe-input-holder pos-left" id="pe10-a"></div>
                    <div class="pe-input-holder pos-top" id="pe10-b"></div>
                    <div class="pe-internals"><span class="math-symbol">×</span><span class="math-symbol">+</span></div>
                    <div class="pe-acc-display" id="pe10-acc">0</div>
                    <div class="calc-popup" id="pe10-calc"></div>
                </div>

                <div class="pe-cell grid-pe11" id="pe11">
                    <span class="pe-header">PE(1,1)</span>
                    <div class="pe-input-holder pos-left" id="pe11-a"></div>
                    <div class="pe-input-holder pos-top" id="pe11-b"></div>
                    <div class="pe-internals"><span class="math-symbol">×</span><span class="math-symbol">+</span></div>
                    <div class="pe-acc-display" id="pe11-acc">0</div>
                    <div class="calc-popup" id="pe11-calc"></div>
                </div>
            </div>
        </div>

        <div class="right-col">
            <div class="info-panel">
                <div class="matrix-preview">
                    A = [[1, 2], [3, 4]]<br>
                    B = [[5, 6], [7, 8]]
                </div>
                <span class="step-title" id="infoTitle">准备就绪</span>
                <div class="step-desc" id="infoDesc">
                    正在初始化脉动阵列。<br>
                    请注意观察输入队列：<br>
                    - Row 0 和 Col 0 已经就位。<br>
                    - Row 1 和 Col 1 前面有一个虚线框，这代表 <strong>1个时钟周期的延迟 (Skew)</strong>。<br>
                    <br>
                    点击 <strong>"下一步"</strong> 开始观察数据流动。
                </div>
            </div>
        </div>

    </div>

    <script>
        const inputs = {
            row0: [1, 2, null, null, null],
            row1: [null, 3, 4, null, null], 
            col0: [5, 7, null, null, null],
            col1: [null, 6, 8, null, null]  
        };

        const history = [
            // Cycle 0
            {
                pes: {
                    pe00: { acc: 0, a: null, b: null },
                    pe01: { acc: 0, a: null, b: null },
                    pe10: { acc: 0, a: null, b: null },
                    pe11: { acc: 0, a: null, b: null }
                },
                title: "Cycle 0: 初始化",
                desc: "一切准备就绪。注意观察输入端的延迟空泡（虚线框），这是保证数据同步到达关键节点的关键。"
            },
            // Cycle 1
            {
                pes: {
                    pe00: { acc: 5, a: 1, b: 5, active: true, calc: "1×5=5" },
                    pe01: { acc: 0, a: null, b: null },
                    pe10: { acc: 0, a: null, b: null },
                    pe11: { acc: 0, a: null, b: null }
                },
                title: "Cycle 1: 接触 (T0)",
                desc: "<strong>PE(0,0)</strong> 接收数据 A=1, B=5。<br>计算：1 × 5 = 5。<br>累加器更新为 5。<br>其他 PE 尚未收到有效数据。"
            },
            // Cycle 2
            {
                pes: {
                    pe00: { acc: 19, a: 2, b: 7, active: true, calc: "2×7=14" },
                    pe01: { acc: 6, a: 1, b: 6, active: true, calc: "1×6=6" }, 
                    pe10: { acc: 15, a: 3, b: 5, active: true, calc: "3×5=15" },
                    pe11: { acc: 0, a: null, b: null }
                },
                title: "Cycle 2: 扩散 (T1)",
                desc: "<strong>PE(0,0)</strong> 旧数据 (1,5) 传给邻居，自己处理新数据 (2,7)，累加 5+14=19。<br><strong>PE(0,1)</strong> 收到左边的 1，上边的 6，计算 1×6=6。<br><strong>PE(1,0)</strong> 收到左边的 3，上边的 5，计算 3×5=15。"
            },
            // Cycle 3
            {
                pes: {
                    pe00: { acc: 19, a: null, b: null, done: true },
                    pe01: { acc: 22, a: 2, b: 8, active: true, calc: "2×8=16" }, 
                    pe10: { acc: 43, a: 4, b: 7, active: true, calc: "4×7=28" }, 
                    pe11: { acc: 18, a: 3, b: 6, active: true, calc: "3×6=18" } 
                },
                title: "Cycle 3: 峰值 (T2)",
                desc: "<strong>PE(1,1)</strong> 终于开工了！接收 A=3, B=6，计算 18。<br><strong>PE(0,1)</strong> 计算第二项 2×8=16，总和 22。<br><strong>PE(1,0)</strong> 计算第二项 4×7=28，总和 43。<br>PE(0,0) 任务完成。"
            },
            // Cycle 4
            {
                pes: {
                    pe00: { acc: 19, done: true },
                    pe01: { acc: 22, done: true },
                    pe10: { acc: 43, done: true },
                    pe11: { acc: 50, a: 4, b: 8, active: true, calc: "4×8=32" } 
                },
                title: "Cycle 4: 收尾 (T3)",
                desc: "前两排 PE 均已完成。<br><strong>PE(1,1)</strong> 完成最后一项计算：Acc += 4×8=32，最终结果 50。"
            },
            // Cycle 5
            {
                pes: {
                    pe00: { acc: 19, done: true },
                    pe01: { acc: 22, done: true },
                    pe10: { acc: 43, done: true },
                    pe11: { acc: 50, done: true }
                },
                title: "Cycle 5: 完成",
                desc: "所有数据处理完毕。<br>最终结果矩阵 C:<br>[[19, 22],<br> [43, 50]]"
            }
        ];

        let currentStep = 0;
        const maxStep = 5;

        // 生成带 ID 的数据块，用于动画追踪
        // key 格式: type-value (e.g., "a-1")
        function createPayload(val, type) {
            const div = document.createElement('div');
            if (val === null) {
                div.className = 'payload empty';
            } else {
                div.className = `payload type-${type}`;
                div.innerText = val;
                // 设置唯一 ID 供 FLIP 动画使用
                // 注意：如果有重复数值，需要更复杂的 ID 生成策略。这里假设演示数据不重复。
                div.setAttribute('data-key', `${type}-${val}`); 
            }
            return div;
        }

        // FLIP 动画核心逻辑
        function flipAnimate(updateDomFn) {
            // 1. First: 记录所有 payload 的初始位置
            const firstRects = {};
            document.querySelectorAll('.payload:not(.empty)').forEach(el => {
                const key = el.getAttribute('data-key');
                if (key) firstRects[key] = el.getBoundingClientRect();
            });

            // 2. State Change: 更新 DOM
            updateDomFn();

            // 3. Last & Invert: 计算新位置并应用变换
            document.querySelectorAll('.payload:not(.empty)').forEach(el => {
                const key = el.getAttribute('data-key');
                if (key && firstRects[key]) {
                    const first = firstRects[key];
                    const last = el.getBoundingClientRect();
                    const deltaX = first.left - last.left;
                    const deltaY = first.top - last.top;

                    // 只有当位置发生改变时才执行动画
                    if (Math.abs(deltaX) > 0.5 || Math.abs(deltaY) > 0.5) {
                        el.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                        el.style.transition = 'transform 0s'; // 立即应用 transform
                        
                        // 4. Play: 在下一帧移除 transform，启用 transition
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                el.style.transform = '';
                                el.style.transition = 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1)';
                            });
                        });
                    }
                } else if (key && !firstRects[key]) {
                    // 新出现的元素：Fade In
                    el.style.opacity = '0';
                    el.style.transform = 'scale(0.5)';
                    requestAnimationFrame(() => {
                        el.style.transition = 'opacity 0.4s, transform 0.4s';
                        el.style.opacity = '1';
                        el.style.transform = 'scale(1)';
                    });
                }
            });
        }

        function renderLanes(cycle) {
            const lanes = [
                { id: 'lane-row0', data: inputs.row0, type: 'a' },
                { id: 'lane-row1', data: inputs.row1, type: 'a' },
                { id: 'lane-col0', data: inputs.col0, type: 'b' },
                { id: 'lane-col1', data: inputs.col1, type: 'b' }
            ];

            lanes.forEach(lane => {
                const el = document.getElementById(lane.id);
                el.innerHTML = ''; // 清空（FLIP 会处理平滑过渡）
                
                // 显示即将进入的数据 (Preview next 4 items)
                for (let i = 0; i < 4; i++) {
                    const idx = cycle + i;
                    if (idx < lane.data.length) {
                        const val = lane.data[idx];
                        const block = createPayload(val, lane.type);
                        
                        const timeLabel = document.createElement('span');
                        timeLabel.className = 'time-label';
                        timeLabel.innerText = `T${cycle+i}`;
                        
                        // 包装一层以定位 label
                        // 但为了 FLIP 简单，这里直接 append block，把 label 单独处理或省略
                        // 这里我们省略 label 以保证结构简单，或者使用 absolute 定位 label
                        // block.appendChild(timeLabel); // 不建议直接插在 flex item 里
                        
                        el.appendChild(block);
                    }
                }
            });
        }

        function updatePEs(state) {
            ['pe00', 'pe01', 'pe10', 'pe11'].forEach(id => {
                const peState = state.pes[id];
                const el = document.getElementById(id);
                const accEl = document.getElementById(id + '-acc');
                const calcEl = document.getElementById(id + '-calc');
                const inA = document.getElementById(id + '-a');
                const inB = document.getElementById(id + '-b');

                accEl.innerText = peState.acc || 0;

                if (peState.active) {
                    el.classList.add('active');
                    calcEl.innerText = peState.calc;
                } else {
                    el.classList.remove('active');
                    calcEl.innerText = '';
                }

                inA.innerHTML = '';
                inB.innerHTML = '';
                if (peState.a != null) inA.appendChild(createPayload(peState.a, 'a'));
                if (peState.b != null) inB.appendChild(createPayload(peState.b, 'b'));
            });
        }

        function updateUI() {
            document.getElementById('cycleVal').innerText = currentStep;
            document.getElementById('btnPrev').disabled = currentStep === 0;
            document.getElementById('btnNext').disabled = currentStep === maxStep;
            const pct = (currentStep / maxStep) * 100;
            document.getElementById('progressBar').style.width = pct + '%';

            renderLanes(currentStep);
            updatePEs(history[currentStep]);

            const info = history[currentStep];
            document.getElementById('infoTitle').innerText = info.title;
            document.getElementById('infoDesc').innerHTML = info.desc;
        }

        // 包装更新函数以应用动画
        function handleStep(delta) {
            const nextStep = currentStep + delta;
            if (nextStep < 0 || nextStep > maxStep) return;

            flipAnimate(() => {
                currentStep = nextStep;
                updateUI();
            });
        }

        function reset() {
            currentStep = 0;
            updateUI();
        }

        // Initialize
        updateUI();

    </script>
</body>
</html>
