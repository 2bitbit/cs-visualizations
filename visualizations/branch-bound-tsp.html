<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSP 分支限界法可视化演示</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 使得可以在浏览器中直接编写 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入图标库 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
        /* 自定义滚动条，保持布局整洁 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 强制树状连线样式 */
        .tree-line::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: -1rem;
            border-left: 2px solid #e5e7eb;
        }
        .tree-node-horizontal-line::before {
            content: '';
            position: absolute;
            top: 1.25rem; left: -1rem; width: 1rem;
            border-top: 2px solid #e5e7eb;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 核心问题定义数据 ---
        const N = 5;
        const NODE_NAMES = ['A', 'B', 'C', 'D', 'E'];
        // 图的节点坐标，仅用于图形可视化位置
        const NODE_POSITIONS = [
            { x: 50, y: 150 },   // A
            { x: 150, y: 50 },   // B
            { x: 250, y: 150 },  // C
            { x: 200, y: 250 },  // D
            { x: 100, y: 250 }   // E
        ];
        // 距离矩阵 (对称)，故意设计使得最优解并非一眼可见，以触发剪枝
        const DIST_MATRIX = [
            [ 0, 10, 15, 20, 25],
            [10,  0,  9,  8, 26],
            [15,  9,  0, 12,  7],
            [20,  8, 12,  0, 11],
            [25, 26,  7, 11,  0]
        ];

        // --- 辅助函数 ---
        const pathToString = (path) => path.map(i => NODE_NAMES[i]).join(' → ');
        
        // 计算下界的核心逻辑，同时返回计算细节用于可视化表格
        function calculateBoundWithDetails(path) {
            let details = [];
            let totalSum = 0;
            const visited = new Set(path);
            const endpoints = new Set([path[0], path[path.length - 1]]);

            for (let i = 0; i < N; i++) {
                let info = { node: i, name: NODE_NAMES[i], edges: [], sum: 0, type: '', detailStr: '' };
                
                if (path.includes(i) && !endpoints.has(i)) {
                    info.type = 'internal'; // 路径内节点：必须固定连接前后两个节点
                    let idx = path.indexOf(i);
                    let e1 = DIST_MATRIX[path[idx-1]][i];
                    let e2 = DIST_MATRIX[i][path[idx+1]];
                    info.edges = [e1, e2];
                    info.sum = e1 + e2;
                    info.detailStr = `固定边(${NODE_NAMES[path[idx-1]]}-${info.name}, ${info.name}-${NODE_NAMES[path[idx+1]]})`;
                } else if (endpoints.has(i) && path.length > 1) {
                    info.type = 'endpoint'; // 路径端点：一条边已固定，另一条需找最小值
                    let isStart = (i === path[0]);
                    let fixedEdge = isStart ? DIST_MATRIX[path[0]][path[1]] : DIST_MATRIX[path[path.length-2]][path[path.length-1]];
                    let fixedTarget = isStart ? path[1] : path[path.length-2];
                    
                    let minFree = Infinity;
                    let targetNode = -1;
                    if (path.length === N) {
                        minFree = DIST_MATRIX[path[0]][path[N-1]];
                        targetNode = isStart ? path[N-1] : path[0];
                    } else {
                        for(let j=0; j<N; j++) {
                            if (!visited.has(j)) {
                                if (DIST_MATRIX[i][j] < minFree) {
                                    minFree = DIST_MATRIX[i][j];
                                    targetNode = j;
                                }
                            }
                        }
                    }
                    info.edges = [fixedEdge, minFree];
                    info.sum = fixedEdge + minFree;
                    info.detailStr = `固定边(${info.name}-${NODE_NAMES[fixedTarget]}) + 最小自由边(${info.name}-${NODE_NAMES[targetNode]})`;
                } else if (path.length === 1 && i === path[0]) {
                    info.type = 'start'; // 初始单节点：没有任何边固定，找两条最小边
                    let validEdges = [];
                    for(let j=0; j<N; j++) {
                        if (i !== j) validEdges.push({ w: DIST_MATRIX[i][j], t: j });
                    }
                    validEdges.sort((a,b) => a.w - b.w);
                    info.edges = [validEdges[0].w, validEdges[1].w];
                    info.sum = validEdges[0].w + validEdges[1].w;
                    info.detailStr = `取最小两边至 ${NODE_NAMES[validEdges[0].t]}, ${NODE_NAMES[validEdges[1].t]}`;
                } else {
                    info.type = 'unvisited'; // 未访问节点：找两条通往(未访问区 或 端点)的最小边
                    let validEdges = [];
                    for(let j=0; j<N; j++) {
                        if (i !== j && (!visited.has(j) || endpoints.has(j))) {
                            validEdges.push({ w: DIST_MATRIX[i][j], t: j });
                        }
                    }
                    validEdges.sort((a,b) => a.w - b.w);
                    info.edges = [validEdges[0].w, validEdges[1].w];
                    info.sum = validEdges[0].w + validEdges[1].w;
                    info.detailStr = `取最小两边至 ${NODE_NAMES[validEdges[0].t]}, ${NODE_NAMES[validEdges[1].t]}`;
                }
                
                totalSum += info.sum;
                details.push(info);
            }
            return { details, totalSum, bound: Math.ceil(totalSum / 2) };
        }

        // 预生成所有算法执行步骤，保证前端回放状态绝对稳定
        function generateAlgorithmSteps() {
            const steps = [];
            let bestCost = Infinity;
            let bestTour = null;
            
            let initialBoundData = calculateBoundWithDetails([0]);
            let pq = [{ path: [0], cost: 0, bound: initialBoundData.bound, boundDetails: initialBoundData }];
            let treeNodesDict = { '0': { path: [0], status: 'queue', bound: initialBoundData.bound } };

            const createSnapshot = (type, actionMsg, currentData = null) => {
                return {
                    type,
                    actionMsg,
                    currentNode: currentData ? JSON.parse(JSON.stringify(currentData)) : null,
                    queue: JSON.parse(JSON.stringify(pq)),
                    bestTour: bestTour ? [...bestTour] : null,
                    bestCost,
                    treeNodes: JSON.parse(JSON.stringify(treeNodesDict))
                };
            };

            steps.push(createSnapshot('INIT', "系统初始化。计算根节点 A 的初始下界，将其加入优先队列。"));

            while (pq.length > 0) {
                // 优先队列出队逻辑：按 bound 从小到大排序 (Best-First Search)
                pq.sort((a, b) => a.bound - b.bound);
                const current = pq.shift();
                
                treeNodesDict[current.path.join('-')].status = 'visited';
                steps.push(createSnapshot('POP', `【展开节点】从队列中取出具有最小下界 (${current.bound}) 的状态分支：[${pathToString(current.path)}]`, current));

                // 剪枝判定 1：出队时直接比对
                if (current.bound >= bestCost) {
                    treeNodesDict[current.path.join('-')].status = 'pruned';
                    steps.push(createSnapshot('PRUNE', `【剪枝生效】当前分支下界(${current.bound}) 大于等于 已知最优解(${bestCost})。该分支不可能产生更优解，停止向下搜索。`, current));
                    continue;
                }

                // 到达叶子节点（构成完整回路）
                if (current.path.length === N) {
                    const tourCost = current.cost + DIST_MATRIX[current.path[N-1]][current.path[0]];
                    if (tourCost < bestCost) {
                        bestCost = tourCost;
                        bestTour = [...current.path, current.path[0]];
                        treeNodesDict[current.path.join('-')].status = 'optimal';
                        steps.push(createSnapshot('NEW_BEST', `【发现更优解】找到一条完整回路：${pathToString(bestTour)}，总代价为 ${bestCost}。更新全局最优界限！`, current));
                    } else {
                        steps.push(createSnapshot('EVAL_LEAF', `【完整回路】找到回路代价为 ${tourCost}，但不优于当前最优解 ${bestCost}，忽略。`, current));
                    }
                    continue;
                }

                // 分支扩展
                const lastNode = current.path[current.path.length - 1];
                for (let i = 0; i < N; i++) {
                    if (!current.path.includes(i)) {
                        const newPath = [...current.path, i];
                        const newCost = current.cost + DIST_MATRIX[lastNode][i];
                        const boundData = calculateBoundWithDetails(newPath);
                        const childData = { path: newPath, cost: newCost, bound: boundData.bound, boundDetails: boundData };
                        
                        treeNodesDict[newPath.join('-')] = { path: newPath, status: 'evaluating', bound: boundData.bound };
                        steps.push(createSnapshot('CALC_BOUND', `【计算下界】尝试分支扩展至城市 ${NODE_NAMES[i]}，构成路径 [${pathToString(newPath)}]. 正在计算此状态的下界...`, childData));

                        // 剪枝判定 2：生成子节点时直接比对
                        if (boundData.bound < bestCost) {
                            pq.push(childData);
                            treeNodesDict[newPath.join('-')].status = 'queue';
                            steps.push(createSnapshot('ADD_QUEUE', `【加入队列】计算得出该分支下界为 ${boundData.bound}。< 当前最优解 ${bestCost === Infinity ? '∞' : bestCost}，将其加入优先队列等待后续展开。`, childData));
                        } else {
                            treeNodesDict[newPath.join('-')].status = 'pruned';
                            steps.push(createSnapshot('PRUNE_CHILD', `【剪枝生效】计算得出该分支下界为 ${boundData.bound}。>= 当前最优解 ${bestCost}，直接舍弃此分支，不入队。`, childData));
                        }
                    }
                }
            }
            steps.push(createSnapshot('DONE', `【搜索完成】优先队列为空，搜索完毕。证明了最优回路确实为：${pathToString(bestTour)}，代价：${bestCost}。`));
            return steps;
        }

        const ALGORITHM_STEPS = generateAlgorithmSteps();

        // --- React 组件 ---

        // 1. 图形可视化组件
        const GraphView = ({ currentPath, bestTour }) => {
            const getEdgeColorAndWidth = (u, v) => {
                const uName = u, vName = v;
                // 是否在最优解中
                if (bestTour) {
                    for(let i=0; i<bestTour.length-1; i++){
                        if ((bestTour[i]===u && bestTour[i+1]===v) || (bestTour[i]===v && bestTour[i+1]===u)) {
                            return { stroke: '#22c55e', strokeWidth: 4, isOptimal: true }; // Green
                        }
                    }
                }
                // 是否在当前评估路径中
                if (currentPath) {
                    for(let i=0; i<currentPath.length-1; i++){
                        if ((currentPath[i]===u && currentPath[i+1]===v) || (currentPath[i]===v && currentPath[i+1]===u)) {
                            return { stroke: '#3b82f6', strokeWidth: 4, isActive: true }; // Blue
                        }
                    }
                }
                return { stroke: '#e5e7eb', strokeWidth: 2, isBase: true }; // Gray
            };

            const edges = [];
            for(let i=0; i<N; i++){
                for(let j=i+1; j<N; j++){
                    edges.push({u: i, v: j, style: getEdgeColorAndWidth(i, j)});
                }
            }
            // 确保高亮的边画在最上层
            edges.sort((a,b) => (a.style.isBase ? -1 : 1));

            return (
                <div className="relative w-full h-[320px] bg-white rounded-lg shadow border border-gray-200 flex items-center justify-center p-4">
                    <svg viewBox="0 0 300 300" className="w-full h-full max-w-sm">
                        {/* 绘制边 */}
                        {edges.map((edge, idx) => {
                            const p1 = NODE_POSITIONS[edge.u];
                            const p2 = NODE_POSITIONS[edge.v];
                            return (
                                <g key={`edge-${idx}`}>
                                    <line x1={p1.x} y1={p1.y} x2={p2.x} y2={p2.y} 
                                          stroke={edge.style.stroke} strokeWidth={edge.style.strokeWidth} 
                                          className="transition-all duration-300" />
                                    {/* 距离标签 */}
                                    <text x={(p1.x+p2.x)/2} y={(p1.y+p2.y)/2 - 5} fill={edge.style.isBase ? '#9ca3af' : '#1f2937'} fontSize="10" textAnchor="middle" className="font-semibold select-none">
                                        {DIST_MATRIX[edge.u][edge.v]}
                                    </text>
                                </g>
                            );
                        })}
                        {/* 绘制节点 */}
                        {NODE_POSITIONS.map((pos, idx) => {
                            const isActive = currentPath && currentPath.includes(idx);
                            const isOptimal = bestTour && bestTour.includes(idx);
                            let fill = '#f3f4f6';
                            let border = '#9ca3af';
                            if (isOptimal) { fill = '#dcfce7'; border = '#22c55e'; }
                            else if (isActive) { fill = '#dbeafe'; border = '#3b82f6'; }
                            
                            return (
                                <g key={`node-${idx}`}>
                                    <circle cx={pos.x} cy={pos.y} r="14" fill={fill} stroke={border} strokeWidth="3" className="transition-all duration-300" />
                                    <text x={pos.x} y={pos.y + 4} fontSize="12" fontWeight="bold" textAnchor="middle" fill="#1f2937">{NODE_NAMES[idx]}</text>
                                </g>
                            );
                        })}
                    </svg>
                    
                    {/* 图例 */}
                    <div className="absolute bottom-2 left-2 flex flex-col gap-1 text-xs text-gray-600 bg-white/80 p-2 rounded">
                        <div className="flex items-center gap-1"><div className="w-3 h-1 bg-blue-500"></div>当前路径</div>
                        <div className="flex items-center gap-1"><div className="w-3 h-1 bg-green-500"></div>全局最优回路</div>
                    </div>
                </div>
            );
        };

        // 2. 状态树递归组件
        const TreeNodeUI = ({ id, treeNodesDict, buildTreeStructure }) => {
            const nodeData = treeNodesDict[id];
            if (!nodeData) return null;
            
            const children = buildTreeStructure.filter(childId => childId.startsWith(id + '-') && childId.split('-').length === id.split('-').length + 1);
            
            const statusColors = {
                'queue': 'bg-gray-100 text-gray-700 border-gray-300',
                'evaluating': 'bg-yellow-100 text-yellow-800 border-yellow-400 ring-2 ring-yellow-400',
                'visited': 'bg-blue-100 text-blue-800 border-blue-300',
                'pruned': 'bg-red-100 text-red-800 border-red-300 opacity-60',
                'optimal': 'bg-green-100 text-green-800 border-green-400 font-bold shadow'
            };

            const labelStr = `[${pathToString(nodeData.path)}]`;
            
            return (
                <div className="relative ml-6 mt-2 tree-line">
                    <div className="relative z-10 flex items-center tree-node-horizontal-line">
                        <div className={`px-2 py-1 text-xs rounded border transition-colors duration-200 ${statusColors[nodeData.status]} whitespace-nowrap`}>
                            {labelStr} | 下界: {nodeData.bound}
                        </div>
                        {nodeData.status === 'pruned' && <span className="ml-2 text-[10px] text-red-500 font-bold">✖ 剪枝</span>}
                        {nodeData.status === 'optimal' && <span className="ml-2 text-[10px] text-green-600 font-bold">★ 最优</span>}
                    </div>
                    {children.length > 0 && (
                        <div className="flex flex-col border-l-2 border-transparent">
                            {children.map(childId => (
                                <TreeNodeUI key={childId} id={childId} treeNodesDict={treeNodesDict} buildTreeStructure={buildTreeStructure} />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const TreePanel = ({ treeNodes }) => {
            const allNodeIds = Object.keys(treeNodes).sort();
            return (
                <div className="w-full h-full bg-white rounded-lg shadow border border-gray-200 p-4 overflow-auto">
                    <h3 className="text-sm font-bold text-gray-700 mb-2 sticky top-0 bg-white/90 z-20 pb-2 border-b">
                        搜索状态树 (实时的空间划分)
                    </h3>
                    <div className="py-2">
                        <TreeNodeUI id="0" treeNodesDict={treeNodes} buildTreeStructure={allNodeIds} />
                    </div>
                </div>
            );
        };

        // 3. 限界计算详情表格
        const BoundTable = ({ boundDetails, stepType }) => {
            if (!boundDetails || (stepType !== 'CALC_BOUND' && stepType !== 'INIT')) {
                return (
                    <div className="w-full h-full bg-white rounded-lg shadow border border-gray-200 p-4 flex items-center justify-center text-gray-400 text-sm">
                        当系统在计算下界时，此处将显示完整的推导数学逻辑。
                    </div>
                );
            }

            const typeLabel = {
                'start': '起始节点',
                'internal': '路径内节点',
                'endpoint': '路径端点',
                'unvisited': '未访问节点'
            };

            return (
                <div className="w-full h-full bg-white rounded-lg shadow border border-gray-200 p-4 flex flex-col">
                    <h3 className="text-sm font-bold text-blue-700 mb-2">下界 (Lower Bound) 计算详情</h3>
                    <p className="text-xs text-gray-600 mb-3 border-b pb-2">
                        <strong>计算法则：</strong>针对每个城市，挑选两条必选或权重最小的边。最后求总和除以 2 并向上取整。
                    </p>
                    <div className="flex-1 overflow-auto">
                        <table className="w-full text-xs text-left">
                            <thead className="bg-gray-50 sticky top-0">
                                <tr>
                                    <th className="px-2 py-1 font-semibold border-b w-12">节点</th>
                                    <th className="px-2 py-1 font-semibold border-b w-24">当前角色</th>
                                    <th className="px-2 py-1 font-semibold border-b">边选择依据与数值</th>
                                    <th className="px-2 py-1 font-semibold border-b text-right w-16">行合计</th>
                                </tr>
                            </thead>
                            <tbody>
                                {boundDetails.details.map((row, i) => (
                                    <tr key={i} className="border-b border-gray-100 hover:bg-gray-50">
                                        <td className="px-2 py-2 font-bold">{row.name}</td>
                                        <td className="px-2 py-2"><span className="bg-gray-100 px-1 rounded text-gray-600">{typeLabel[row.type]}</span></td>
                                        <td className="px-2 py-2 text-gray-700">
                                            {row.detailStr}<br/>
                                            <span className="text-blue-600 font-mono">[{row.edges.join(' + ')}]</span>
                                        </td>
                                        <td className="px-2 py-2 text-right font-bold text-gray-800">{row.sum}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="mt-3 pt-2 border-t border-gray-200 bg-blue-50 p-2 rounded">
                        <div className="text-sm flex justify-between">
                            <span>所有行合计：<strong>{boundDetails.totalSum}</strong></span>
                            <span>下界 = Ceil(合计 / 2) = <strong className="text-blue-700 text-lg">{boundDetails.bound}</strong></span>
                        </div>
                    </div>
                </div>
            );
        };

        // 4. 主应用
        const App = () => {
            const [stepIndex, setStepIndex] = React.useState(0);
            
            const currentStep = ALGORITHM_STEPS[stepIndex];
            const isLast = stepIndex === ALGORITHM_STEPS.length - 1;
            const isFirst = stepIndex === 0;

            const nextStep = () => !isLast && setStepIndex(s => s + 1);
            const prevStep = () => !isFirst && setStepIndex(s => s - 1);
            const reset = () => setStepIndex(0);

            // 快捷键支持
            React.useEffect(() => {
                const handleKeyDown = (e) => {
                    if(e.key === 'ArrowRight') nextStep();
                    if(e.key === 'ArrowLeft') prevStep();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [stepIndex]);

            return (
                <div className="w-full h-screen flex flex-col p-4 box-border max-w-7xl mx-auto min-w-[1000px]">
                    {/* Header 控制栏 */}
                    <div className="flex-none h-16 bg-white shadow rounded-lg mb-4 flex items-center justify-between px-6 border border-gray-200">
                        <div>
                            <h1 className="text-xl font-extrabold text-gray-800 flex items-center gap-2">
                                <i data-lucide="route" className="text-blue-600"></i>
                                TSP 分支限界法可视化
                            </h1>
                            <div className="text-xs text-gray-500 mt-1">支持键盘左右方向键控制单步执行。当前规模: 5座城市全连接。</div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="bg-gray-100 px-4 py-1 rounded-full text-sm font-semibold shadow-inner border border-gray-200">
                                进度: <span className="text-blue-600">{stepIndex + 1}</span> / {ALGORITHM_STEPS.length}
                            </div>
                            <div className="flex gap-2">
                                <button onClick={reset} className="px-4 py-1.5 bg-gray-50 border border-gray-300 text-gray-700 rounded hover:bg-gray-100 text-sm font-medium transition-colors">重置</button>
                                <button onClick={prevStep} disabled={isFirst} className="px-4 py-1.5 bg-blue-50 border border-blue-200 text-blue-700 rounded hover:bg-blue-100 disabled:opacity-50 text-sm font-medium transition-colors">上一步</button>
                                <button onClick={nextStep} disabled={isLast} className="px-4 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700 disabled:opacity-50 text-sm font-medium shadow transition-colors">下一步</button>
                            </div>
                        </div>
                    </div>

                    {/* 主内容区 - 严格控制高度使得各区域绝对不变 */}
                    <div className="flex-1 flex gap-4 min-h-0">
                        {/* 左侧专区：图形 + 核心日志 */}
                        <div className="w-[45%] flex flex-col gap-4">
                            {/* 图形展示组件 */}
                            <div className="flex-none">
                                <GraphView 
                                    currentPath={currentStep.currentNode?.path} 
                                    bestTour={currentStep.bestTour} 
                                />
                            </div>
                            
                            {/* 全局状态与日志 */}
                            <div className="flex-1 flex flex-col bg-gray-800 rounded-lg shadow overflow-hidden border border-gray-700">
                                <div className="p-3 bg-gray-900 border-b border-gray-700 flex justify-between text-gray-300 text-sm font-mono">
                                    <span>[全局最优上界: <strong className="text-green-400 text-base">{currentStep.bestCost === Infinity ? '无穷大' : currentStep.bestCost}</strong>]</span>
                                    <span>[优先队列深度: {currentStep.queue.length}]</span>
                                </div>
                                <div className="p-4 flex-1 flex flex-col">
                                    <h3 className="text-gray-400 text-xs uppercase tracking-wider mb-2">当前操作执行动作解析</h3>
                                    <div className="bg-gray-900/50 rounded border border-gray-700/50 p-4 flex-1">
                                        <p className="text-white text-base leading-relaxed break-words">
                                            {currentStep.actionMsg}
                                        </p>
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-gray-700">
                                        <h3 className="text-gray-400 text-xs uppercase tracking-wider mb-2">优先队列状况 (按界限从小到大)</h3>
                                        <div className="flex flex-wrap gap-2">
                                            {currentStep.queue.length === 0 ? <span className="text-gray-500 text-sm italic">空</span> : null}
                                            {currentStep.queue.slice(0, 10).map((qItem, idx) => (
                                                <span key={idx} className="px-2 py-1 bg-gray-700 text-gray-200 text-xs rounded border border-gray-600">
                                                    [{pathToString(qItem.path)}] - 下界:{qItem.bound}
                                                </span>
                                            ))}
                                            {currentStep.queue.length > 10 && <span className="text-gray-500 text-xs">...</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右侧专区：状态树 + 限界计算表格 */}
                        <div className="w-[55%] flex flex-col gap-4 min-h-0">
                            {/* 状态树视图 */}
                            <div className="h-3/5 min-h-0">
                                <TreePanel treeNodes={currentStep.treeNodes} />
                            </div>
                            
                            {/* 下界表格视图 */}
                            <div className="h-2/5 min-h-0">
                                <BoundTable 
                                    boundDetails={currentStep.currentNode?.boundDetails} 
                                    stepType={currentStep.type} 
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 渲染完 React 组件后初始化图标
        setTimeout(() => {
            if(window.lucide) window.lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
