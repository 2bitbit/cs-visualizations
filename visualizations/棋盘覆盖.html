<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棋盘覆盖分治算法可视化</title>
    <!-- 引入 Tailwind CSS 进行现代 UI 样式设计 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        canvas { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-radius: 8px; }
        /* 自定义滚动条，如果需要的话 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 核心算法：生成棋盘覆盖的所有步骤
        function generateSteps(k, missingRow, missingCol) {
            const size = Math.pow(2, k);
            const steps = [];
            let trominoId = 0;

            // 递归函数
            // tr, tc: 当前子棋盘的左上角行、列坐标
            // dr, dc: 当前子棋盘中残缺方格的行、列坐标
            // currentSize: 当前子棋盘的边长
            function solve(tr, tc, dr, dc, currentSize) {
                if (currentSize === 1) return;
                
                const s = currentSize / 2; // 分割后的子棋盘边长
                const t = trominoId++;     // 当前骨牌编号
                // 使用黄金分割角生成高对比度且视觉舒适的颜色
                const color = `hsl(${(t * 137.508) % 360}, 75%, 60%)`;
                
                const squares = [];
                let nextMissing = {};

                // 检查左上角子棋盘 (Top-Left)
                if (dr < tr + s && dc < tc + s) {
                    nextMissing.tl = { r: dr, c: dc };
                } else {
                    squares.push({ r: tr + s - 1, c: tc + s - 1 });
                    nextMissing.tl = { r: tr + s - 1, c: tc + s - 1 };
                }

                // 检查右上角子棋盘 (Top-Right)
                if (dr < tr + s && dc >= tc + s) {
                    nextMissing.tr = { r: dr, c: dc };
                } else {
                    squares.push({ r: tr + s - 1, c: tc + s });
                    nextMissing.tr = { r: tr + s - 1, c: tc + s };
                }

                // 检查左下角子棋盘 (Bottom-Left)
                if (dr >= tr + s && dc < tc + s) {
                    nextMissing.bl = { r: dr, c: dc };
                } else {
                    squares.push({ r: tr + s, c: tc + s - 1 });
                    nextMissing.bl = { r: tr + s, c: tc + s - 1 };
                }

                // 检查右下角子棋盘 (Bottom-Right)
                if (dr >= tr + s && dc >= tc + s) {
                    nextMissing.br = { r: dr, c: dc };
                } else {
                    squares.push({ r: tr + s, c: tc + s });
                    nextMissing.br = { r: tr + s, c: tc + s };
                }

                // 将中心放置的骨牌作为一个步骤记录下来
                steps.push({ id: t, squares, color });

                // 递归四个子问题
                solve(tr, tc, nextMissing.tl.r, nextMissing.tl.c, s);
                solve(tr, tc + s, nextMissing.tr.r, nextMissing.tr.c, s);
                solve(tr + s, tc, nextMissing.bl.r, nextMissing.bl.c, s);
                solve(tr + s, tc + s, nextMissing.br.r, nextMissing.br.c, s);
            }

            solve(0, 0, missingRow, missingCol, size);
            return steps;
        }

        function App() {
            const [k, setK] = useState(3); // 默认 8x8 (k=3)
            const size = Math.pow(2, k);
            const [missingPos, setMissingPos] = useState({ r: 2, c: 3 });
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            
            const canvasRef = useRef(null);
            
            // 使用 useMemo 缓存生成的步骤，避免每次渲染都重新计算
            const steps = useMemo(() => {
                return generateSteps(k, missingPos.r, missingPos.c);
            }, [k, missingPos]);

            // 绘制逻辑
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                
                // 设置高分屏抗锯齿
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);
                
                const width = rect.width;
                const height = rect.height;
                const cellSize = width / size;

                // 清空画布
                ctx.clearRect(0, 0, width, height);

                // 1. 绘制网格背景
                ctx.strokeStyle = '#e2e8f0'; // slate-200
                ctx.lineWidth = 1;
                for (let i = 0; i <= size; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * cellSize);
                    ctx.lineTo(width, i * cellSize);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(i * cellSize, 0);
                    ctx.lineTo(i * cellSize, height);
                    ctx.stroke();
                }

                // 2. 绘制目前进度内的所有骨牌
                for (let i = 0; i < currentStep; i++) {
                    const step = steps[i];
                    ctx.fillStyle = step.color;
                    ctx.strokeStyle = '#ffffff'; // 白色边界使骨牌更清晰
                    ctx.lineWidth = 2;
                    
                    step.squares.forEach(sq => {
                        const x = sq.c * cellSize;
                        const y = sq.r * cellSize;
                        // 绘制色块
                        ctx.fillRect(x, y, cellSize, cellSize);
                        // 绘制边界
                        ctx.strokeRect(x, y, cellSize, cellSize);
                    });
                }

                // 3. 绘制残缺方格 (使用深色标识)
                ctx.fillStyle = '#1e293b'; // slate-800
                ctx.fillRect(missingPos.c * cellSize, missingPos.r * cellSize, cellSize, cellSize);
                
                // 绘制残缺方格的交叉线以增强视觉辨识
                ctx.strokeStyle = '#ef4444'; // red-500
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(missingPos.c * cellSize, missingPos.r * cellSize);
                ctx.lineTo((missingPos.c + 1) * cellSize, (missingPos.r + 1) * cellSize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo((missingPos.c + 1) * cellSize, missingPos.r * cellSize);
                ctx.lineTo(missingPos.c * cellSize, (missingPos.r + 1) * cellSize);
                ctx.stroke();

            }, [size, missingPos, currentStep, steps]);

            // 自动播放逻辑
            useEffect(() => {
                let timer;
                if (isPlaying) {
                    timer = setInterval(() => {
                        setCurrentStep(prev => {
                            if (prev < steps.length) {
                                return prev + 1;
                            } else {
                                setIsPlaying(false);
                                return prev;
                            }
                        });
                    }, k === 4 ? 50 : 200); // k=4(16x16)时加快播放速度
                }
                return () => clearInterval(timer);
            }, [isPlaying, steps.length, k]);

            // 控制方法
            const handleNext = () => setCurrentStep(Math.min(currentStep + 1, steps.length));
            const handlePrev = () => setCurrentStep(Math.max(currentStep - 1, 0));
            const handleReset = () => {
                setIsPlaying(false);
                setCurrentStep(0);
            };
            const handleComplete = () => {
                setIsPlaying(false);
                setCurrentStep(steps.length);
            }
            
            const handleRandomMissing = () => {
                handleReset();
                setMissingPos({
                    r: Math.floor(Math.random() * size),
                    c: Math.floor(Math.random() * size)
                });
            };

            const handleSizeChange = (e) => {
                const newK = parseInt(e.target.value);
                setK(newK);
                handleReset();
                const newSize = Math.pow(2, newK);
                // 确保残缺方格在新尺寸范围内
                setMissingPos({
                    r: Math.min(missingPos.r, newSize - 1),
                    c: Math.min(missingPos.c, newSize - 1)
                });
            };

            // 处理画布点击改变残缺方格
            const handleCanvasClick = (e) => {
                if (currentStep > 0 && currentStep < steps.length && !confirm('更改残缺位置将重置当前进度，确定吗？')) {
                    return;
                }
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const cellSize = rect.width / size;
                
                const c = Math.floor(x / cellSize);
                const r = Math.floor(y / cellSize);
                
                if(r >= 0 && r < size && c >= 0 && c < size) {
                    handleReset();
                    setMissingPos({r, c});
                }
            };

            return (
                <div className="min-h-screen flex flex-col items-center py-10 px-4">
                    <div className="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden">
                        
                        {/* Header */}
                        <div className="bg-slate-800 text-white p-6">
                            <h1 className="text-2xl font-bold mb-2">分治法：棋盘覆盖可视化</h1>
                            <p className="text-slate-300 text-sm">
                                递归地将棋盘划分为四个子棋盘，并在交界处放置 L 型骨牌以构造四个相似的子问题。
                                <br/> 棋盘大小：{size} × {size}，总方格数：{size * size}，骨牌总数：{steps.length}
                            </p>
                        </div>

                        {/* Main Content */}
                        <div className="flex flex-col md:flex-row p-6 gap-8">
                            
                            {/* Canvas Section */}
                            <div className="flex-1 flex flex-col items-center">
                                <div 
                                    className="relative cursor-pointer"
                                    title="点击棋盘任意位置重设残缺方格"
                                >
                                    <canvas 
                                        ref={canvasRef} 
                                        style={{ width: '100%', maxWidth: '512px', aspectRatio: '1/1' }}
                                        onClick={handleCanvasClick}
                                    />
                                </div>
                                <div className="w-full max-w-[512px] mt-4">
                                    <div className="flex justify-between text-xs text-slate-500 mb-1">
                                        <span>进度: {currentStep} / {steps.length}</span>
                                        <span>{Math.round((currentStep / steps.length) * 100)}%</span>
                                    </div>
                                    <div className="w-full bg-slate-200 rounded-full h-2">
                                        <div 
                                            className="bg-blue-600 h-2 rounded-full transition-all duration-300" 
                                            style={{ width: `${(currentStep / steps.length) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                            </div>

                            {/* Control Panel */}
                            <div className="w-full md:w-72 flex flex-col gap-6">
                                
                                {/* Settings */}
                                <div className="space-y-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                    <h3 className="font-semibold text-slate-700">参数设置</h3>
                                    <div>
                                        <label className="block text-sm text-slate-600 mb-1">棋盘大小 (k值)</label>
                                        <select 
                                            className="w-full border-slate-300 rounded-lg shadow-sm p-2 bg-white"
                                            value={k}
                                            onChange={handleSizeChange}
                                        >
                                            <option value={2}>4 × 4 (k=2)</option>
                                            <option value={3}>8 × 8 (k=3) - 推荐</option>
                                            <option value={4}>16 × 16 (k=4)</option>
                                        </select>
                                    </div>
                                    <button 
                                        onClick={handleRandomMissing}
                                        className="w-full py-2 px-4 bg-white border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors text-sm"
                                    >
                                        随机重置残缺位置
                                    </button>
                                </div>

                                {/* Execution Controls */}
                                <div className="space-y-4">
                                    <h3 className="font-semibold text-slate-700">执行控制</h3>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <button 
                                            onClick={handlePrev}
                                            disabled={currentStep === 0}
                                            className="py-2 bg-slate-100 text-slate-700 rounded-lg hover:bg-slate-200 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium"
                                        >
                                            上一步
                                        </button>
                                        <button 
                                            onClick={handleNext}
                                            disabled={currentStep === steps.length}
                                            className="py-2 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 disabled:opacity-50 disabled:cursor-not-allowed text-sm font-medium"
                                        >
                                            下一步
                                        </button>
                                    </div>

                                    <button 
                                        onClick={() => setIsPlaying(!isPlaying)}
                                        disabled={currentStep === steps.length}
                                        className={`w-full py-3 rounded-lg text-white font-semibold transition-colors shadow-sm flex justify-center items-center gap-2
                                            ${isPlaying ? 'bg-amber-500 hover:bg-amber-600' : 'bg-blue-600 hover:bg-blue-700'}
                                            disabled:bg-slate-400 disabled:cursor-not-allowed`}
                                    >
                                        {isPlaying ? (
                                            <>
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                暂停播放
                                            </>
                                        ) : (
                                            <>
                                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                                自动播放
                                            </>
                                        )}
                                    </button>

                                    <div className="flex gap-2">
                                        <button 
                                            onClick={handleReset}
                                            className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 text-sm"
                                        >
                                            清空重置
                                        </button>
                                        <button 
                                            onClick={handleComplete}
                                            className="flex-1 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 text-sm"
                                        >
                                            直接完成
                                        </button>
                                    </div>
                                </div>

                                {/* Hint */}
                                <div className="text-xs text-slate-500 bg-blue-50 p-3 rounded-lg border border-blue-100">
                                    💡 提示：观察每一步时，你会发现总是**优先在十字交界处**放置骨牌，然后再递归处理缩小的子区域。
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
