<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最小生成树 - Kruskal 与 Prim 算法可视化</title>
    <!-- 引入 Tailwind CSS 进行现代 UI 布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 用于在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f3f4f6; margin: 0; padding: 20px; font-family: system-ui, -apple-system, sans-serif; }
        canvas {
            display: block;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 800px;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 1. 图的数据定义 (复杂例子) ---
        const initialNodes = [
            { id: 'A', x: 400, y: 50 },
            { id: 'B', x: 200, y: 150 },
            { id: 'C', x: 600, y: 150 },
            { id: 'D', x: 150, y: 350 },
            { id: 'E', x: 400, y: 250 },
            { id: 'F', x: 650, y: 350 },
            { id: 'G', x: 400, y: 450 },
        ];

        // u, v 为节点 ID, weight 为权重
        const initialEdges = [
            { u: 'A', v: 'B', weight: 7 },
            { u: 'A', v: 'E', weight: 5 },
            { u: 'A', v: 'C', weight: 8 },
            { u: 'B', v: 'D', weight: 9 },
            { u: 'B', v: 'E', weight: 7 },
            { u: 'C', v: 'E', weight: 5 },
            { u: 'C', v: 'F', weight: 8 },
            { u: 'D', v: 'E', weight: 15 },
            { u: 'D', v: 'G', weight: 6 },
            { u: 'E', v: 'G', weight: 9 },
            { u: 'F', v: 'G', weight: 11 },
            { u: 'E', v: 'F', weight: 8 },
        ];

        // --- 2. 并查集 (Union-Find) 辅助类 ---
        class UnionFind {
            constructor(nodes) {
                this.parent = {};
                this.rank = {};
                nodes.forEach(node => {
                    this.parent[node.id] = node.id;
                    this.rank[node.id] = 0;
                });
            }
            find(i) {
                if (this.parent[i] === i) return i;
                this.parent[i] = this.find(this.parent[i]); // 路径压缩
                return this.parent[i];
            }
            union(i, j) {
                let rootI = this.find(i);
                let rootJ = this.find(j);
                if (rootI !== rootJ) {
                    if (this.rank[rootI] < this.rank[rootJ]) {
                        this.parent[rootI] = rootJ;
                    } else if (this.rank[rootI] > this.rank[rootJ]) {
                        this.parent[rootJ] = rootI;
                    } else {
                        this.parent[rootJ] = rootI;
                        this.rank[rootI]++;
                    }
                    return true; // 合并成功，说明没形成环
                }
                return false; // 原本在同一集合，形成环
            }
        }

        // --- 3. React 主组件 ---
        function App() {
            const canvasRef = useRef(null);
            const [algorithm, setAlgorithm] = useState('kruskal'); // 新增算法切换状态
            
            // --- Kruskal 算法步骤生成 ---
            const generateKruskalSteps = () => {
                const steps = [];
                steps.push({
                    edges: [...initialEdges],
                    sortedEdges: [],
                    accepted: [],
                    rejected: [],
                    currentEvalEdge: null,
                    statusText: "初始图状态：共有 7 个节点，12 条边。准备开始 Kruskal 算法。",
                });

                const sorted = [...initialEdges].sort((a, b) => a.weight - b.weight);
                steps.push({
                    edges: [...initialEdges],
                    sortedEdges: [...sorted],
                    accepted: [],
                    rejected: [],
                    currentEvalEdge: null,
                    statusText: "步骤 1：按照边的权重从小到大对所有边进行排序。",
                });

                const uf = new UnionFind(initialNodes);
                let accepted = [];
                let rejected = [];
                let totalCost = 0;

                for (let i = 0; i < sorted.length; i++) {
                    const edge = sorted[i];
                    steps.push({
                        edges: [...initialEdges],
                        sortedEdges: [...sorted],
                        accepted: [...accepted],
                        rejected: [...rejected],
                        currentEvalEdge: edge,
                        statusText: `正在评估边 ${edge.u}-${edge.v} (权重: ${edge.weight})。检查并查集以防成环...`,
                    });

                    const isUnionSuccess = uf.union(edge.u, edge.v);

                    if (isUnionSuccess) {
                        accepted.push(edge);
                        totalCost += edge.weight;
                        steps.push({
                            edges: [...initialEdges],
                            sortedEdges: [...sorted],
                            accepted: [...accepted],
                            rejected: [...rejected],
                            currentEvalEdge: null,
                            statusText: `加入边 ${edge.u}-${edge.v} 不会形成环。已将其加入树！当前总权重: ${totalCost}`,
                        });
                        
                        if (accepted.length === initialNodes.length - 1) {
                            steps.push({
                                edges: [...initialEdges],
                                sortedEdges: [...sorted],
                                accepted: [...accepted],
                                rejected: [...rejected],
                                currentEvalEdge: null,
                                statusText: `生成树已包含 V-1 (${initialNodes.length - 1}) 条边。算法提前结束！MST总权重: ${totalCost}`,
                            });
                            break;
                        }
                    } else {
                        rejected.push(edge);
                        steps.push({
                            edges: [...initialEdges],
                            sortedEdges: [...sorted],
                            accepted: [...accepted],
                            rejected: [...rejected],
                            currentEvalEdge: null,
                            statusText: `⚠️ 拒绝边 ${edge.u}-${edge.v}。节点 ${edge.u} 和 ${edge.v} 已连通，加入会形成环。`,
                        });
                    }
                }
                return steps;
            };

            // --- Prim 算法步骤生成 ---
            const generatePrimSteps = () => {
                const steps = [];
                const visitedNodes = [];
                const candidateEdges = [];
                let accepted = [];
                let rejected = [];
                let totalCost = 0;

                steps.push({
                    visitedNodes: [],
                    candidateEdges: [],
                    accepted: [],
                    rejected: [],
                    currentEvalEdge: null,
                    statusText: "初始图状态。准备开始 Prim 算法。",
                });

                const startNode = initialNodes[0].id; // 从 A 开始
                visitedNodes.push(startNode);

                // 获取起始节点的相邻边
                const initialNeighbors = initialEdges.filter(e => e.u === startNode || e.v === startNode);
                candidateEdges.push(...initialNeighbors);
                candidateEdges.sort((a, b) => a.weight - b.weight); // 模拟优先队列

                steps.push({
                    visitedNodes: [...visitedNodes],
                    candidateEdges: [...candidateEdges],
                    accepted: [...accepted],
                    rejected: [...rejected],
                    currentEvalEdge: null,
                    statusText: `步骤 1：选择起点 ${startNode} 加入生成树，并将其相邻的所有边加入候选优先队列。`,
                });

                let maxIterations = 50; // 安全阀
                while (visitedNodes.length < initialNodes.length && candidateEdges.length > 0 && maxIterations-- > 0) {
                    const currentEdge = candidateEdges.shift(); // 从优先队列取出最小边

                    steps.push({
                        visitedNodes: [...visitedNodes],
                        candidateEdges: [...candidateEdges],
                        accepted: [...accepted],
                        rejected: [...rejected],
                        currentEvalEdge: currentEdge,
                        statusText: `从优先队列中取出权重最小的横跨边 ${currentEdge.u}-${currentEdge.v} (权重: ${currentEdge.weight}) 进行评估。`,
                    });

                    const isUVisited = visitedNodes.includes(currentEdge.u);
                    const isVVisited = visitedNodes.includes(currentEdge.v);

                    if (isUVisited && isVVisited) {
                        rejected.push(currentEdge);
                        steps.push({
                            visitedNodes: [...visitedNodes],
                            candidateEdges: [...candidateEdges],
                            accepted: [...accepted],
                            rejected: [...rejected],
                            currentEvalEdge: null,
                            statusText: `⚠️ 拒绝边 ${currentEdge.u}-${currentEdge.v}。两端节点均已在已访问集合中，加入会构成内部环。`,
                        });
                    } else {
                        const newNode = isUVisited ? currentEdge.v : currentEdge.u;
                        
                        accepted.push(currentEdge);
                        visitedNodes.push(newNode);
                        totalCost += currentEdge.weight;

                        steps.push({
                            visitedNodes: [...visitedNodes],
                            candidateEdges: [...candidateEdges],
                            accepted: [...accepted],
                            rejected: [...rejected],
                            currentEvalEdge: null,
                            statusText: `加入边 ${currentEdge.u}-${currentEdge.v}。成功将新节点 ${newNode} 并入生成树！当前总权重: ${totalCost}`,
                        });

                        // 探索新节点的外部边
                        const newNeighbors = initialEdges.filter(e => {
                            if (e.u === newNode && !visitedNodes.includes(e.v)) return true;
                            if (e.v === newNode && !visitedNodes.includes(e.u)) return true;
                            return false;
                        });

                        newNeighbors.forEach(newEdge => {
                            if (!candidateEdges.find(ce => ce.u === newEdge.u && ce.v === newEdge.v)) {
                                candidateEdges.push(newEdge);
                            }
                        });

                        candidateEdges.sort((a, b) => a.weight - b.weight); // 重新排序保持优先队列特性

                        steps.push({
                            visitedNodes: [...visitedNodes],
                            candidateEdges: [...candidateEdges],
                            accepted: [...accepted],
                            rejected: [...rejected],
                            currentEvalEdge: null,
                            statusText: `将节点 ${newNode} 连接到未知区域的新边加入优先队列，并按权重重新升序排列。`,
                        });
                    }
                }

                steps.push({
                    visitedNodes: [...visitedNodes],
                    candidateEdges: [...candidateEdges],
                    accepted: [...accepted],
                    rejected: [...rejected],
                    currentEvalEdge: null,
                    statusText: `🎉 Prim 算法执行完毕！生成树已连通所有节点，最小生成树总权重: ${totalCost}`,
                });

                return steps;
            };

            // 预计算所有步骤
            const executionSteps = useMemo(() => {
                return algorithm === 'kruskal' ? generateKruskalSteps() : generatePrimSteps();
            }, [algorithm]);

            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);

            // 切换算法时重置
            useEffect(() => {
                setCurrentStep(0);
                setIsPlaying(false);
            }, [algorithm]);

            const state = executionSteps[currentStep];

            // --- 4. 自动播放逻辑 ---
            useEffect(() => {
                let timer;
                if (isPlaying) {
                    timer = setTimeout(() => {
                        if (currentStep < executionSteps.length - 1) {
                            setCurrentStep(prev => prev + 1);
                        } else {
                            setIsPlaying(false);
                        }
                    }, 1500); 
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, executionSteps.length]);

            // --- 5. Canvas 绘制逻辑 ---
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                canvas.width = 800 * dpr;
                canvas.height = 500 * dpr;
                ctx.scale(dpr, dpr);
                
                ctx.clearRect(0, 0, 800, 500);

                const getNodePos = (id) => initialNodes.find(n => n.id === id);

                const drawEdge = (edge, color, width, dash = []) => {
                    const pos1 = getNodePos(edge.u);
                    const pos2 = getNodePos(edge.v);
                    ctx.beginPath();
                    ctx.setLineDash(dash);
                    ctx.moveTo(pos1.x, pos1.y);
                    ctx.lineTo(pos2.x, pos2.y);
                    ctx.strokeStyle = color;
                    ctx.lineWidth = width;
                    ctx.stroke();

                    const midX = (pos1.x + pos2.x) / 2;
                    const midY = (pos1.y + pos2.y) / 2;
                    ctx.setLineDash([]);
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(midX, midY, 12, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = color;
                    ctx.font = 'bold 14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(edge.weight, midX, midY);
                };

                initialEdges.forEach(edge => drawEdge(edge, '#e5e7eb', 2));
                state.rejected.forEach(edge => drawEdge(edge, '#ef4444', 2, [5, 5]));
                state.accepted.forEach(edge => drawEdge(edge, '#22c55e', 4));

                // 绘制当前正在评估的边
                if (state.currentEvalEdge) {
                    drawEdge(state.currentEvalEdge, '#f59e0b', 6);
                }

                // 绘制节点 (Prim 算法加入绿色高亮标识)
                initialNodes.forEach(node => {
                    const isVisited = algorithm === 'prim' && state.visitedNodes && state.visitedNodes.includes(node.id);
                    
                    ctx.beginPath();
                    ctx.arc(node.x, node.y, 20, 0, 2 * Math.PI);
                    ctx.fillStyle = isVisited ? '#10b981' : '#3b82f6'; // 绿 or 蓝
                    ctx.fill();
                    ctx.strokeStyle = isVisited ? '#059669' : '#2563eb';
                    ctx.lineWidth = 3;
                    ctx.stroke();

                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(node.id, node.x, node.y);
                });

            }, [state, algorithm]);

            return (
                <div className="flex flex-col items-center gap-6 pb-10">
                    <div className="w-full max-w-4xl bg-white p-6 rounded-xl shadow-lg mt-6">
                        <div className="flex justify-between items-center mb-4">
                            <h1 className="text-2xl font-bold text-gray-800">最小生成树算法可视化</h1>
                            {/* 算法切换器 */}
                            <div className="flex bg-gray-100 rounded-lg p-1">
                                <button 
                                    className={`px-4 py-2 rounded-md font-medium text-sm transition-colors ${algorithm === 'kruskal' ? 'bg-white shadow text-blue-600' : 'text-gray-600 hover:bg-gray-200'}`}
                                    onClick={() => setAlgorithm('kruskal')}
                                >
                                    Kruskal 算法
                                </button>
                                <button 
                                    className={`px-4 py-2 rounded-md font-medium text-sm transition-colors ${algorithm === 'prim' ? 'bg-white shadow text-blue-600' : 'text-gray-600 hover:bg-gray-200'}`}
                                    onClick={() => setAlgorithm('prim')}
                                >
                                    Prim 算法
                                </button>
                            </div>
                        </div>
                        <p className="text-gray-600 text-sm mb-4">
                            {algorithm === 'kruskal' 
                                ? "Kruskal 贪心策略：全局寻找权重最小的边，使用并查集判断是否形成环。"
                                : "Prim 贪心策略：从单一节点出发，每次寻找连接已访问集合与未访问集合之间权重最小的横跨边。"}
                        </p>
                        
                        <div className="bg-blue-50 border-l-4 border-blue-500 p-4 mb-6 min-h-[80px] flex items-center">
                            <p className="text-lg font-medium text-blue-800">{state.statusText}</p>
                        </div>

                        <div className="relative border border-gray-200 rounded-lg overflow-hidden mb-6 bg-gray-50">
                            <canvas ref={canvasRef} style={{ width: '800px', height: '500px' }}></canvas>
                        </div>

                        <div className="flex flex-wrap items-center justify-between gap-4">
                            <div className="flex gap-2">
                                <button 
                                    className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded font-medium disabled:opacity-50"
                                    onClick={() => { setIsPlaying(false); setCurrentStep(0); }}
                                    disabled={currentStep === 0}
                                >
                                    重置
                                </button>
                                <button 
                                    className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded font-medium disabled:opacity-50"
                                    onClick={() => { setIsPlaying(false); setCurrentStep(p => Math.max(0, p - 1)); }}
                                    disabled={currentStep === 0}
                                >
                                    上一步
                                </button>
                                <button 
                                    className="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-medium disabled:opacity-50 shadow"
                                    onClick={() => { setIsPlaying(false); setCurrentStep(p => Math.min(executionSteps.length - 1, p + 1)); }}
                                    disabled={currentStep === executionSteps.length - 1}
                                >
                                    下一步
                                </button>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <span className="text-gray-500 font-mono">
                                    Step: {currentStep + 1} / {executionSteps.length}
                                </span>
                                <button 
                                    className={`px-6 py-2 rounded font-bold text-white shadow ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'}`}
                                    onClick={() => setIsPlaying(!isPlaying)}
                                    disabled={currentStep === executionSteps.length - 1}
                                >
                                    {isPlaying ? '暂停' : '自动播放'}
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* 动态适配的数据结构侧边栏 */}
                    <div className="w-full max-w-4xl bg-white p-6 rounded-xl shadow-lg">
                        {algorithm === 'kruskal' ? (
                            <>
                                <h2 className="text-xl font-bold text-gray-800 mb-4">全局边队列 (按权重升序)</h2>
                                <div className="flex flex-wrap gap-2">
                                    {state.sortedEdges && state.sortedEdges.length === 0 ? (
                                        <span className="text-gray-400">尚未排序...</span>
                                    ) : (
                                        state.sortedEdges && state.sortedEdges.map((edge, idx) => {
                                            let bgClass = "bg-gray-100 text-gray-600"; 
                                            if (state.accepted.includes(edge)) bgClass = "bg-green-100 text-green-700 border-green-300"; 
                                            else if (state.rejected.includes(edge)) bgClass = "bg-red-100 text-red-700 border-red-300 line-through"; 
                                            else if (state.currentEvalEdge === edge) bgClass = "bg-yellow-200 text-yellow-800 border-yellow-400 animate-pulse"; 

                                            return (
                                                <div key={idx} className={`border px-3 py-1 rounded text-sm font-mono ${bgClass}`}>
                                                    {edge.u}-{edge.v} : {edge.weight}
                                                </div>
                                            )
                                        })
                                    )}
                                </div>
                            </>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 mb-4">已访问节点集合 (Visited)</h2>
                                    <div className="flex flex-wrap gap-2">
                                        {state.visitedNodes && state.visitedNodes.length === 0 ? (
                                            <span className="text-gray-400">等待选择起始节点...</span>
                                        ) : (
                                            state.visitedNodes && state.visitedNodes.map((nodeId, idx) => (
                                                <div key={idx} className="bg-emerald-100 border border-emerald-300 text-emerald-800 px-4 py-2 rounded-full font-bold shadow-sm">
                                                    节点 {nodeId}
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                                <div>
                                    <h2 className="text-xl font-bold text-gray-800 mb-4">候选边优先队列 (Min-Heap)</h2>
                                    <div className="flex flex-wrap gap-2">
                                        {state.candidateEdges && state.candidateEdges.length === 0 ? (
                                            <span className="text-gray-400">队列为空...</span>
                                        ) : (
                                            state.candidateEdges && state.candidateEdges.map((edge, idx) => {
                                                let bgClass = "bg-blue-50 text-blue-700 border-blue-200";
                                                if (state.currentEvalEdge === edge) bgClass = "bg-yellow-200 text-yellow-800 border-yellow-400 animate-pulse";
                                                return (
                                                    <div key={idx} className={`border px-3 py-1 rounded text-sm font-mono ${bgClass}`}>
                                                        {edge.u}-{edge.v} : {edge.weight}
                                                    </div>
                                                )
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
