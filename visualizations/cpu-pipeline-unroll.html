<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU流水线与循环展开深度解析</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .inst-block { animation: popIn 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* 经典5级流水线颜色 */
        .bg-stage-if { background-color: #475569; border: 1px solid #64748b; color: white; } 
        .bg-stage-id { background-color: #2563eb; border: 1px solid #3b82f6; color: white; } 
        .bg-stage-ex { background-color: #059669; border: 1px solid #10b981; color: white; font-weight: 900; box-shadow: 0 0 8px rgba(16, 185, 129, 0.4);} 
        .bg-stage-me { background-color: #7c3aed; border: 1px solid #8b5cf6; color: white; } 
        .bg-stage-wb { background-color: #4f46e5; border: 1px solid #6366f1; color: white; } 
        
        /* 冲突与气泡 */
        .bg-hazard-data { background: repeating-linear-gradient(45deg, #ef4444, #ef4444 6px, #dc2626 6px, #dc2626 12px); border: 1px solid #fca5a5; color: white; opacity: 0.9;} 
        .bg-hazard-flush { background: repeating-linear-gradient(45deg, #3f3f46, #3f3f46 6px, #27272a 6px, #27272a 12px); border: 1px dashed #71717a; color: #a1a1aa; opacity: 0.9;}

        .no-select { user-select: none; }
        .row-hover:hover { background-color: rgba(255, 255, 255, 0.03); }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full p-4 flex flex-col gap-4"></div>

    <script type="text/babel">
        
        const SCENARIOS = {
            STANDARD: {
                id: 'standard', title: '标准循环 (未展开)', code: `for (i = 1; i <= n; i++) {\n  fact *= i;\n}`,
                desc: '分支跳转过于频繁。每次跳转在EX阶段解析出目标后，由于预测失败，必须冲刷(Flush)错误预取的指令。被冲刷的指令半途夭折，它们留下的空档，就是所谓的流水线气泡(Bubble)。',
                instructions: [
                    { iter: 1, text: 'fact *= i', isMul: true, trace: ['IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'i++; jmp',  isMul: false, trace: ['IF', 'ID', 'EX', 'ME', 'WB'] }, 
                    { iter: '?', text: '(幽灵预取指令)', isMul: false, isGhost: true, trace: [null, 'IF', 'ID', 'DROP'] },
                    { iter: '?', text: '(幽灵预取指令)', isMul: false, isGhost: true, trace: [null, 'IF', 'ID', 'DROP'] },
                    { iter: 2, text: 'fact *= i', isMul: true, trace: [null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'i++; jmp',  isMul: false, trace: [null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: '?', text: '(幽灵预取指令)', isMul: false, isGhost: true, trace: [null, null, null, null, 'IF', 'ID', 'DROP'] },
                    { iter: '?', text: '(幽灵预取指令)', isMul: false, isGhost: true, trace: [null, null, null, null, 'IF', 'ID', 'DROP'] },
                    { iter: 3, text: 'fact *= i', isMul: true, trace: [null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 3, text: 'i++; jmp',  isMul: false, trace: [null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                ]
            },
            BAD_UNROLL: {
                id: 'bad_unroll', title: '错误展开 (数据依赖)', code: `for (i=1; i<=n; i+=4) {\n  fact *= i;\n  fact *= i + 1;\n  fact *= i + 2;\n  fact *= i + 3;\n}`,
                desc: '极其经典的 Data Hazard (数据冒险)。第2条指令需要第1条指令的结果，被迫在译码(ID)阶段停顿(Stall)，等待上一条执行(EX)完毕。双发射被彻底打破，退化为阶梯状串行。',
                instructions: [
                    { iter: 1, text: 'fact *= i',   isMul: true, trace: ['IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'fact *= i+1', isMul: true, trace: ['IF', 'ID', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'fact *= i+2', isMul: true, trace: [null, 'IF', 'ID', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'fact *= i+3', isMul: true, trace: [null, 'IF', 'ID', 'D-ST', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'i+=4; jmp',   isMul: false, trace: [null, null, 'IF', 'ID', 'D-ST', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'fact *= i',   isMul: true, trace: [null, null, null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'fact *= i+1', isMul: true, trace: [null, null, null, null, null, null, null, null, 'IF', 'ID', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'fact *= i+2', isMul: true, trace: [null, null, null, null, null, null, null, null, null, 'IF', 'ID', 'D-ST', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'fact *= i+3', isMul: true, trace: [null, null, null, null, null, null, null, null, null, 'IF', 'ID', 'D-ST', 'D-ST', 'EX', 'ME', 'WB'] },
                ]
            },
            GOOD_UNROLL: {
                id: 'good_unroll', title: '完美展开 (利用ILP)', code: `for (i=1; i<=n; i+=4) {\n  f0 *= i;\n  f1 *= i + 1;\n  f2 *= i + 2;\n  f3 *= i + 3;\n}`,
                desc: '打破了数据依赖！f0/f1 互不干扰，CPU同时在同周期内抓取(IF)、译码(ID)并执行(EX)这两条指令。这就是超标量处理器的终极威力——指令级并行(ILP)。流水线像宽阔的高速公路般密集运行。',
                instructions: [
                    { iter: 1, text: 'f0 *= i',     isMul: true, trace: ['IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'f1 *= i+1',   isMul: true, trace: ['IF', 'ID', 'EX', 'ME', 'WB'] }, 
                    { iter: 1, text: 'f2 *= i+2',   isMul: true, trace: [null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 1, text: 'f3 *= i+3',   isMul: true, trace: [null, 'IF', 'ID', 'EX', 'ME', 'WB'] }, 
                    { iter: 1, text: 'i+=4; jmp',   isMul: false, trace: [null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'f0 *= i',     isMul: true, trace: [null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'f1 *= i+1',   isMul: true, trace: [null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'f2 *= i+2',   isMul: true, trace: [null, null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'f3 *= i+3',   isMul: true, trace: [null, null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                    { iter: 2, text: 'i+=4; jmp',   isMul: false, trace: [null, null, null, null, null, null, null, null, 'IF', 'ID', 'EX', 'ME', 'WB'] },
                ]
            }
        };

        // --- 全新的锚点与指示系统 ---
        // target: 指向网格的具体行列，代表事件发生地
        // boxX, boxY: 文本框在整个滚动区域的绝对坐标，固定在右上角无指令区
        const ANNOTATIONS = {
            STANDARD: [
                {
                    cycle: 4, 
                    target: { r: 2, c: 3 }, // DROP
                    text: "发现分支跳转！抛弃错误预取的指令，重新取指，产生流水线控制气泡。",
                    color: "orange",
                    boxX: 450, boxY: 30
                }
            ],
            BAD_UNROLL: [
                {
                    cycle: 3,
                    target: { r: 1, c: 2 }, // D-ST
                    text: "发现数据冒险(Data Hazard)！此条指令被迫在译码阶段停顿(ST)，等待上一条指令的结果。",
                    color: "red",
                    boxX: 400, boxY: 30
                },
                {
                    cycle: 6,
                    target: { r: 3, c: 5 }, // D-ST 2
                    text: "连环追尾阻塞！因为严重的数据依赖，期待的双发射并行被完全打破，指令只能像下楼梯一样串行执行。",
                    color: "red",
                    boxX: 550, boxY: 100
                }
            ],
            GOOD_UNROLL: [
                {
                    cycle: 3,
                    target: { r: 1, c: 2 }, // f1 的 EX
                    text: "完美爆发！指令级并行(ILP)产生：f0 与 f1 毫无数据依赖。CPU在同一个时钟周期内，同时将这两条指令发射执行(EX)！",
                    color: "green",
                    boxX: 400, boxY: 30
                }
            ]
        };

        const MAX_CYCLES = 20;

        const StageBlock = ({ stage }) => {
            if (!stage) return <div className="w-[44px] h-[28px] shrink-0"></div>;
            
            let bgClass = '';
            let text = stage;
            if (stage === 'IF') bgClass = 'bg-stage-if';
            if (stage === 'ID') bgClass = 'bg-stage-id';
            if (stage === 'EX') bgClass = 'bg-stage-ex';
            if (stage === 'ME') bgClass = 'bg-stage-me';
            if (stage === 'WB') bgClass = 'bg-stage-wb';
            if (stage === 'D-ST') { bgClass = 'bg-hazard-data'; text = 'ST'; }
            if (stage === 'DROP') { bgClass = 'bg-hazard-flush'; text = '冲刷'; }

            return (
                <div className="w-[44px] shrink-0 flex items-center justify-center p-[2px]">
                    <div className={`w-full h-[24px] flex items-center justify-center rounded text-[11px] font-mono font-bold shadow-sm inst-block ${bgClass}`}>
                        {text}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [activeMode, setActiveMode] = React.useState('STANDARD');
            const [currentCycle, setCurrentCycle] = React.useState(0);
            const [isPlaying, setIsPlaying] = React.useState(false);
            const timerRef = React.useRef(null);
            // 新增：记录上一次暂停的周期，防止点击继续播放后被死锁
            const lastPausedCycleRef = React.useRef(-1);

            const scenario = SCENARIOS[activeMode];
            const activeAnns = ANNOTATIONS[activeMode]?.filter(a => currentCycle >= a.cycle) || [];

            React.useEffect(() => {
                const newAnns = ANNOTATIONS[activeMode]?.filter(a => currentCycle === a.cycle) || [];
                // 仅在首次到达该周期时暂停，避免点击“继续播放”后立刻被死锁卡住
                if (newAnns.length > 0 && isPlaying && lastPausedCycleRef.current !== currentCycle) {
                    setIsPlaying(false); 
                    lastPausedCycleRef.current = currentCycle;
                }
            }, [currentCycle, activeMode, isPlaying]);

            React.useEffect(() => {
                if (isPlaying) {
                    timerRef.current = setInterval(() => {
                        setCurrentCycle(prev => {
                            if (prev >= MAX_CYCLES) {
                                setIsPlaying(false);
                                return prev;
                            }
                            return prev + 1;
                        });
                    }, 500); 
                } else {
                    clearInterval(timerRef.current);
                }
                return () => clearInterval(timerRef.current);
            }, [isPlaying]);

            const handleStep = () => {
                if (currentCycle < MAX_CYCLES) setCurrentCycle(prev => prev + 1);
                setIsPlaying(false);
            };
            const handleReset = () => {
                setCurrentCycle(0);
                setIsPlaying(false);
                lastPausedCycleRef.current = -1;
            };
            const handleModeSwitch = (mode) => {
                setActiveMode(mode);
                setCurrentCycle(0);
                setIsPlaying(false);
                lastPausedCycleRef.current = -1;
            };

            let executedMuls = 0;
            let stalls = 0;
            
            scenario.instructions.forEach(inst => {
                for (let t = 0; t < currentCycle; t++) {
                    if (inst.trace[t] === 'EX' && inst.isMul) executedMuls++;
                    if (inst.trace[t] === 'D-ST') stalls++;
                }
            });
            
            const ipc = currentCycle === 0 ? 0 : (executedMuls / currentCycle).toFixed(2);

            return (
                <div className="flex flex-col h-full gap-4 max-w-7xl mx-auto w-full">
                    <header className="glass-panel p-4 flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                                CPU指令流水线与时序可视化
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">深度剖析：数据冒险停顿 (Data Stall) 与 指令级并行 (ILP) 的底层真相。</p>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setIsPlaying(!isPlaying)} disabled={currentCycle >= MAX_CYCLES} className={`flex items-center gap-2 px-4 py-2 rounded font-semibold transition-colors ${isPlaying ? 'bg-amber-500 hover:bg-amber-600 text-white' : 'bg-emerald-500 hover:bg-emerald-600 text-white'} disabled:opacity-50 disabled:cursor-not-allowed`}>
                                {isPlaying ? <i data-lucide="pause" className="w-4 h-4"></i> : <i data-lucide="play" className="w-4 h-4"></i>}
                                {isPlaying ? '暂停' : '自动播放'}
                            </button>
                            <button onClick={handleStep} disabled={currentCycle >= MAX_CYCLES || isPlaying} className="flex items-center gap-2 px-4 py-2 bg-slate-700 hover:bg-slate-600 text-white rounded font-semibold transition-colors disabled:opacity-50">
                                <i data-lucide="step-forward" className="w-4 h-4"></i> 单步
                            </button>
                            <button onClick={handleReset} className="flex items-center gap-2 px-4 py-2 bg-rose-600 hover:bg-rose-700 text-white rounded font-semibold transition-colors">
                                <i data-lucide="rotate-ccw" className="w-4 h-4"></i> 重置
                            </button>
                        </div>
                    </header>

                    <div className="flex gap-4 flex-1 min-h-0">
                        {/* 左侧面板 */}
                        <div className="w-80 flex flex-col gap-4 shrink-0 h-full">
                            <div className="glass-panel p-2 flex flex-col gap-2 shrink-0">
                                {Object.keys(SCENARIOS).map(key => (
                                    <button 
                                        key={key} onClick={() => handleModeSwitch(key)}
                                        className={`px-4 py-3 rounded text-left transition-all border ${activeMode === key ? 'bg-blue-600/20 border-blue-400 text-blue-100' : 'bg-transparent border-transparent text-slate-400 hover:bg-slate-800'}`}
                                    >
                                        <div className="font-bold text-sm">{SCENARIOS[key].title}</div>
                                    </button>
                                ))}
                            </div>

                            <div className="glass-panel p-4 flex flex-col flex-1 min-h-0">
                                <h3 className="text-slate-300 font-semibold mb-2 flex items-center gap-2">
                                    <i data-lucide="code" className="w-4 h-4 text-blue-400"></i> C代码片段
                                </h3>
                                <div className="bg-[#0d1117] rounded border border-slate-700/50 p-4 overflow-auto flex-1 font-mono text-sm text-slate-300 whitespace-pre leading-relaxed">
                                    {scenario.code}
                                </div>
                            </div>

                            <div className="glass-panel p-4 shrink-0 bg-slate-800/50">
                                <h3 className="text-slate-300 font-semibold mb-3 flex items-center gap-2">
                                    <i data-lucide="activity" className="w-4 h-4 text-emerald-400"></i> 实时流水线指标
                                </h3>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-slate-900/50 p-2 rounded border border-slate-700 text-center">
                                        <div className="text-xs text-slate-400 mb-1">当前周期 (Clock)</div>
                                        <div className="text-xl font-bold font-mono text-white">{currentCycle} <span className="text-xs text-slate-500">/ {MAX_CYCLES}</span></div>
                                    </div>
                                    <div className="bg-slate-900/50 p-2 rounded border border-slate-700 text-center">
                                        <div className="text-xs text-slate-400 mb-1">有效执行(EX)</div>
                                        <div className="text-xl font-bold font-mono text-emerald-400">{executedMuls}</div>
                                    </div>
                                    <div className="bg-slate-900/50 p-2 rounded border border-slate-700 text-center">
                                        <div className="text-xs text-slate-400 mb-1">数据停顿(Stalls)</div>
                                        <div className="text-xl font-bold font-mono text-rose-400">{stalls}</div>
                                    </div>
                                    <div className="bg-slate-900/50 p-2 rounded border border-slate-700 text-center relative overflow-hidden">
                                        <div className="text-xs text-slate-400 mb-1">有效 IPC</div>
                                        <div className="text-xl font-bold font-mono text-blue-400">{ipc}</div>
                                        <div className="absolute bottom-0 left-0 h-1 bg-blue-500 transition-all" style={{width: `${(ipc / 2) * 100}%`}}></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* 右侧面板: 流水线甘特图 */}
                        <div className="flex-1 glass-panel flex flex-col min-w-0 overflow-hidden relative">
                            
                            <div className="bg-blue-900/30 border-b border-blue-500/30 p-4 shrink-0">
                                <p className="text-blue-100 text-sm leading-relaxed">
                                    <strong className="text-white">时序解析：</strong>{scenario.desc}
                                </p>
                            </div>

                            <div className="flex gap-3 p-3 shrink-0 border-b border-slate-700/50 bg-slate-800/30 text-xs no-select overflow-x-auto">
                                <span className="font-bold text-slate-400 mr-2">流水线级:</span>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-stage-if"></div> 取指(IF)</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-stage-id"></div> 译码(ID)</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-stage-ex"></div> 执行(EX)</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-stage-me"></div> 访存(ME)</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-stage-wb"></div> 写回(WB)</div>
                                <div className="w-px h-4 bg-slate-600 mx-2"></div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-hazard-data"></div> 停顿(Stall)</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 rounded-sm bg-hazard-flush"></div> 冲刷(Flush)</div>
                            </div>

                            <div className="flex-1 overflow-auto relative flex flex-col bg-[#0b1120]">
                                
                                <div className="flex sticky top-0 bg-[#0f172a] border-b border-slate-700/80 z-20">
                                    <div className="w-[140px] shrink-0 p-2 font-bold text-slate-400 text-xs flex items-end justify-end border-r border-slate-700/80 bg-[#0f172a]">
                                        指令顺序 (按内存)
                                    </div>
                                    <div className="flex">
                                        {Array.from({length: MAX_CYCLES}).map((_, i) => (
                                            <div key={`th-${i}`} className="w-[44px] shrink-0 text-center py-2 text-xs text-slate-500 font-mono border-l border-slate-700/30">
                                                T{i+1}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="relative pb-32">
                                    {scenario.instructions.map((inst, rowIdx) => (
                                        <div key={`row-${rowIdx}`} className="flex row-hover transition-colors border-b border-slate-800/50">
                                            <div className={`w-[140px] shrink-0 p-2 border-r border-slate-700/80 flex flex-col justify-center bg-[#0f172a]/90 sticky left-0 z-10`}>
                                                <div className={`text-[10px] mb-0.5 ${inst.isGhost ? 'text-rose-900/80' : 'text-slate-500'}`}>Iter {inst.iter}</div>
                                                <div className={`text-xs font-mono font-semibold ${inst.isGhost ? 'text-rose-700/80 italic' : (inst.isMul ? 'text-blue-300' : 'text-purple-300')}`}>
                                                    {inst.isGhost ? inst.text : `${rowIdx + 1}. ${inst.text}`}
                                                </div>
                                            </div>

                                            <div className="flex">
                                                {Array.from({length: MAX_CYCLES}).map((_, tIdx) => {
                                                    const isVisible = tIdx < currentCycle;
                                                    const stage = isVisible ? inst.trace[tIdx] : null;
                                                    return (
                                                        <div key={`cell-${rowIdx}-${tIdx}`} className="w-[44px] h-[36px] shrink-0 border-l border-slate-800/30 flex items-center justify-center">
                                                            <StageBlock stage={stage} />
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}

                                    {/* 垂直扫描线 */}
                                    {currentCycle > 0 && currentCycle <= MAX_CYCLES && (
                                        <div 
                                            className="absolute top-0 bottom-0 w-[2px] bg-yellow-400 shadow-[0_0_12px_rgba(250,204,21,1)] z-10 transition-all duration-300 ease-in-out pointer-events-none"
                                            style={{ left: `${140 + (currentCycle * 44) - 22}px` }}
                                        ></div>
                                    )}

                                    {/* 动态批注层: 指向目标格子的精确连线 */}
                                    <svg className="absolute inset-0 w-full pointer-events-none z-20" style={{ height: '100%' }}>
                                        <defs>
                                            <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
                                            </marker>
                                            <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#f97316" />
                                            </marker>
                                            <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                                                <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
                                            </marker>
                                        </defs>
                                        {activeAnns.map((ann, idx) => {
                                            const targetX = 140 + ann.target.c * 44 + 22;
                                            const targetY = ann.target.r * 37 + 18;

                                            // 文本框现在拥有固定的、无遮挡的位置
                                            const boxLeft = ann.boxX;
                                            const boxTop = ann.boxY;

                                            // 起点：文本框底部偏左一点
                                            const startX = boxLeft + 60; 
                                            const startY = boxTop + 55; // 估算文本框底部高度

                                            // 终点：目标格子的正上方边缘
                                            const endX = targetX;
                                            const endY = targetY - 18; 
                                            
                                            // 绘制完美的从上向下的引导曲线
                                            const pathD = `M ${startX} ${startY} C ${startX} ${(startY + endY) / 2}, ${endX} ${(startY + endY) / 2}, ${endX} ${endY}`;
                                            
                                            let strokeColor = "#3b82f6";
                                            if(ann.color === 'red') strokeColor = "#ef4444";
                                            if(ann.color === 'orange') strokeColor = "#f97316";
                                            if(ann.color === 'green') strokeColor = "#10b981";

                                            return (
                                                <g key={`group-${idx}`}>
                                                    <path 
                                                        d={pathD} 
                                                        fill="none" 
                                                        stroke={strokeColor} 
                                                        strokeWidth="2.5" 
                                                        strokeDasharray="4 4"
                                                        markerEnd={`url(#arrow-${ann.color})`}
                                                        style={{ animation: 'dash 1.5s linear infinite' }}
                                                    />
                                                    {/* 在文本框端增加一个小圆点作为锚点，强调"这里是根" */}
                                                    <circle cx={startX} cy={startY} r="3.5" fill={strokeColor} />
                                                </g>
                                            );
                                        })}
                                    </svg>
                                    <style>{`@keyframes dash { to { stroke-dashoffset: -16; } }`}</style>

                                    {/* 动态批注层: 玻璃拟态高透文本框 */}
                                    {activeAnns.map((ann, idx) => {
                                        const targetX = 140 + ann.target.c * 44 + 22;
                                        const targetY = ann.target.r * 37 + 18;
                                        
                                        const boxLeft = ann.boxX;
                                        const boxTop = ann.boxY;
                                        
                                        // 采用 /60 透明度 + backdrop-blur-md，保证文字清晰且不遮挡后方流水线
                                        let bgClass = "bg-slate-900/60 border-blue-400/50 shadow-blue-900/20";
                                        let textClass = "text-blue-100";
                                        if(ann.color === 'red') { bgClass = "bg-red-950/60 border-red-500/50 shadow-red-900/20"; textClass = "text-red-100"; }
                                        if(ann.color === 'orange') { bgClass = "bg-orange-950/60 border-orange-500/50 shadow-orange-900/20"; textClass = "text-orange-100"; }
                                        if(ann.color === 'green') { bgClass = "bg-emerald-950/60 border-emerald-500/50 shadow-emerald-900/20"; textClass = "text-emerald-100"; }

                                        return (
                                            <div 
                                                key={`tooltip-${idx}`}
                                                className={`absolute z-30 w-[240px] p-3 rounded-lg shadow-xl border backdrop-blur-md ${bgClass} ${textClass} text-[11px] leading-relaxed font-medium inst-block`}
                                                style={{ left: `${boxLeft}px`, top: `${boxTop}px` }}
                                            >
                                                {ann.text}
                                            </div>
                                        );
                                    })}

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
