<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache 相联度可视化引擎</title>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 加载 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 加载 Babel 以便在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px;}
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
        
        .cache-block { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .highlight-hit { background-color: #166534 !important; border-color: #4ade80 !important; box-shadow: 0 0 15px rgba(74, 222, 128, 0.5); transform: scale(1.02); }
        .highlight-miss { background-color: #991b1b !important; border-color: #f87171 !important; box-shadow: 0 0 15px rgba(248, 113, 113, 0.5); transform: scale(1.02); }
        .highlight-insert { background-color: #854d0e !important; border-color: #facc15 !important; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 精心设计的访问序列：展现 1路冲突、2路命中、全相联的优势
        const ACCESS_SEQUENCE = [0, 4, 0, 1, 5, 2, 0];
        const CACHE_CAPACITY = 4; // Cache 总行数始终为 4

        const MODES = {
            '1-way': { name: '直接映射 (1路)', sets: 4, ways: 1, desc: '只能进特定组的唯一位置。极易冲突。' },
            '2-way': { name: '2路组相联', sets: 2, ways: 2, desc: '映射到特定组，组内有2个位置可选。折中方案。' },
            'fully': { name: '全相联 (4路)', sets: 1, ways: 4, desc: '只有1个组，可以进任意位置。最不容易冲突。' }
        };

        function App() {
            const [mode, setMode] = useState('2-way');
            const [step, setStep] = useState(0);
            const [cache, setCache] = useState([]);
            const [logs, setLogs] = useState([]);
            const [stats, setStats] = useState({ hits: 0, misses: 0, evicts: 0 });
            const [clock, setClock] = useState(0);
            
            // 动画状态：记录当前高亮的 Cache Line
            const [activeAction, setActiveAction] = useState(null); // { setId, wayId, type: 'hit'|'miss'|'insert' }
            
            const logsEndRef = useRef(null);

            // 初始化或重置 Cache
            const resetSimulator = (newMode = mode) => {
                const config = MODES[newMode];
                const initialCache = Array(config.sets).fill(null).map(() => 
                    Array(config.ways).fill(null).map(() => ({ valid: false, block: null, lastUsed: -1 }))
                );
                setCache(initialCache);
                setStep(0);
                setLogs([`系统已重置。当前模式：${MODES[newMode].name}。Cache 总容量为 4 行。`]);
                setStats({ hits: 0, misses: 0, evicts: 0 });
                setClock(0);
                setActiveAction(null);
            };

            useEffect(() => {
                resetSimulator(mode);
            }, [mode]);

            useEffect(() => {
                if (logsEndRef.current) {
                    logsEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [logs]);

            const handleNextStep = () => {
                if (step >= ACCESS_SEQUENCE.length) return;

                const requestedBlock = ACCESS_SEQUENCE[step];
                const config = MODES[mode];
                const targetSetId = requestedBlock % config.sets;
                
                let targetSet = [...cache[targetSetId]];
                const currentClock = clock + 1;
                let newLogs = [...logs, `\n[时钟周期 ${currentClock}] CPU 请求主存块 ${requestedBlock}`];
                newLogs.push(`硬件求模：${requestedBlock} % ${config.sets} (组数) = 定位到 组 ${targetSetId}`);

                let isHit = false;
                let actionType = '';
                let actionWayId = -1;

                // 1. 并行比较 Tag (在模拟器中遍历该组的所有路)
                for (let way = 0; way < config.ways; way++) {
                    if (targetSet[way].valid && targetSet[way].block === requestedBlock) {
                        isHit = true;
                        targetSet[way].lastUsed = currentClock; // 更新 LRU
                        actionType = 'hit';
                        actionWayId = way;
                        newLogs.push(`✅ 缓存命中 (Cache Hit)！在组 ${targetSetId} 的 路 ${way} 中找到。`);
                        break;
                    }
                }

                // 2. 处理 Miss
                let isEvict = false;
                if (!isHit) {
                    // 寻找空闲位置
                    let emptyWay = targetSet.findIndex(line => !line.valid);
                    
                    if (emptyWay !== -1) {
                        // 有空位，直接放入
                        targetSet[emptyWay] = { valid: true, block: requestedBlock, lastUsed: currentClock };
                        actionType = 'insert';
                        actionWayId = emptyWay;
                        newLogs.push(`❌ 缓存缺失 (Miss)。组 ${targetSetId} 内有空位，放入 路 ${emptyWay}。`);
                    } else {
                        // 组满，执行 LRU 替换
                        isEvict = true;
                        let lruWay = 0;
                        let oldestTime = targetSet[0].lastUsed;
                        for (let way = 1; way < config.ways; way++) {
                            if (targetSet[way].lastUsed < oldestTime) {
                                oldestTime = targetSet[way].lastUsed;
                                lruWay = way;
                            }
                        }
                        const evictedBlock = targetSet[lruWay].block;
                        targetSet[lruWay] = { valid: true, block: requestedBlock, lastUsed: currentClock };
                        actionType = 'miss';
                        actionWayId = lruWay;
                        newLogs.push(`⚠️ 冲突缺失 (Conflict Miss)！组 ${targetSetId} 已满。`);
                        newLogs.push(`根据 LRU 算法，踢出最久未使用的 主存块 ${evictedBlock} (在路 ${lruWay})，换入 主存块 ${requestedBlock}。`);
                    }
                }

                // 更新状态
                const newCache = [...cache];
                newCache[targetSetId] = targetSet;
                
                setCache(newCache);
                setLogs(newLogs);
                setClock(currentClock);
                setStep(step + 1);
                setStats(prev => ({
                    hits: prev.hits + (isHit ? 1 : 0),
                    misses: prev.misses + (!isHit ? 1 : 0),
                    evicts: prev.evicts + (isEvict ? 1 : 0)
                }));
                
                setActiveAction({ setId: targetSetId, wayId: actionWayId, type: actionType });

                // 延迟清除高亮动画
                setTimeout(() => setActiveAction(null), 1200);
            };

            const PlayIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
            const RefreshIcon = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>);

            return (
                <div className="flex flex-col h-screen max-w-7xl mx-auto p-4 gap-4">
                    {/* 头部：标题与模式切换 */}
                    <header className="flex flex-wrap justify-between items-center bg-slate-800 p-5 rounded-xl border border-slate-700 shadow-lg">
                        <div>
                            <h1 className="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                                CPU Cache 映射策略可视化引擎
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">{MODES[mode].desc}</p>
                        </div>
                        <div className="flex gap-2 bg-slate-900 p-1 rounded-lg">
                            {Object.keys(MODES).map(m => (
                                <button 
                                    key={m}
                                    onClick={() => setMode(m)}
                                    className={`px-4 py-2 rounded-md text-sm font-medium transition-colors ${mode === m ? 'bg-blue-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`}
                                >
                                    {MODES[m].name}
                                </button>
                            ))}
                        </div>
                    </header>

                    {/* 主体内容区：强制固定高度与布局边界 */}
                    <div className="flex flex-1 gap-4 overflow-hidden min-h-[500px]">
                        
                        {/* 左侧：请求序列与控制 */}
                        <div className="w-1/3 flex flex-col gap-4">
                            {/* 请求序列队列 */}
                            <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col h-1/3">
                                <h2 className="text-lg font-semibold mb-3 text-slate-200 border-b border-slate-700 pb-2">CPU 内存请求队列</h2>
                                <div className="flex flex-wrap gap-2 overflow-y-auto">
                                    {ACCESS_SEQUENCE.map((block, idx) => (
                                        <div key={idx} className={`relative px-3 py-2 rounded border-2 font-mono text-center flex-1 min-w-[40px]
                                            ${idx < step ? 'bg-slate-700 border-slate-600 text-slate-400 opacity-50' : 
                                              idx === step ? 'bg-blue-900 border-blue-400 text-white shadow-[0_0_10px_rgba(96,165,250,0.5)] transform scale-110 z-10' : 
                                              'bg-slate-800 border-slate-600 text-slate-300'}`}>
                                            {block}
                                            {idx === step && <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 text-xs text-blue-400 font-bold">NEXT</div>}
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-auto pt-4 flex gap-3">
                                    <button 
                                        onClick={handleNextStep} 
                                        disabled={step >= ACCESS_SEQUENCE.length}
                                        className="flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 disabled:cursor-not-allowed text-white py-2 rounded-lg font-semibold transition-colors"
                                    >
                                        <PlayIcon /> {step >= ACCESS_SEQUENCE.length ? '已完成' : '单步执行 (Step)'}
                                    </button>
                                    <button 
                                        onClick={() => resetSimulator()} 
                                        className="flex items-center justify-center p-2 bg-slate-700 hover:bg-slate-600 text-white rounded-lg transition-colors"
                                        title="重置"
                                    >
                                        <RefreshIcon />
                                    </button>
                                </div>
                            </div>

                            {/* 日志监控面板 */}
                            <div className="bg-slate-900 border border-slate-700 rounded-xl p-0 flex flex-col flex-1 overflow-hidden font-mono text-sm relative shadow-inner">
                                <div className="absolute top-0 w-full bg-slate-800/90 backdrop-blur border-b border-slate-700 px-4 py-2 font-semibold text-slate-300 z-10">
                                    硬件解析日志
                                </div>
                                <div className="p-4 pt-10 overflow-y-auto h-full space-y-2">
                                    {logs.map((log, i) => (
                                        <div key={i} className={log.startsWith('\n') ? "mt-4 text-blue-300 font-bold" : "text-slate-400 pl-2 border-l-2 border-slate-700"}>
                                            {log.replace('\n', '')}
                                        </div>
                                    ))}
                                    <div ref={logsEndRef} />
                                </div>
                            </div>
                        </div>

                        <div className="w-2/3 flex flex-col gap-4">
                            
                            {/* 数据看板 */}
                            <div className="flex gap-4">
                                <div className="bg-slate-800 border border-slate-700 rounded-xl p-4 flex-1 flex justify-between items-center">
                                    <div className="text-center"><div className="text-3xl font-bold text-emerald-400">{stats.hits}</div><div className="text-xs text-slate-400">命中 (Hits)</div></div>
                                    <div className="text-center"><div className="text-3xl font-bold text-red-400">{stats.misses}</div><div className="text-xs text-slate-400">缺失 (Misses)</div></div>
                                    <div className="text-center"><div className="text-3xl font-bold text-orange-400">{stats.evicts}</div><div className="text-xs text-slate-400">冲突替换</div></div>
                                    <div className="text-center border-l border-slate-700 pl-4">
                                        <div className="text-3xl font-bold text-blue-400">
                                            {step === 0 ? '0%' : Math.round((stats.hits / step) * 100) + '%'}
                                        </div>
                                        <div className="text-xs text-slate-400">命中率</div>
                                    </div>
                                </div>
                            </div>

                            {/* Cache 物理结构图 (使用固定的边界维持稳定布局) */}
                            <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 flex flex-col flex-1 relative overflow-hidden">
                                <h2 className="text-xl font-bold text-slate-200 mb-6 flex justify-between">
                                    <span>Cache 硬件结构剖析</span>
                                    <span className="text-sm font-normal text-slate-400 bg-slate-900 px-3 py-1 rounded">
                                        物理总容量: {CACHE_CAPACITY} 行
                                    </span>
                                </h2>
                                
                                {/* 核心的 Cache 网格渲染 */}
                                <div className="flex-1 flex flex-col gap-4 overflow-y-auto">
                                    {cache.map((set, setId) => (
                                        <div key={`set-${setId}`} className="flex items-stretch gap-3 bg-slate-900/50 p-3 rounded-lg border border-slate-700/50">
                                            {/* 组号标识 (Index) */}
                                            <div className="flex flex-col justify-center items-center bg-slate-800 rounded p-2 w-20 border-r-4 border-slate-600 shrink-0">
                                                <span className="text-xs text-slate-400">Set (组)</span>
                                                <span className="text-xl font-bold text-slate-200">{setId}</span>
                                            </div>
                                            
                                            {/* 组内各路 (Ways) */}
                                            <div className={`flex-1 grid gap-3 ${MODES[mode].ways === 1 ? 'grid-cols-1' : MODES[mode].ways === 2 ? 'grid-cols-2' : 'grid-cols-4'}`}>
                                                {set.map((line, wayId) => {
                                                    // 判断当前块是否正处于动画状态
                                                    const isActive = activeAction && activeAction.setId === setId && activeAction.wayId === wayId;
                                                    let highlightClass = '';
                                                    if (isActive) {
                                                        if (activeAction.type === 'hit') highlightClass = 'highlight-hit';
                                                        if (activeAction.type === 'miss') highlightClass = 'highlight-miss';
                                                        if (activeAction.type === 'insert') highlightClass = 'highlight-insert';
                                                    }

                                                    return (
                                                        <div key={`way-${wayId}`} 
                                                            className={`cache-block flex flex-col justify-between p-3 rounded bg-slate-800 border border-slate-600 min-h-[90px] relative overflow-hidden ${highlightClass}`}
                                                        >
                                                            <div className="flex justify-between items-center text-xs text-slate-500 mb-2">
                                                                <span>Way {wayId}</span>
                                                                {line.valid && <span className="px-1.5 bg-slate-700 rounded" title="LRU 访问时间戳">T:{line.lastUsed}</span>}
                                                            </div>
                                                            
                                                            <div className="flex-1 flex items-center justify-center">
                                                                {line.valid ? (
                                                                    <div className="flex flex-col items-center">
                                                                        <span className="text-sm text-slate-400">主存块</span>
                                                                        <span className="text-3xl font-mono font-bold text-white">
                                                                            {line.block}
                                                                        </span>
                                                                    </div>
                                                                ) : (
                                                                    <span className="text-slate-600 font-mono italic">空闲 (Empty)</span>
                                                                )}
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
