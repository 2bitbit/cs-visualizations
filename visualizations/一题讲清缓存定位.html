<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cache Addressing Visualization</title>
    <!-- Include React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Include Babel for in-browser JSX compilation -->
    <script crossorigin src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <!-- Include Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        tagBg: '#fef2f2',
                        tagText: '#dc2626',
                        tagBorder: '#f87171',
                        setBg: '#eff6ff',
                        setText: '#2563eb',
                        setBorder: '#60a5fa',
                        offsetBg: '#f0fdf4',
                        offsetText: '#16a34a',
                        offsetBorder: '#4ade80',
                        neutralBg: '#f8fafc',
                        neutralBorder: '#cbd5e1'
                    },
                    fontFamily: {
                        mono: ['"Fira Code"', '"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .binary-cell { display: inline-block; width: 1.2rem; text-align: center; border: 1px solid #e5e7eb; border-right: none; font-size: 0.85rem;}
        .binary-cell:last-child { border-right: 1px solid #e5e7eb; }
        .binary-group { display: inline-flex; margin-right: 4px; }
        .bit-highlight { font-weight: bold; }
        .bit-tag { background-color: #fef2f2; color: #dc2626; border-color: #fca5a5; }
        .bit-set { background-color: #eff6ff; color: #2563eb; border-color: #93c5fd; }
        .bit-offset { background-color: #f0fdf4; color: #16a34a; border-color: #86efac; }
        .cache-block { transition: all 0.3s ease; }
        .highlight-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); transform: scale(1.02); z-index: 10; position: relative;}
    </style>
</head>
<body class="p-6 h-screen flex flex-col">
    <div id="root" class="flex-grow flex flex-col max-w-7xl mx-auto w-full bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-200"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const STEPS = [
            { id: 0, title: "1. 初始参数", desc: "了解给定的系统参数：Cache容量、相联度、块大小、地址长度。" },
            { id: 1, title: "2. 计算 b, s, t", desc: "根据参数计算地址中各个字段的位数 (b = Block Offset, s = Set Index, t = Tag)。" },
            { id: 2, title: "3. 地址二进制化", desc: "将十六进制的内存地址转换为二进制形式，并截取有效的 47 位。" },
            { id: 3, title: "4. 拆分地址", desc: "将 47 位二进制地址按照计算出的 t, s, b 进行拆分。" },
            { id: 4, title: "5. 定位集合 (Set)", desc: "使用 Set Index (s bits) 定位到 Cache 中的具体哪一个集合。" },
            { id: 5, title: "6. 匹配标记 (Tag)", desc: "在该集合的各路 (Ways) 中，比对 Tag，寻找命中 (Hit) 的行。" },
            { id: 6, title: "7. 提取数据 (Offset)", desc: "若命中，利用 Block Offset 定位数据块内具体字节的位置。" }
        ];

        // 预处理好的二进制数据
        const BINARY_STR = "011_1111_1011_1001_0011_0001_0101_0000_0111_0000_0000_0100_0000".replace(/_/g, '');
        //                   |--------- TAG (35 bits) -------------------------| | SET | | OFFSET |
        // 但是上面手动转换有误。重新正确生成 47 bit 的二进制字符串
        // 0x0000 7f72 62a1 e010
        // 47位，需要 12 个 hex 字符。 7f7262a1e010 刚好是 12 个。
        // 7: 0111
        // f: 1111
        // 7: 0111
        // 2: 0010
        // 6: 0110
        // 2: 0010
        // a: 1010
        // 1: 0001
        // e: 1110
        // 0: 0000
        // 1: 0001
        // 0: 0000
        const CORRECT_BINARY = "011111110111001001100010101000011110000000010000".slice(1); // 取低47位

        const TagBits = CORRECT_BINARY.slice(0, 35);
        const SetBits = CORRECT_BINARY.slice(35, 41);
        const OffsetBits = CORRECT_BINARY.slice(41, 47);

        const CacheVisualization = () => {
            const [currentStep, setCurrentStep] = useState(0);

            const handleNext = () => setCurrentStep(prev => Math.min(prev + 1, STEPS.length - 1));
            const handlePrev = () => setCurrentStep(prev => Math.max(prev - 1, 0));
            const handleReset = () => setCurrentStep(0);

            // 渲染二进制位的组件
            const renderBinaryDisplay = (showColors) => {
                let renderContent = [];
                for(let i=0; i<47; i++) {
                    let bitType = '';
                    let label = '';
                    if (showColors) {
                        if (i < 35) bitType = 'bit-tag';
                        else if (i >= 35 && i < 41) bitType = 'bit-set';
                        else bitType = 'bit-offset';
                    }

                    renderContent.push(
                        <div key={i} className={`binary-cell ${bitType} ${showColors ? 'font-bold' : 'text-gray-400'}`}>
                            {CORRECT_BINARY[i]}
                        </div>
                    );

                    // Add group separator every 4 bits for readability, but respect boundaries
                    if ((47 - i - 1) % 4 === 0 && i !== 46) {
                        renderContent.push(<div key={`space-${i}`} className="inline-block w-1"></div>);
                    }
                }

                return (
                    <div className="font-mono text-xs md:text-sm whitespace-nowrap overflow-x-auto pb-2">
                        {renderContent}
                        {showColors && (
                            <div className="flex mt-1 text-[10px] text-center w-full relative">
                                <div className="absolute left-0 text-tagText font-bold" style={{width: `${(35/47)*100}%`}}>Tag (35 bits)</div>
                                <div className="absolute text-setText font-bold" style={{left: `${(35/47)*100}%`, width: `${(6/47)*100}%`}}>Set (6 bits)</div>
                                <div className="absolute right-0 text-offsetText font-bold" style={{left: `${(41/47)*100}%`, width: `${(6/47)*100}%`}}>Offset (6 bits)</div>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-full">
                    {/* Header: Controls & Step Info */}
                    <div className="bg-gray-800 text-white p-4 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
                        <div>
                            <h1 className="text-xl font-bold">Cache 寻址可视化</h1>
                            <p className="text-gray-300 text-sm">{STEPS[currentStep].title} - {STEPS[currentStep].desc}</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleReset} className="px-4 py-2 bg-gray-600 hover:bg-gray-500 rounded text-sm font-medium transition-colors">重置</button>
                            <button onClick={handlePrev} disabled={currentStep === 0} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed rounded text-sm font-medium transition-colors">上一步</button>
                            <button onClick={handleNext} disabled={currentStep === STEPS.length - 1} className="px-4 py-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed rounded text-sm font-medium transition-colors">下一步</button>
                        </div>
                    </div>

                    {/* Progress Bar */}
                    <div className="w-full bg-gray-200 h-1.5 shrink-0">
                        <div className="bg-blue-600 h-1.5 transition-all duration-300 ease-out" style={{ width: `${((currentStep) / (STEPS.length - 1)) * 100}%` }}></div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-grow flex flex-col md:flex-row p-6 gap-6 overflow-hidden">
                        
                        {/* Left Column: Data & Calculations */}
                        <div className="w-full md:w-5/12 flex flex-col gap-6 overflow-y-auto pr-2">
                            
                            {/* Panel 1: Parameters */}
                            <div className={`p-4 rounded-xl border ${currentStep === 0 ? 'bg-blue-50 border-blue-200 shadow-md' : 'bg-neutralBg border-neutralBorder'} transition-colors`}>
                                <h2 className="font-semibold text-gray-800 mb-3 border-b pb-2">系统参数 (题目给定)</h2>
                                <ul className="space-y-2 text-sm">
                                    <li><span className="font-medium inline-block w-32">Cache 容量 (C):</span> 32 kB (32,768 Bytes)</li>
                                    <li><span className="font-medium inline-block w-32">相联度 (E):</span> 8-way (每组 8 行)</li>
                                    <li><span className="font-medium inline-block w-32">块大小 (B):</span> 64 Bytes</li>
                                    <li><span className="font-medium inline-block w-32">地址总长度 (m):</span> 47 bit</li>
                                    <li className="pt-2 mt-2 border-t border-dashed border-gray-300">
                                        <span className="font-medium inline-block w-32">目标地址:</span> <span className="font-mono bg-gray-100 px-1 rounded">0x00007f7262a1e010</span>
                                    </li>
                                </ul>
                            </div>

                            {/* Panel 2: Calculations */}
                            {currentStep >= 1 && (
                                <div className={`p-4 rounded-xl border fade-in ${currentStep === 1 ? 'bg-blue-50 border-blue-200 shadow-md' : 'bg-neutralBg border-neutralBorder'} transition-colors`}>
                                    <h2 className="font-semibold text-gray-800 mb-3 border-b pb-2">参数计算 (b, s, t)</h2>
                                    <div className="space-y-3 text-sm">
                                        <div className={`p-2 rounded ${currentStep >= 1 ? 'bg-offsetBg border border-offsetBorder' : ''}`}>
                                            <div className="font-bold text-offsetText mb-1">1. Block Offset (b)</div>
                                            B = 64 = 2⁶ ⇒ <span className="font-bold text-lg px-1">b = 6 bits</span>
                                        </div>
                                        <div className={`p-2 rounded ${currentStep >= 1 ? 'bg-setBg border border-setBorder' : ''}`}>
                                            <div className="font-bold text-setText mb-1">2. Set Index (s)</div>
                                            S = C / (E × B) = (32 × 1024) / (8 × 64) = 64 = 2⁶ ⇒ <span className="font-bold text-lg px-1">s = 6 bits</span>
                                        </div>
                                        <div className={`p-2 rounded ${currentStep >= 1 ? 'bg-tagBg border border-tagBorder' : ''}`}>
                                            <div className="font-bold text-tagText mb-1">3. Tag (t)</div>
                                            m = t + s + b ⇒ 47 = t + 6 + 6 ⇒ <span className="font-bold text-lg px-1">t = 35 bits</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* Panel 3: Address Decomposition */}
                            {currentStep >= 2 && (
                                <div className={`p-4 rounded-xl border fade-in flex-grow flex flex-col ${[2,3].includes(currentStep) ? 'bg-blue-50 border-blue-200 shadow-md' : 'bg-neutralBg border-neutralBorder'} transition-colors`}>
                                    <h2 className="font-semibold text-gray-800 mb-3 border-b pb-2">地址拆分</h2>
                                    <div className="mb-4">
                                        <p className="text-xs text-gray-500 mb-1">47位二进制地址:</p>
                                        {renderBinaryDisplay(currentStep >= 3)}
                                    </div>
                                    
                                    {currentStep >= 3 && (
                                        <div className="grid grid-cols-3 gap-2 mt-auto text-center text-sm fade-in">
                                            <div className="bg-tagBg border border-tagBorder p-2 rounded flex flex-col">
                                                <span className="text-tagText font-bold mb-1">Tag (35 bits)</span>
                                                <span className="font-mono text-[10px] break-all">{TagBits}</span>
                                                <span className="font-bold mt-1 text-tagText border-t border-red-200 pt-1">0x7f7262a1e</span>
                                            </div>
                                            <div className="bg-setBg border border-setBorder p-2 rounded flex flex-col">
                                                <span className="text-setText font-bold mb-1">Set (6 bits)</span>
                                                <span className="font-mono">{SetBits}</span>
                                                <span className="font-bold mt-1 text-setText border-t border-blue-200 pt-1">0x00 (Set 0)</span>
                                            </div>
                                            <div className="bg-offsetBg border border-offsetBorder p-2 rounded flex flex-col">
                                                <span className="text-offsetText font-bold mb-1">Offset (6 bits)</span>
                                                <span className="font-mono">{OffsetBits}</span>
                                                <span className="font-bold mt-1 text-offsetText border-t border-green-200 pt-1">0x10 (Byte 16)</span>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Right Column: Cache Visual Model */}
                        <div className="w-full md:w-7/12 flex flex-col border rounded-xl bg-white relative overflow-hidden">
                            <div className="bg-gray-100 p-3 border-b text-center font-bold text-gray-700">
                                Cache 物理结构视图
                            </div>
                            
                            <div className="flex-grow p-4 relative flex flex-col overflow-y-auto">
                                {/* Only show abstract structure initially */}
                                {currentStep < 4 && (
                                    <div className="flex flex-col items-center justify-center h-full text-gray-400 space-y-4 fade-in">
                                        <div className="w-64 h-32 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center relative">
                                            <span className="text-lg font-medium">Cache (32 kB)</span>
                                            <div className="absolute right-[-80px] text-xs">S = 64 Sets</div>
                                            <div className="absolute bottom-[-30px] text-xs">E = 8 Ways/Set</div>
                                        </div>
                                        <p className="text-sm max-w-sm text-center">继续执行步骤，查看地址如何映射到具体的 Cache 槽位。</p>
                                    </div>
                                )}

                                {/* Show Cache Sets when step >= 4 */}
                                {currentStep >= 4 && (
                                    <div className="fade-in w-full max-w-2xl mx-auto flex flex-col gap-2 relative">
                                        
                                        {/* Set 0 (Highlighted if applicable) */}
                                        <div className={`border-2 rounded-lg p-2 ${currentStep >= 4 ? 'border-blue-500 bg-blue-50 highlight-glow' : 'border-gray-200'}`}>
                                            <div className="flex justify-between items-center mb-2 px-2">
                                                <span className="font-bold text-blue-700">Set 0 (Index: 0x00)</span>
                                                {currentStep === 4 && <span className="text-xs bg-blue-500 text-white px-2 py-1 rounded animate-pulse">目标集合</span>}
                                            </div>
                                            
                                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-2">
                                                {/* Simulate 8 ways */}
                                                {[0,1,2,3,4,5,6,7].map(way => {
                                                    // Simulate a hit in Way 2 for demonstration
                                                    const isHitTarget = way === 2;
                                                    let boxClass = "border rounded p-1.5 text-[10px] bg-white cache-block ";
                                                    let content = null;

                                                    if (currentStep >= 5) {
                                                        if (isHitTarget) {
                                                            boxClass += "border-red-500 ring-2 ring-red-200 ";
                                                            if(currentStep === 5) boxClass += "highlight-glow ";
                                                        } else {
                                                            boxClass += "border-gray-200 opacity-60";
                                                        }
                                                    } else {
                                                        boxClass += "border-gray-300";
                                                    }

                                                    return (
                                                        <div key={way} className={boxClass}>
                                                            <div className="flex justify-between border-b pb-1 mb-1">
                                                                <span className="text-gray-500">Way {way}</span>
                                                                <span className={currentStep >= 5 && isHitTarget ? "font-bold text-green-600" : "text-gray-400"}>v=1</span>
                                                            </div>
                                                            <div className={`truncate ${currentStep >= 5 && isHitTarget ? 'text-red-600 font-bold bg-red-50' : 'text-gray-400'}`}>
                                                                Tag: {currentStep >= 5 && isHitTarget ? '0x7f7262a1e' : '0x...'}
                                                            </div>
                                                            
                                                            {/* Data Block Visualization */}
                                                            {currentStep >= 6 && isHitTarget && (
                                                                <div className="mt-2 border-t pt-1 relative h-12 bg-gray-100 rounded flex items-end">
                                                                    <div className="absolute top-0 left-0 w-full text-center text-[8px] text-gray-400">Data Block (64B)</div>
                                                                    {/* Offset indicator */}
                                                                    <div className="absolute bottom-0 h-full w-[10%] bg-green-400/40 border-x border-green-500 flex items-center justify-center group" style={{left: '25%'}}>
                                                                        <div className="absolute -top-6 bg-green-700 text-white px-1 py-0.5 rounded text-[10px] whitespace-nowrap z-20 shadow">Offset 16</div>
                                                                        <div className="w-1 h-full bg-green-600"></div>
                                                                    </div>
                                                                    {/* Decorative bytes */}
                                                                    <div className="w-full flex h-1/2 opacity-20">
                                                                        {Array.from({length: 16}).map((_, i) => (
                                                                            <div key={i} className="flex-1 border-r border-gray-400 last:border-0"></div>
                                                                        ))}
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {(currentStep < 6 || !isHitTarget) && (
                                                                <div className="mt-2 text-center text-gray-300 bg-gray-50 rounded py-1">Data (64B)</div>
                                                            )}
                                                        </div>
                                                    )
                                                })}
                                            </div>
                                        </div>

                                        {/* Set 1 (Dimmed) */}
                                        <div className="border border-gray-200 rounded-lg p-2 opacity-50 bg-gray-50">
                                            <div className="font-medium text-gray-500 mb-1 px-2 text-sm">Set 1</div>
                                            <div className="h-8 bg-gray-200 rounded animate-pulse"></div>
                                        </div>
                                        
                                        {/* Ellipsis */}
                                        <div className="text-center text-gray-400 font-bold tracking-widest my-1">...</div>

                                        {/* Set 63 (Dimmed) */}
                                        <div className="border border-gray-200 rounded-lg p-2 opacity-50 bg-gray-50">
                                            <div className="font-medium text-gray-500 mb-1 px-2 text-sm">Set 63 (Index: 0x3f)</div>
                                            <div className="h-8 bg-gray-200 rounded"></div>
                                        </div>

                                    </div>
                                )}
                                
                                {/* Overlay Explanation Box */}
                                {currentStep >= 4 && (
                                    <div className="absolute bottom-4 right-4 max-w-sm bg-gray-800 text-white p-4 rounded-lg shadow-2xl border border-gray-600 text-sm z-30 fade-in">
                                        {currentStep === 4 && <p>首先，提取地址中间的 <b>Set Index (0x00)</b>，将搜索范围缩小到 Cache 的 <b>Set 0</b>。由于是 8 路组相联，我们需要在这个集合的 8 个位置中寻找。</p>}
                                        {currentStep === 5 && <p>在 Set 0 的 8 路 (Ways) 中，硬件会<b>并行比对</b>有效位(v=1) 和 <b>Tag (0x7f7262a1e)</b>。这里我们假设在 Way 2 找到了匹配（Hit）。</p>}
                                        {currentStep === 6 && <p>一旦 Tag 命中，整块 64 字节的数据就找到了。最后，使用 <b>Block Offset (0x10 = 16)</b> 从这 64 字节中精确地提取出 CPU 请求的字或字节。寻址完成！</p>}
                                    </div>
                                )}

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CacheVisualization />);
    </script>
</body>
</html>
