                                    <h3 className="text-sm font-bold text-slate-500 mb-2">已排序物品列表 (容量 W = 16)</h3>
                                    <table className="w-full text-xs text-left">
                                        <thead className="bg-slate-100 text-slate-600">
                                            <tr>
                                                <th className="px-2 py-1 rounded-tl">序号</th>
                                                <th className="px-2 py-1">重量 (w)</th>
                                                <th className="px-2 py-1">价值 (v)</th>
                                                <th className="px-2 py-1 rounded-tr">比值 (v/w)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr className="border-b border-slate-100">
                                                <td className="px-2 py-1 font-medium">1</td><td className="px-2 py-1">2</td><td className="px-2 py-1">40</td><td className="px-2 py-1 text-indigo-600 font-bold">20.0</td>
                                            </tr>
                                            <tr className="border-b border-slate-100">
                                                <td className="px-2 py-1 font-medium">2</td><td className="px-2 py-1">5</td><td className="px-2 py-1">30</td><td className="px-2 py-1 text-indigo-600 font-bold">6.0</td>
                                            </tr>
                                            <tr className="border-b border-slate-100">
                                                <td className="px-2 py-1 font-medium">3</td><td className="px-2 py-1">10</td><td className="px-2 py-1">50</td><td className="px-2 py-1 text-indigo-600 font-bold">5.0</td>
                                            </tr>
                                            <tr>
                                                <td className="px-2 py-1 font-medium">4</td><td className="px-2 py-1">5</td><td className="px-2 py-1">10</td><td className="px-2 py-1 text-indigo-600 font-bold">2.0</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* 状态空间树 画布区 (固定坐标域) */}
                            <div className="flex-1 relative overflow-hidden">
                                {/* SVG 连线层 */}
                                <svg id="svg-layer" className="absolute top-0 left-0 w-full h-full z-0">
                                    {state.edges.map((edge, idx) => {
                                        const fromNode = state.nodes.find(n => n.id === edge.from);
                                        const toNode = state.nodes.find(n => n.id === edge.to);
                                        if (!fromNode || !toNode) return null;
                                        return (
                                            <line 
                                                key={`edge-${idx}`}
                                                x1={`${fromNode.x}%`} y1={`${fromNode.y}%`}
                                                x2={`${toNode.x}%`} y2={`${toNode.y}%`}
                                                stroke="#cbd5e1" strokeWidth="2"
                                            />
                                        )
                                    })}
                                </svg>

                                {/* DOM 节点层 */}
                                {state.nodes.map(node => {
                                    // 判断是否是当前正在操作的活跃节点
                                    const isActive = node.id === state.activeNodeId;
                                    const colorClass = isActive ? statusColors['active'] : statusColors[node.status];
                                    
                                    return (
                                        <div 
                                            key={`node-${node.id}`}
                                            className={`absolute z-10 w-28 transform -translate-x-1/2 -translate-y-1/2 border-2 rounded-lg shadow-sm transition-all duration-300 bg-white ${colorClass}`}
                                            style={{ left: `${node.x}%`, top: `${node.y}%` }}
                                        >
                                            <div className="px-2 py-1 border-b border-inherit bg-inherit bg-opacity-50 text-center font-bold text-xs flex justify-between items-center rounded-t-md">
                                                <span>N{node.id}</span>
                                                <span className="text-[10px] font-normal opacity-80">{node.label || ''}</span>
                                            </div>
                                            <div className="p-2 text-[11px] leading-tight flex flex-col gap-0.5">
                                                <div className="flex justify-between">
                                                    <span className="opacity-70">W:</span>
                                                    <span className={node.w > 16 ? 'text-red-600 font-bold' : ''}>{node.w} / 16</span>
                                                </div>
                                                <div className="flex justify-between">
                                                    <span className="opacity-70">P:</span>
                                                    <span>{node.p}</span>
                                                </div>
                                                <div className="flex justify-between mt-1 pt-1 border-t border-inherit">
                                                    <span className="font-bold">UB:</span>
                                                    <span className="font-bold">{node.ub}</span>
                                                </div>
                                            </div>
                                            
                                            {/* 剪枝图标印章特效 */}
                                            {node.status.startsWith('pruned') && !isActive && (
                                                <div className="absolute inset-0 flex items-center justify-center opacity-80 pointer-events-none">
                                                    <div className="transform -rotate-12 border-2 border-red-500 text-red-500 font-black text-xs px-1 rounded bg-white">
                                                        {node.status === 'pruned_w' ? '超重' : '抛弃'}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            
                            {/* 图例说明 */}
                            <div className="absolute bottom-4 right-4 bg-white/90 p-2 rounded border border-slate-200 shadow text-xs flex gap-3 z-20">
                                <div className="flex items-center gap-1"><div className="w-3 h-3 bg-yellow-200 border border-yellow-500 rounded-sm"></div>当前处理</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-100 border border-blue-400 rounded-sm"></div>在队列中</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 bg-gray-100 border border-gray-300 rounded-sm"></div>已展开</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 bg-red-100 border border-red-500 rounded-sm"></div>剪枝</div>
                                <div className="flex items-center gap-1"><div className="w-3 h-3 bg-green-100 border border-green-500 rounded-sm"></div>有效解</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
