<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分硬币最小化差值问题 - DP可视化</title>
    <!-- 引入 Tailwind CSS 辅助排版与UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 与 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 使得浏览器能实时编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 确保各种边界的绝对和相对位置固定，防止因为文本长度变化造成抖动 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f3f4f6; }
        .fixed-height-box { min-height: 140px; height: 140px; }
        .cell-transition { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body>
    <div id="root" class="w-full h-screen overflow-hidden"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 问题数据设定
        const COINS = [2, 3, 5, 6];
        const TOTAL_SUM = COINS.reduce((a, b) => a + b, 0); // 16
        const TARGET = Math.floor(TOTAL_SUM / 2); // 8

        // 预生成所有的演算步骤，便于实现单步、重置和回退，没有状态缺失
        function generateSteps() {
            const steps = [];
            const dp = Array(COINS.length + 1).fill(null).map(() => Array(TARGET + 1).fill(false));
            
            // Step 0: 初始状态
            dp[0][0] = true;
            steps.push({
                dpState: JSON.parse(JSON.stringify(dp)),
                activeRow: 0,
                activeCol: 0,
                sourceTopCol: -1,
                sourceLeftCol: -1,
                isChecking: false,
                msgTitle: "初始化条件",
                msgDesc: "没有使用任何硬币时，凑出总和为 0 是可行的（True）。其余容量均不可行（False）。"
            });

            // 遍历各个硬币进行推导
            for (let i = 1; i <= COINS.length; i++) {
                const coin = COINS[i - 1];
                
                // 宣告行开始
                steps.push({
                    dpState: JSON.parse(JSON.stringify(dp)),
                    activeRow: i,
                    activeCol: -1,
                    sourceTopCol: -1,
                    sourceLeftCol: -1,
                    isChecking: false,
                    msgTitle: `准备处理第 ${i} 个硬币`,
                    msgDesc: `当前硬币面值为：${coin}。我们依次检查从容量 0 到容量 ${TARGET} 的所有情况。`
                });

                for (let j = 0; j <= TARGET; j++) {
                    const fromTop = dp[i - 1][j]; // 不选当前硬币
                    const fromLeft = j >= coin ? dp[i - 1][j - coin] : false; // 选当前硬币
                    const result = fromTop || fromLeft;
                    
                    // 检查中的状态展示
                    let desc = `尝试凑出目标容量：${j}。\n`;
                    if (fromTop) {
                        desc += `方案1：不选当前硬币。发现正上方 [i-1][${j}] 已为 True，可直接继承。`;
                    } else {
                        desc += `方案1：不选当前硬币。发现正上方 [i-1][${j}] 为 False，不可继承。\n`;
                        if (j < coin) {
                            desc += `方案2：无法选当前硬币（容量 ${j} 小于面值 ${coin}）。`;
                        } else if (fromLeft) {
                            desc += `方案2：选当前硬币。查看容量 ${j} 减去面值 ${coin} 后的位置 [i-1][${j - coin}]，其值为 True！因此当前容量可行。`;
                        } else {
                            desc += `方案2：选当前硬币。查看容量 ${j} 减去面值 ${coin} 后的位置 [i-1][${j - coin}]，其值也为 False，故不可行。`;
                        }
                    }

                    steps.push({
                        dpState: JSON.parse(JSON.stringify(dp)),
                        activeRow: i,
                        activeCol: j,
                        sourceTopCol: j,
                        sourceLeftCol: j >= coin ? j - coin : -1,
                        isChecking: true, // 黄色高亮表示正在计算
                        msgTitle: `计算 dp[${i}][${j}]`,
                        msgDesc: desc
                    });

                    // 写入结果状态
                    dp[i][j] = result;
                    steps.push({
                        dpState: JSON.parse(JSON.stringify(dp)),
                        activeRow: i,
                        activeCol: j,
                        sourceTopCol: fromTop ? j : -1,
                        sourceLeftCol: (!fromTop && fromLeft) ? (j - coin) : -1,
                        isChecking: false, // 绿色或灰色表示计算完毕
                        msgTitle: `更新完成 dp[${i}][${j}]`,
                        msgDesc: `最终结果：${result ? "True" : "False"}`
                    });
                }
            }

            // 完成总结
            steps.push({
                dpState: JSON.parse(JSON.stringify(dp)),
                activeRow: COINS.length,
                activeCol: TARGET,
                sourceTopCol: -1,
                sourceLeftCol: -1,
                isChecking: false,
                msgTitle: "计算完毕",
                msgDesc: `在矩阵最后一行寻找为 True 的最大容量。发现恰好能凑出总和 ${TARGET}。故两堆硬币差值为: ${TOTAL_SUM} - 2*${TARGET} = 0。`
            });

            return steps;
        }

        const stepsData = generateSteps();

        function App() {
            const [stepIdx, setStepIdx] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const playRef = useRef(null);

            const currentStep = stepsData[stepIdx];
            const isLastStep = stepIdx === stepsData.length - 1;
            const isFirstStep = stepIdx === 0;

            const handleNext = () => setStepIdx(s => Math.min(stepsData.length - 1, s + 1));
            const handlePrev = () => setStepIdx(s => Math.max(0, s - 1));
            const handleReset = () => { setStepIdx(0); setIsPlaying(false); };
            
            const togglePlay = () => setIsPlaying(!isPlaying);

            useEffect(() => {
                if (isPlaying && !isLastStep) {
                    playRef.current = setTimeout(() => {
                        handleNext();
                    }, 800); // 播放速度调整
                } else if (isLastStep && isPlaying) {
                    setIsPlaying(false);
                }
                return () => clearTimeout(playRef.current);
            }, [isPlaying, stepIdx, isLastStep]);

            // 渲染单元格辅助函数
            const getCellStyles = (i, j) => {
                const isCurrent = currentStep.activeRow === i && currentStep.activeCol === j;
                const isSourceTop = currentStep.activeRow === i + 1 && currentStep.sourceTopCol === j;
                const isSourceLeft = currentStep.activeRow === i + 1 && currentStep.sourceLeftCol === j;
                const value = currentStep.dpState[i][j];

                let baseClass = "cell-transition w-14 h-12 flex items-center justify-center font-bold text-sm border shadow-sm ";
                
                // 数据本身的颜色
                if (value) baseClass += "bg-emerald-100 text-emerald-800 border-emerald-300 ";
                else baseClass += "bg-white text-gray-400 border-gray-200 ";

                // 高亮边框：当前正在运算的单元格
                if (isCurrent && currentStep.isChecking) {
                    baseClass += "ring-4 ring-yellow-400 z-10 scale-105 ";
                } else if (isCurrent && !currentStep.isChecking) {
                    baseClass += "ring-4 ring-blue-400 z-10 scale-105 ";
                }

                // 高亮边框：作为被引用的源单元格
                if (isSourceTop || isSourceLeft) {
                    baseClass += "ring-4 ring-orange-400 z-10 opacity-90 ";
                }

                return baseClass;
            };

            return (
                <div className="flex flex-col h-full max-w-6xl mx-auto p-4 gap-4">
                    {/* 头部标题区 */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center shrink-0">
                        <div>
                            <h1 className="text-2xl font-extrabold text-gray-800 tracking-tight">分硬币最小化差值问题演示</h1>
                            <p className="text-gray-500 text-sm mt-1">
                                将硬币分成两堆，寻找一种分配使其总和最接近。转化目标：容量上限为 <b className="text-blue-600">{TARGET}</b> 的 0/1 背包。
                            </p>
                        </div>
                        <div className="flex gap-4 text-sm font-medium bg-gray-50 px-4 py-2 rounded-lg border">
                            <div>硬币集合: <span className="text-blue-600">[{COINS.join(', ')}]</span></div>
                            <div>所有总和: <span className="text-blue-600">{TOTAL_SUM}</span></div>
                            <div>目标容量 (总和/2): <span className="text-blue-600">{TARGET}</span></div>
                        </div>
                    </div>

                    {/* 解说信息区 (高度固定防止布局跳动) */}
                    <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center fixed-height-box shrink-0">
                        <h2 className="text-lg font-bold text-gray-800 mb-2 flex items-center gap-2">
                            <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs">当前状态解释</span>
                            {currentStep.msgTitle}
                        </h2>
                        <div className="text-gray-700 whitespace-pre-wrap leading-relaxed">
                            {currentStep.msgDesc}
                        </div>
                    </div>

                    {/* 核心二维网格可视化区 (高度自适应撑开) */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex-grow flex flex-col items-center justify-center overflow-auto relative">
                        {/* 图例 */}
                        <div className="absolute top-4 left-4 flex flex-col gap-2 text-xs">
                            <div className="flex items-center gap-2"><div className="w-4 h-4 bg-emerald-100 border border-emerald-300"></div> True (可凑出)</div>
                            <div className="flex items-center gap-2"><div className="w-4 h-4 bg-white border border-gray-200"></div> False (不可凑出)</div>
                            <div className="flex items-center gap-2"><div className="w-4 h-4 border-2 border-yellow-400 bg-gray-50"></div> 正在计算的目标格</div>
                            <div className="flex items-center gap-2"><div className="w-4 h-4 border-2 border-orange-400 bg-gray-50"></div> 提供依赖的上方数据格</div>
                            <div className="flex items-center gap-2"><div className="w-4 h-4 border-2 border-blue-400 bg-emerald-100"></div> 计算结果更新完毕</div>
                        </div>

                        <div className="overflow-x-auto pb-4">
                            <table className="border-separate border-spacing-1">
                                <thead>
                                    <tr>
                                        <th className="p-2 text-sm text-gray-500 font-normal">物品 \ 容量</th>
                                        {Array.from({length: TARGET + 1}).map((_, j) => (
                                            <th key={`col-${j}`} className="w-14 h-8 text-center text-gray-600 font-bold bg-gray-100 rounded">
                                                {j}
                                            </th>
                                        ))}
                                    </tr>
                                </thead>
                                <tbody>
                                    {/* 初始第 0 行 */}
                                    <tr>
                                        <td className="p-2 text-sm text-center font-medium bg-gray-50 rounded border text-gray-500">
                                            0 (无硬币)
                                        </td>
                                        {Array.from({length: TARGET + 1}).map((_, j) => (
                                            <td key={`cell-0-${j}`}>
                                                <div className={getCellStyles(0, j)}>
                                                    {currentStep.dpState[0][j] ? 'T' : 'F'}
                                                </div>
                                            </td>
                                        ))}
                                    </tr>
                                    {/* 具体硬币行 */}
                                    {COINS.map((coin, index) => {
                                        const i = index + 1;
                                        const isRowActive = currentStep.activeRow === i;
                                        return (
                                            <tr key={`row-${i}`}>
                                                <td className={`p-2 text-sm text-center font-bold rounded border transition-colors ${isRowActive ? 'bg-blue-100 text-blue-700 border-blue-300' : 'bg-gray-50 text-gray-600'}`}>
                                                    硬币: {coin}
                                                </td>
                                                {Array.from({length: TARGET + 1}).map((_, j) => (
                                                    <td key={`cell-${i}-${j}`}>
                                                        <div className={getCellStyles(i, j)}>
                                                            {/* 仅在尚未计算到该格时显示为空白，保持逻辑连贯 */}
                                                            {(i < currentStep.activeRow || (i === currentStep.activeRow && j <= currentStep.activeCol) || (i === currentStep.activeRow && currentStep.activeCol === -1 && currentStep.isChecking===false && j===-1) ) 
                                                                ? (currentStep.dpState[i][j] ? 'T' : 'F') 
                                                                : ''}
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* 底部控制面板区 */}
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between shrink-0">
                        <div className="flex items-center gap-4 w-1/3">
                            <span className="text-sm font-semibold text-gray-600">进度:</span>
                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300 ease-linear" style={{ width: `${(stepIdx / (stepsData.length - 1)) * 100}%` }}></div>
                            </div>
                            <span className="text-sm text-gray-500 whitespace-nowrap">{stepIdx} / {stepsData.length - 1}</span>
                        </div>
                        
                        <div className="flex items-center gap-3">
                            <button onClick={handleReset} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition-colors">
                                ↺ 重置
                            </button>
                            <button onClick={handlePrev} disabled={isFirstStep} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 rounded-lg font-medium transition-colors">
                                ← 上一步
                            </button>
                            <button onClick={togglePlay} className={`px-6 py-2 text-white rounded-lg font-bold transition-colors ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'} ${isLastStep ? 'opacity-50 cursor-not-allowed' : ''}`}>
                                {isPlaying ? '⏸ 暂停' : '▶ 自动播放'}
                            </button>
                            <button onClick={handleNext} disabled={isLastStep} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700 rounded-lg font-medium transition-colors">
                                下一步 →
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
