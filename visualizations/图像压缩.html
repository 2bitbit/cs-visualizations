<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态规划：图像压缩过程可视化</title>
    
    <!-- 引入 Tailwind CSS 进行原子化样式控制 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 核心库与 DOM 操作库 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- 引入 Babel 使得浏览器能直接解析 JSX 语法 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 补充全局动画 CSS -->
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        body { margin: 0; padding: 0; box-sizing: border-box; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    
    <!-- React 应用挂载点 -->
    <div id="root" class="w-full h-screen min-h-[850px] p-4 box-border flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 像素数据与环境配置
        const PIXELS = [10, 12, 15, 255, 1, 2]; // 演示数据
        const MAX_LENGTH = 256; // 限制每段最多包含 256 个像素 (经典算法标准)
        const HEADER_OVERHEAD = 11; // 头部固定开销 11 位 (8位记录长度 + 3位记录位宽)

        // 辅助函数：计算存储数值需要的位数 (例如 15 需 4位, 255 需 8位)
        const getBits = (value) => {
          if (value === 0) return 1;
          return Math.floor(Math.log2(value)) + 1;
        };

        // 预计算所有状态机步骤，以支持完全无缝的前进/后退
        const generateHistorySteps = () => {
          const steps = [];
          const dp = new Array(PIXELS.length + 1).fill(0);
          const s = new Array(PIXELS.length + 1).fill(0); // 记录决策点
          
          // 初始状态
          steps.push({
            type: 'init',
            i: 0, k: null, dp: [...dp], s: [...s],
            desc: '初始化：0 个像素时的最小开销 dp[0] = 0。'
          });

          for (let i = 1; i <= PIXELS.length; i++) {
            let currentMinCost = Infinity;
            let currentBestK = 0;

            // 开始计算当前的 i
            steps.push({
              type: 'start_i',
              i: i, k: null, dp: [...dp], s: [...s], currentMinCost, currentBestK,
              desc: `开始计算前 ${i} 个像素的最优解 dp[${i}]。当前考虑的新像素为 ${PIXELS[i-1]}。`
            });

            const maxK = Math.min(i, MAX_LENGTH);
            for (let k = 1; k <= maxK; k++) {
              const segment = PIXELS.slice(i - k, i);
              const maxVal = Math.max(...segment);
              const maxBits = getBits(maxVal);
              const segmentCost = k * maxBits + HEADER_OVERHEAD;
              const totalCost = dp[i - k] + segmentCost;

              const isBetter = totalCost < currentMinCost;
              if (isBetter) {
                currentMinCost = totalCost;
                currentBestK = k;
              }

              steps.push({
                type: 'eval_k',
                i: i, k: k, dp: [...dp], s: [...s], currentMinCost, currentBestK,
                evalData: { segment, maxVal, maxBits, segmentCost, totalCost, isBetter, prevDpIndex: i - k, prevDpValue: dp[i - k] },
                desc: `尝试将最后 ${k} 个像素作为一段。`
              });
            }

            // 确认 dp[i] 的结果
            dp[i] = currentMinCost;
            s[i] = currentBestK;
            steps.push({
              type: 'commit_i',
              i: i, k: null, dp: [...dp], s: [...s], currentMinCost, currentBestK,
              desc: `遍历结束，确定 dp[${i}] = ${currentMinCost}，最佳切割长度为 ${currentBestK}。`
            });
          }

          // 整理最终结果的切割方案
          const partitions = [];
          let curr = PIXELS.length;
          while (curr > 0) {
            const len = s[curr];
            partitions.unshift(PIXELS.slice(curr - len, curr));
            curr -= len;
          }

          steps.push({
            type: 'done',
            i: PIXELS.length, k: null, dp: [...dp], s: [...s],
            partitions: partitions,
            desc: '计算完成！通过回溯数组 s，我们可以得到全局最优的分段方案。'
          });

          return steps;
        };

        function App() {
          const steps = useMemo(() => generateHistorySteps(), []);
          const [currentStepIdx, setCurrentStepIdx] = useState(0);
          const [isPlaying, setIsPlaying] = useState(false);

          const stepData = steps[currentStepIdx];

          // 自动播放逻辑
          useEffect(() => {
            let timer;
            if (isPlaying && currentStepIdx < steps.length - 1) {
              timer = setTimeout(() => {
                setCurrentStepIdx(prev => prev + 1);
              }, 1500);
            } else if (currentStepIdx >= steps.length - 1) {
              setIsPlaying(false);
            }
            return () => clearTimeout(timer);
          }, [isPlaying, currentStepIdx, steps.length]);

          const handleNext = () => currentStepIdx < steps.length - 1 && setCurrentStepIdx(c => c + 1);
          const handlePrev = () => currentStepIdx > 0 && setCurrentStepIdx(c => c - 1);
          const handleReset = () => { setIsPlaying(false); setCurrentStepIdx(0); };
          const togglePlay = () => setIsPlaying(!isPlaying);

          return (
            <React.Fragment>
              {/* 顶部控制栏 - 绝对高度避免跳动 */}
              <div className="h-16 flex items-center justify-between bg-white px-6 rounded-xl shadow-sm border border-slate-200 mb-4 shrink-0">
                <div>
                  <h1 className="text-xl font-bold text-slate-800 m-0">动态规划：图像压缩过程可视化</h1>
                  <p className="text-xs text-slate-500 mt-1">最大段长度 = {MAX_LENGTH} | 头部开销 = {HEADER_OVERHEAD} 位 (8位长度 + 3位位宽)</p>
                </div>
                <div className="flex items-center gap-3">
                  <button onClick={handlePrev} disabled={currentStepIdx === 0} className="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 disabled:opacity-50 rounded text-sm font-medium transition-colors border border-slate-300">
                    ⏮ 上一步
                  </button>
                  <button onClick={togglePlay} className="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded shadow-sm text-sm font-medium transition-colors w-24">
                    {isPlaying ? '⏸ 暂停' : '▶ 播放'}
                  </button>
                  <button onClick={handleNext} disabled={currentStepIdx === steps.length - 1} className="px-3 py-1.5 bg-slate-100 hover:bg-slate-200 disabled:opacity-50 rounded text-sm font-medium transition-colors border border-slate-300">
                    下一步 ⏭
                  </button>
                  <button onClick={handleReset} className="px-3 py-1.5 ml-2 bg-red-50 hover:bg-red-100 text-red-600 rounded text-sm font-medium transition-colors border border-red-200">
                    ↺ 重置
                  </button>
                </div>
              </div>

              {/* 进度指示条 */}
              <div className="h-2 bg-slate-200 rounded-full mb-4 shrink-0 overflow-hidden">
                <div 
                  className="h-full bg-blue-500 transition-all duration-300 ease-out" 
                  style={{ width: `${(currentStepIdx / (steps.length - 1)) * 100}%` }}
                ></div>
              </div>

              {/* 主体内容网格 - 设定高度，锁定各个区域相对位置 */}
              <div className="flex-1 grid grid-cols-12 gap-4 h-[650px]">
                
                {/* 左侧：DP 状态表 (固定宽度与结构) */}
                <div className="col-span-4 bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col overflow-hidden">
                  <div className="bg-slate-100 px-4 py-3 border-b border-slate-200">
                    <h2 className="text-sm font-bold m-0 flex items-center justify-between">
                      <span>DP 记忆表</span>
                      <span className="text-xs font-normal text-slate-500">dp[i] = 压缩前 i 个像素的最小位</span>
                    </h2>
                  </div>
                  <div className="flex-1 p-4 overflow-y-auto">
                    <table className="w-full text-sm text-left border-collapse">
                      <thead>
                        <tr className="border-b-2 border-slate-300 text-slate-600">
                          <th className="py-2 w-12 text-center">i</th>
                          <th className="py-2 w-16 text-center">像素</th>
                          <th className="py-2 w-20 text-center text-blue-600">dp[i]</th>
                          <th className="py-2 w-16 text-center text-green-600">s[i]</th>
                        </tr>
                      </thead>
                      <tbody>
                        {stepData.dp.map((val, idx) => {
                          if (idx > stepData.i && stepData.type !== 'done') return null; // 还没计算到的行隐藏
                          
                          // 样式判定
                          let rowClass = "border-b border-slate-100 ";
                          if (idx === stepData.i) {
                            if (stepData.type === 'commit_i') rowClass += "bg-green-50 font-bold transition-colors";
                            else if (stepData.type === 'done') rowClass += "bg-blue-50 font-bold transition-colors";
                            else rowClass += "bg-yellow-50";
                          }

                          // 只有在明确处于评估过程中的当前行，才显示问号
                          const isEvaluating = idx === stepData.i && (stepData.type === 'start_i' || stepData.type === 'eval_k');

                          return (
                            <tr key={idx} className={rowClass}>
                              <td className="py-2 text-center font-mono">{idx}</td>
                              <td className="py-2 text-center text-slate-500">{idx === 0 ? '-' : PIXELS[idx-1]}</td>
                              <td className={`py-2 text-center font-mono ${isEvaluating ? 'text-slate-300' : 'text-blue-600 font-bold'}`}>
                                {isEvaluating ? '?' : val}
                              </td>
                              <td className={`py-2 text-center font-mono ${isEvaluating ? 'text-slate-300' : 'text-green-600'}`}>
                                {isEvaluating ? '?' : stepData.s[idx]}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* 右侧：可视化图解与推导过程 */}
                <div className="col-span-8 flex flex-col gap-4 h-full">
                  
                  {/* 右上：像素序列全览 */}
                  <div className="bg-white h-36 rounded-xl shadow-sm border border-slate-200 p-4 shrink-0 flex flex-col">
                    <h2 className="text-sm font-bold mb-3">原像素序列与当前窗口</h2>
                    <div className="flex items-center gap-2 justify-center flex-1">
                      {PIXELS.map((px, idx) => {
                        const globalIndex = idx + 1; // 基于 1 的索引
                        
                        // 窗口判定
                        let isInWindow = false;
                        let isCurrentTarget = false;
                        if (stepData.type === 'eval_k' && globalIndex > stepData.i - stepData.k && globalIndex <= stepData.i) {
                          isInWindow = true;
                        }
                        if (globalIndex === stepData.i) {
                          isCurrentTarget = true;
                        }

                        return (
                          <div key={idx} className="flex flex-col items-center">
                            <div className="text-xs text-slate-400 mb-1">P{globalIndex}</div>
                            <div 
                              className={`
                                w-12 h-12 flex items-center justify-center rounded-lg text-lg font-mono transition-all duration-200
                                ${isInWindow ? 'bg-orange-400 text-white shadow-md transform scale-110' : 
                                  isCurrentTarget ? 'bg-yellow-200 text-slate-800 border-2 border-yellow-400' : 
                                  globalIndex < stepData.i ? 'bg-slate-200 text-slate-600' : 'bg-slate-50 border border-slate-200 text-slate-400'}
                              `}
                            >
                              {px}
                            </div>
                            <div className="text-[10px] text-slate-400 mt-1">{getBits(px)} 位</div>
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {/* 右中：核心公式与推导计算 (固定高度，防止排版抖动) */}
                  <div className="bg-slate-800 text-slate-100 h-64 rounded-xl shadow-sm p-5 shrink-0 flex flex-col relative overflow-hidden">
                    <h2 className="text-sm font-bold text-slate-300 mb-2 border-b border-slate-600 pb-2">计算过程分析：{stepData.desc}</h2>
                    
                    <div className="flex-1 flex flex-col justify-center">
                      {stepData.type === 'eval_k' && stepData.evalData ? (
                        <div className="animate-fade-in space-y-4">
                          <div className="flex justify-between items-center bg-slate-700/50 p-3 rounded">
                            <div>
                              <span className="text-slate-400 text-sm">尝试合并的像素：</span>
                              <span className="font-mono text-orange-300 tracking-widest bg-slate-900 px-2 py-1 rounded ml-2">[{stepData.evalData.segment.join(', ')}]</span>
                            </div>
                            <div className="text-right">
                              <div className="text-sm">该段最大值: <span className="text-white">{stepData.evalData.maxVal}</span></div>
                              <div className="text-sm">统一所需位数: <span className="text-yellow-400 font-bold">{stepData.evalData.maxBits} 位</span></div>
                            </div>
                          </div>

                          <div className="bg-slate-900 p-3 rounded font-mono text-sm">
                            <div className="mb-2 text-slate-400">状态转移方程实例：</div>
                            <div className="flex items-center gap-2 flex-wrap">
                              <span className="text-blue-300">dp[{stepData.i}]</span>
                              <span>=</span>
                              <span className="text-purple-300">dp[{stepData.evalData.prevDpIndex}]</span>
                              <span className="text-slate-500">+</span>
                              <span>(</span>
                              <span className="text-green-300">段长 {stepData.k}</span>
                              <span className="text-slate-500">×</span>
                              <span className="text-yellow-300">每项 {stepData.evalData.maxBits}位</span>
                              <span>)</span>
                              <span className="text-slate-500">+</span>
                              <span className="text-red-300">头部 {HEADER_OVERHEAD}位</span>
                            </div>
                            <div className="mt-2 text-lg">
                              <span className="text-transparent">dp[{stepData.i}]</span>
                              <span>=</span>
                              <span className="text-purple-300 ml-2">{stepData.evalData.prevDpValue}</span>
                              <span className="text-slate-500 ml-2">+</span>
                              <span className="text-white ml-2">{stepData.evalData.segmentCost}</span>
                              <span className="text-slate-500 mx-2">→</span>
                              <span className="text-white font-bold text-xl">{stepData.evalData.totalCost} 位</span>
                            </div>
                          </div>

                          <div className="flex items-center justify-between text-sm px-1">
                            <div>当前找到的最优解：<span className="font-bold">{stepData.currentMinCost}</span></div>
                            {stepData.evalData.isBetter && (
                              <div className="text-green-400 font-bold bg-green-400/10 px-2 py-0.5 rounded">
                                ✓ 发现更优解！更新选择。
                              </div>
                            )}
                          </div>
                        </div>
                      ) : stepData.type === 'init' ? (
                         <div className="text-center text-slate-400 italic">尚未开始遍历。</div>
                      ) : stepData.type === 'start_i' ? (
                         <div className="text-center text-slate-400 italic">准备从 k=1 开始探测各种合法分段...</div>
                      ) : stepData.type === 'commit_i' ? (
                         <div className="flex flex-col items-center justify-center h-full text-green-400 bg-green-400/5 rounded-lg border border-green-400/20">
                           <div className="text-2xl font-bold mb-2">已敲定：dp[{stepData.i}] = {stepData.currentMinCost}</div>
                           <div className="text-sm">当序列长度为 {stepData.i} 时，最后 {stepData.currentBestK} 个像素作为独立一段能达到全局最优。</div>
                         </div>
                      ) : stepData.type === 'done' ? (
                         <div className="flex flex-col items-center justify-center h-full text-blue-300 bg-blue-400/5 rounded-lg border border-blue-400/20">
                           <div className="text-2xl font-bold mb-2">🎉 动态规划推导完毕</div>
                           <div className="text-sm">最终整个序列的最小存储位数为 dp[{PIXELS.length}] = {stepData.dp[PIXELS.length]}</div>
                         </div>
                      ) : null}
                    </div>
                  </div>

                  {/* 右下：最终重建的可视化 */}
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex-1 flex flex-col min-h-0">
                     <h2 className="text-sm font-bold mb-3">最优分段方案重构 (根据回溯 s 数组)</h2>
                     <div className="flex-1 flex items-center justify-center bg-slate-50 rounded border border-dashed border-slate-300 p-4 overflow-x-auto">
                       {stepData.type !== 'done' ? (
                         <div className="text-slate-400 text-sm italic">请执行至最后一步以查看最终分段方案</div>
                       ) : (
                         <div className="flex gap-4 items-end">
                           {stepData.partitions.map((part, pIdx) => {
                             const maxInPart = Math.max(...part);
                             const bits = getBits(maxInPart);
                             const cost = part.length * bits + HEADER_OVERHEAD;
                             
                             return (
                               <div key={pIdx} className="flex flex-col items-center animate-fade-in-up" style={{ animationDelay: `${pIdx * 0.1}s` }}>
                                 <div className="bg-blue-100 border-2 border-blue-400 rounded-lg p-2 flex gap-1 shadow-sm relative">
                                    {/* 头部开销提示 */}
                                    <div className="absolute -top-7 left-1/2 -translate-x-1/2 bg-red-100 text-red-600 text-[10px] font-bold px-2 py-0.5 rounded whitespace-nowrap border border-red-200">
                                      头:{HEADER_OVERHEAD}位
                                    </div>
                                    {part.map((px, idx) => (
                                      <div key={idx} className="w-10 h-10 bg-white rounded border border-blue-200 flex flex-col items-center justify-center">
                                        <span className="font-mono font-bold text-slate-700">{px}</span>
                                      </div>
                                    ))}
                                 </div>
                                 <div className="mt-3 text-xs text-slate-500 text-center">
                                   段统一定长: <strong className="text-slate-700">{bits} 位</strong><br/>
                                   段总开销: <strong>{cost}</strong>
                                 </div>
                               </div>
                             )
                           })}
                         </div>
                       )}
                     </div>
                     {stepData.type === 'done' && (
                       <div className="mt-2 text-xs text-slate-500 text-center">
                         仔细观察最后两个数字 [1, 2] 的分组方式，由于<strong>头部开销极大</strong>，强行将它们拆分反而不划算，验证了贪心逻辑的缺陷。
                       </div>
                     )}
                  </div>

                </div>
              </div>
            </React.Fragment>
          );
        }

        // 渲染 React 应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
