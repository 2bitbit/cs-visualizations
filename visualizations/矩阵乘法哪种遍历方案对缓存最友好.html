<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵乘法的 6 种视角与 Cache 优化 (Canvas 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #0f172a; color: #f8fafc; overflow: hidden; }
        
        /* 布局 */
        .app-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { flex: 0 0 auto; border-bottom: 1px solid #1e293b; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        .main-content { flex: 1 1 auto; display: flex; overflow: hidden; }
        .sidebar { flex: 0 0 400px; overflow-y: auto; background-color: #1e293b; border-right: 1px solid #334155; }
        .visualization-area { flex: 1 1 auto; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .slider-thumb { accent-color: #3b82f6; cursor: pointer; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const MATRIX_SIZE = 8; // 复杂的 8x8 例子

        // 完美对应你的理解：内积(2)、行线性组合(1)、列线性组合(1)、外积(2)
        const LOOP_ORDERS = [
            { id: 'ijk', category: '内积 (Inner Product)', name: 'C 按行算', desc: '点积视角。计算 C 的一个元素时，内层循环对 B 是列向跳跃访问，缓存极度不友好。', innerVar: 'k', type: 'inner' },
            { id: 'jik', category: '内积 (Inner Product)', name: 'C 按列算', desc: '点积视角。与 ijk 类似，只是最外层变为按列遍历 C。', innerVar: 'k', type: 'inner' },
            
            { id: 'ikj', category: '行线性组合', name: '🌟 你的核心洞见 (缓存最优)', desc: '把 C 的一行视作 B 的数行的线性组合。A 是锚定的标量，B 和 C 的内层访问全部是完美的行向（步长为1）平移！', innerVar: 'j', type: 'row-comb' },
            { id: 'jki', category: '列线性组合', name: '列向组合', desc: '把 C 的一列视作 A 的数列的线性组合。内层访问全是列向跳跃，缓存灾难。', innerVar: 'i', type: 'col-comb' },
            
            { id: 'kij', category: '外积 (Outer Product)', name: 'C 按行更新', desc: '取 A 的一列和 B 的一行生成外积矩阵，累加到 C。此处内层循环是 j，对 B 和 C 是按行访问，缓存友好。', innerVar: 'j', type: 'outer' },
            { id: 'kji', category: '外积 (Outer Product)', name: 'C 按列更新', desc: '同为外积，但内层循环是 i，按列更新 C，导致缓存未命中率飙升。', innerVar: 'i', type: 'outer' }
        ];

        const generateSteps = (order, N) => {
            const steps = [];
            
            const addStep = (i, j, k, loopVars) => {
                const step = { i, j, k, loopVars };
                
                // 根据内层循环的数学意义，注入绘图所需的"高亮语义"
                if (order === 'ijk' || order === 'jik') {
                    // 内积：高亮 A 的行 和 B 的列，C 是要写入的标量
                    step.vectorA = { type: 'row', index: i };
                    step.vectorB = { type: 'col', index: j };
                    step.scalarC = { r: i, c: j }; 
                    step.activeA = { r: i, c: k }; step.activeB = { r: k, c: j }; step.activeC = { r: i, c: j };
                } 
                else if (order === 'ikj') {
                    // 行线性组合：高亮 B 的行 和 C 的行，A 是固定的标量系数
                    step.vectorB = { type: 'row', index: k };
                    step.vectorC = { type: 'row', index: i };
                    step.scalarA = { r: i, c: k };
                    step.activeA = { r: i, c: k }; step.activeB = { r: k, c: j }; step.activeC = { r: i, c: j };
                }
                else if (order === 'jki') {
                    // 列线性组合：高亮 A 的列 和 C 的列，B 是固定的标量系数
                    step.vectorA = { type: 'col', index: k };
                    step.vectorC = { type: 'col', index: j };
                    step.scalarB = { r: k, c: j };
                    step.activeA = { r: i, c: k }; step.activeB = { r: k, c: j }; step.activeC = { r: i, c: j };
                }
                else if (order === 'kij' || order === 'kji') {
                    // 外积：高亮 A 的列 和 B 的行，此时它们相乘更新整个 C
                    step.vectorA = { type: 'col', index: k };
                    step.vectorB = { type: 'row', index: k };
                    // 在外积中，C 的整行或整列也会随着内层循环被更新
                    step.vectorC = order === 'kij' ? { type: 'row', index: i } : { type: 'col', index: j };
                    step.activeA = { r: i, c: k }; step.activeB = { r: k, c: j }; step.activeC = { r: i, c: j };
                }
                steps.push(step);
            };

            // 依据循环顺序产生排列
            if (order === 'ijk') for (let i=0; i<N; i++) for (let j=0; j<N; j++) for (let k=0; k<N; k++) addStep(i, j, k, ['i', 'j', 'k']);
            if (order === 'jik') for (let j=0; j<N; j++) for (let i=0; i<N; i++) for (let k=0; k<N; k++) addStep(i, j, k, ['j', 'i', 'k']);
            if (order === 'ikj') for (let i=0; i<N; i++) for (let k=0; k<N; k++) for (let j=0; j<N; j++) addStep(i, j, k, ['i', 'k', 'j']);
            if (order === 'kij') for (let k=0; k<N; k++) for (let i=0; i<N; i++) for (let j=0; j<N; j++) addStep(i, j, k, ['k', 'i', 'j']);
            if (order === 'jki') for (let j=0; j<N; j++) for (let k=0; k<N; k++) for (let i=0; i<N; i++) addStep(i, j, k, ['j', 'k', 'i']);
            if (order === 'kji') for (let k=0; k<N; k++) for (let j=0; j<N; j++) for (let i=0; i<N; i++) addStep(i, j, k, ['k', 'j', 'i']);
            
            return steps;
        };

        const CanvasEngine = ({ step, order, N }) => {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // 清理并设置高清分辨率
                const dpr = window.devicePixelRatio || 1;
                const logicalWidth = 1000;
                const logicalHeight = 400;
                canvas.width = logicalWidth * dpr;
                canvas.height = logicalHeight * dpr;
                ctx.scale(dpr, dpr);
                ctx.clearRect(0, 0, logicalWidth, logicalHeight);

                const CELL_SIZE = 30;
                const GAP = 120; // 矩阵间距
                
                // 计算三个矩阵的起始 X, Y 坐标 (使其居中)
                const totalWidth = 3 * (N * CELL_SIZE) + 2 * GAP;
                const startX = (logicalWidth - totalWidth) / 2;
                const startY = (logicalHeight - N * CELL_SIZE) / 2 + 20;

                const posA = { x: startX, y: startY };
                const posB = { x: startX + N * CELL_SIZE + GAP, y: startY };
                const posC = { x: startX + 2 * (N * CELL_SIZE + GAP), y: startY };

                // 辅助函数：绘制矩阵基础网格
                const drawGrid = (pos, name) => {
                    ctx.strokeStyle = '#475569'; // 边框颜色
                    ctx.lineWidth = 1;
                    for (let r = 0; r < N; r++) {
                        for (let c = 0; c < N; c++) {
                            ctx.strokeRect(pos.x + c * CELL_SIZE, pos.y + r * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                        }
                    }
                    // 矩阵名称
                    ctx.fillStyle = '#94a3b8';
                    ctx.font = 'bold 20px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(name, pos.x + (N * CELL_SIZE) / 2, pos.y - 20);
                };

                // 辅助函数：绘制数学符号
                const drawSymbol = (x, y, symbol) => {
                    ctx.fillStyle = '#64748b';
                    ctx.font = 'bold 30px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(symbol, x, y);
                };

                // 绘制基础环境
                drawGrid(posA, 'A');
                drawSymbol(posA.x + N * CELL_SIZE + GAP / 2, posA.y + (N * CELL_SIZE) / 2 + 10, '×');
                drawGrid(posB, 'B');
                drawSymbol(posB.x + N * CELL_SIZE + GAP / 2, posB.y + (N * CELL_SIZE) / 2 + 10, '=');
                drawGrid(posC, 'C');

                if (!step) return;

                // 辅助函数：高亮向量 (行或列)
                const drawVector = (pos, type, index, colorStr) => {
                    ctx.fillStyle = colorStr; // e.g., 'rgba(139, 92, 246, 0.2)'
                    if (type === 'row') {
                        ctx.fillRect(pos.x, pos.y + index * CELL_SIZE, N * CELL_SIZE, CELL_SIZE);
                    } else {
                        ctx.fillRect(pos.x + index * CELL_SIZE, pos.y, CELL_SIZE, N * CELL_SIZE);
                    }
                };

                // 辅助函数：高亮单个方块 (活动指针或标量)
                const drawCell = (pos, r, c, type) => {
                    const cx = pos.x + c * CELL_SIZE;
                    const cy = pos.y + r * CELL_SIZE;
                    
                    if (type === 'scalar') {
                        // 标量锚点：橙色圆圈
                        ctx.beginPath();
                        ctx.arc(cx + CELL_SIZE/2, cy + CELL_SIZE/2, CELL_SIZE/2 - 2, 0, Math.PI * 2);
                        ctx.fillStyle = '#f59e0b';
                        ctx.fill();
                        ctx.lineWidth = 2;
                        ctx.strokeStyle = '#fbbf24';
                        ctx.stroke();
                        // 闪烁光晕
                        ctx.shadowColor = '#fbbf24';
                        ctx.shadowBlur = 10;
                        ctx.stroke();
                        ctx.shadowBlur = 0;
                    } else if (type === 'active') {
                        // 活动读取：青色方块
                        ctx.fillStyle = '#06b6d4';
                        ctx.fillRect(cx + 2, cy + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                    } else if (type === 'write') {
                        // 活动写入：绿色方块 (代表累加/写入)
                        ctx.fillStyle = '#22c55e';
                        ctx.fillRect(cx + 1, cy + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                        ctx.strokeStyle = '#16a34a';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(cx, cy, CELL_SIZE, CELL_SIZE);
                    }
                };

                // 根据不同的数学视角，渲染不同的高亮几何图形
                const vecColor = 'rgba(168, 85, 247, 0.25)'; // 紫色向量背景

                // 1. 绘制向量背景
                if (step.vectorA) drawVector(posA, step.vectorA.type, step.vectorA.index, vecColor);
                if (step.vectorB) drawVector(posB, step.vectorB.type, step.vectorB.index, vecColor);
                if (step.vectorC) drawVector(posC, step.vectorC.type, step.vectorC.index, vecColor);

                // 2. 绘制锚点标量 (如果是线性组合视角)
                if (step.scalarA) drawCell(posA, step.scalarA.r, step.scalarA.c, 'scalar');
                if (step.scalarB) drawCell(posB, step.scalarB.r, step.scalarB.c, 'scalar');
                if (step.scalarC) drawCell(posC, step.scalarC.r, step.scalarC.c, 'scalar'); // 内积时 C 是一个点

                // 3. 绘制当前内层循环的游走指针
                // A 的活动指针 (如果它不是固定的标量)
                if (!step.scalarA) drawCell(posA, step.activeA.r, step.activeA.c, 'active');
                // B 的活动指针
                if (!step.scalarB) drawCell(posB, step.activeB.r, step.activeB.c, 'active');
                // C 的活动指针 (写入目标)
                drawCell(posC, step.activeC.r, step.activeC.c, 'write');

            }, [step, order, N]);

            return (
                <div className="w-full h-full relative">
                    <canvas ref={canvasRef} className="absolute inset-0" />
                </div>
            );
        };

        const App = () => {
            const [selectedOrder, setSelectedOrder] = useState('ikj'); // 默认展示你的核心洞见
            const [currentStepIdx, setCurrentStepIdx] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(20); // 速度 ms

            const steps = useMemo(() => generateSteps(selectedOrder, MATRIX_SIZE), [selectedOrder]);
            const currentStep = steps[currentStepIdx] || null;
            const currentOrderDef = LOOP_ORDERS.find(o => o.id === selectedOrder);

            // 自动播放循环
            useEffect(() => {
                let animationId;
                let lastTime = 0;
                
                const loop = (timestamp) => {
                    if (!lastTime) lastTime = timestamp;
                    if (timestamp - lastTime >= speed) {
                        setCurrentStepIdx(prev => {
                            if (prev < steps.length - 1) return prev + 1;
                            setIsPlaying(false);
                            return prev;
                        });
                        lastTime = timestamp;
                    }
                    if (isPlaying) {
                        animationId = requestAnimationFrame(loop);
                    }
                };

                if (isPlaying) {
                    animationId = requestAnimationFrame(loop);
                }
                return () => cancelAnimationFrame(animationId);
            }, [isPlaying, steps.length, speed]);

            const handleOrderChange = (id) => {
                setSelectedOrder(id);
                setCurrentStepIdx(0);
                setIsPlaying(false);
            };

            return (
                <div className="app-container">
                    {/* Header */}
                    <header className="header p-4 shadow-md flex justify-between items-center z-20">
                        <div>
                            <h1 className="text-xl font-bold flex items-center text-blue-400">
                                <i className="fas fa-layer-group mr-3"></i>
                                Matrix Multiplication: 6 种数学视角与 Cache 验证
                            </h1>
                            <p className="text-slate-400 text-sm mt-1">验证你的理解：内积、行/列线性组合、外积的内存访问投影</p>
                        </div>
                    </header>

                    <div className="main-content">
                        {/* 左侧控制栏与解释 */}
                        <div className="sidebar p-6 flex flex-col z-10 shadow-2xl relative">
                            <h2 className="text-lg font-bold text-slate-200 mb-4 border-b border-slate-700 pb-2">选择遍历视角</h2>
                            
                            {/* 6种分类按钮 */}
                            <div className="flex flex-col gap-3 mb-6">
                                {LOOP_ORDERS.map(order => {
                                    const isSelected = selectedOrder === order.id;
                                    let btnClass = "text-left p-3 rounded-lg border transition-all ";
                                    
                                    if (isSelected) {
                                        if (order.id === 'ikj') btnClass += "bg-blue-900/40 border-blue-400 text-white shadow-[0_0_15px_rgba(59,130,246,0.3)]";
                                        else btnClass += "bg-slate-700 border-slate-400 text-white";
                                    } else {
                                        btnClass += "bg-slate-800/50 border-slate-700 text-slate-400 hover:bg-slate-800 hover:border-slate-500";
                                    }

                                    return (
                                        <button 
                                            key={order.id} 
                                            onClick={() => handleOrderChange(order.id)}
                                            className={btnClass}
                                        >
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="font-mono font-bold text-lg">{order.id}</span>
                                                <span className="text-xs px-2 py-0.5 rounded bg-slate-900/50">{order.category}</span>
                                            </div>
                                            <div className={`text-sm ${isSelected && order.id==='ikj' ? 'text-blue-200' : 'text-slate-300'}`}>
                                                {order.name}
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            {/* 核心洞见分析框 */}
                            <div className={`mt-auto p-4 rounded-xl border ${currentOrderDef.id === 'ikj' ? 'bg-indigo-900/30 border-indigo-500/50' : 'bg-slate-800/50 border-slate-700'}`}>
                                <h3 className="font-bold text-white mb-2 flex items-center">
                                    <i className={`fas fa-info-circle mr-2 ${currentOrderDef.id === 'ikj' ? 'text-blue-400' : 'text-slate-400'}`}></i> 
                                    当前视角分析
                                </h3>
                                <p className="text-sm text-slate-300 leading-relaxed">
                                    {currentOrderDef.desc}
                                </p>
                                
                                <div className="mt-4 text-xs">
                                    <div className="font-mono text-slate-400 mb-1">内层循环变量: <span className="text-white font-bold text-sm bg-slate-700 px-1 rounded">{currentOrderDef.innerVar}</span></div>
                                    {currentOrderDef.id === 'ikj' && (
                                        <div className="mt-3 p-2 bg-green-900/30 border border-green-500/30 rounded text-green-300">
                                            <b>观察右侧动画：</b>A 的指针(黄)变成固定锚点。在内层循环中，只看到绿色方块在 B 和 C 的行向量中<b>连续平移</b>。这就是行主序下 Cache 最友好的终极原因！
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* 右侧可视化区域 */}
                        <div className="visualization-area bg-[#0f172a]">
                            
                            {/* 图例说明 */}
                            <div className="absolute top-4 left-6 flex space-x-6 text-sm text-slate-300 bg-slate-800/80 px-4 py-2 rounded-full border border-slate-700 z-10 shadow-lg">
                                <div className="flex items-center"><span className="w-3 h-3 rounded-full bg-[#f59e0b] shadow-[0_0_8px_#fbbf24] mr-2"></span> 标量锚点 (固定)</div>
                                <div className="flex items-center"><span className="w-4 h-4 rounded bg-[#a855f7] opacity-50 mr-2"></span> 参与的向量</div>
                                <div className="flex items-center"><span className="w-3 h-3 rounded bg-[#06b6d4] mr-2"></span> 游走指针 (读取)</div>
                                <div className="flex items-center"><span className="w-3 h-3 rounded bg-[#22c55e] mr-2 border border-green-400"></span> 游走指针 (写入)</div>
                            </div>

                            {/* 画布 */}
                            <div className="flex-1 w-full h-full">
                                <CanvasEngine step={currentStep} order={selectedOrder} N={MATRIX_SIZE} />
                            </div>

                            {/* 底部控制条 */}
                            <div className="h-24 bg-slate-900 border-t border-slate-800 flex items-center justify-between px-8 z-20">
                                
                                {/* 进度信息 */}
                                <div className="w-1/4 flex flex-col">
                                    <div className="text-slate-400 text-xs mb-1 font-mono">STEP {currentStepIdx + 1} / {steps.length}</div>
                                    <div className="font-mono text-sm text-blue-300">
                                        {currentStep && `C[${currentStep.i}][${currentStep.j}] += A[${currentStep.i}][${currentStep.k}] * B[${currentStep.k}][${currentStep.j}]`}
                                    </div>
                                </div>

                                {/* 播放控制 */}
                                <div className="flex items-center space-x-6">
                                    <button onClick={() => setCurrentStepIdx(0)} className="text-slate-500 hover:text-white transition"><i className="fas fa-fast-backward"></i></button>
                                    <button onClick={() => setCurrentStepIdx(p => Math.max(0, p - 1))} className="text-slate-500 hover:text-white transition"><i className="fas fa-step-backward"></i></button>
                                    
                                    <button 
                                        onClick={() => setIsPlaying(!isPlaying)} 
                                        className="w-12 h-12 bg-blue-600 hover:bg-blue-500 text-white rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(37,99,235,0.4)] transition"
                                    >
                                        <i className={`fas fa-${isPlaying ? 'pause' : 'play'} ml-${isPlaying ? '0' : '1'}`}></i>
                                    </button>
                                    
                                    <button onClick={() => setCurrentStepIdx(p => Math.min(steps.length - 1, p + 1))} className="text-slate-500 hover:text-white transition"><i className="fas fa-step-forward"></i></button>
                                    <button onClick={() => setCurrentStepIdx(steps.length - 1)} className="text-slate-500 hover:text-white transition"><i className="fas fa-fast-forward"></i></button>
                                </div>

                                {/* 进度条与速度 */}
                                <div className="w-1/3 flex flex-col space-y-2">
                                    <input 
                                        type="range" 
                                        min="0" 
                                        max={steps.length - 1} 
                                        value={currentStepIdx} 
                                        onChange={(e) => { setIsPlaying(false); setCurrentStepIdx(parseInt(e.target.value)); }}
                                        className="w-full h-1.5 bg-slate-700 rounded-lg appearance-none slider-thumb outline-none"
                                    />
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs text-slate-500">进度拉动</span>
                                        <div className="flex items-center space-x-2">
                                            <span className="text-xs text-slate-500">慢</span>
                                            <input 
                                                type="range" min="1" max="100" 
                                                value={101 - speed} 
                                                onChange={(e) => setSpeed(101 - parseInt(e.target.value))}
                                                className="w-16 h-1 bg-slate-700 rounded-lg appearance-none slider-thumb outline-none"
                                            />
                                            <span className="text-xs text-slate-500">快</span>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
