<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Karatsuba 大整数乘法单步可视化</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    canvas { display: block; margin: 0 auto; background-color: #f8fafc; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
  </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 p-6">
  <div id="root" class="max-w-6xl mx-auto"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Karatsuba 算法及 Trace 追踪引擎 ---
    function generateKaratsubaTrace(num1Str, num2Str) {
      const trace = [];
      const nodes = {};
      let idCounter = 1;

      // 构建初始树并记录所有步骤
      function run(x, y, parentId = null, label = 'Root') {
        const id = idCounter++;
        const node = { id, x, y, parentId, label, children: [], status: 'PENDING', result: null };
        nodes[id] = node;
        if (parentId) nodes[parentId].children.push(id);

        trace.push({ type: 'ENTER', id, x, y });

        // 递归终止条件
        if (x.length === 1 && y.length === 1) {
          const res = (BigInt(x) * BigInt(y)).toString();
          trace.push({ type: 'CALC_BASE', id, res });
          trace.push({ type: 'RETURN', id, res });
          return res;
        }

        // 补齐长度（偶数位）
        let len = Math.max(x.length, y.length);
        if (len % 2 !== 0) len++;
        const paddedX = x.padStart(len, '0');
        const paddedY = y.padStart(len, '0');

        const m = len / 2;
        const x1 = paddedX.substring(0, m);
        const x0 = paddedX.substring(m);
        const y1 = paddedY.substring(0, m);
        const y0 = paddedY.substring(m);

        trace.push({ type: 'SPLIT', id, x1, x0, y1, y0, m });

        const z2 = run(x1, y1, id, 'Z2 (高位乘积)');
        const z0 = run(x0, y0, id, 'Z0 (低位乘积)');

        const sumX = (BigInt(x1) + BigInt(x0)).toString();
        const sumY = (BigInt(y1) + BigInt(y0)).toString();
        const z1 = run(sumX, sumY, id, 'Z1 (交叉和乘积)');

        trace.push({ type: 'COMBINE', id, z2, z1, z0, m });

        // 计算结果 = z2 * 10^(2m) + (z1 - z2 - z0) * 10^m + z0
        const z2_val = BigInt(z2);
        const z1_val = BigInt(z1);
        const z0_val = BigInt(z0);
        const mid_val = z1_val - z2_val - z0_val;
        
        // 修复：避免使用 ** 运算符以免被 Babel 错误转译为不兼容 BigInt 的 Math.pow
        const powLen = BigInt("1" + "0".repeat(len));
        const powM = BigInt("1" + "0".repeat(m));
        const term1 = z2_val * powLen;
        const term2 = mid_val * powM;
        const res = (term1 + term2 + z0_val).toString();

        trace.push({ type: 'RETURN', id, res });
        return res;
      }

      const finalRes = run(num1Str, num2Str);
      return { trace, nodes, finalRes };
    }

    // --- 树布局计算引擎 ---
    function calculateTreeLayout(nodesMap, canvasWidth, canvasHeight) {
      const rootNode = Object.values(nodesMap).find(n => n.parentId === null);
      if (!rootNode) return {};

      const layout = {};
      const depths = {};
      let maxDepth = 0;

      // 1. 计算深度
      function calcDepth(nodeId, depth) {
        depths[nodeId] = depth;
        maxDepth = Math.max(maxDepth, depth);
        nodesMap[nodeId].children.forEach(childId => calcDepth(childId, depth + 1));
      }
      calcDepth(rootNode.id, 0);

      // 2. 给叶子节点分配水平排序，然后父节点居中
      let leafIndex = 0;
      function assignX(nodeId) {
        const node = nodesMap[nodeId];
        if (node.children.length === 0) {
          layout[nodeId] = { logicalX: leafIndex++ };
        } else {
          node.children.forEach(assignX);
          const childrenX = node.children.map(c => layout[c].logicalX);
          layout[nodeId] = { logicalX: childrenX.reduce((a, b) => a + b, 0) / childrenX.length };
        }
      }
      assignX(rootNode.id);

      // 3. 映射到 Canvas 实际坐标
      const marginY = 80;
      const marginX = 60;
      const usableWidth = canvasWidth - marginX * 2;
      const stepY = maxDepth > 0 ? (canvasHeight - marginY * 2) / maxDepth : 0;
      const totalLeaves = leafIndex;
      const stepX = totalLeaves > 1 ? usableWidth / (totalLeaves - 1) : usableWidth / 2;

      for (const id in layout) {
        layout[id].x = marginX + layout[id].logicalX * stepX;
        layout[id].y = marginY + depths[id] * stepY;
      }

      return layout;
    }

    // --- React 主组件 ---
    function App() {
      const [num1, setNum1] = useState('1234');
      const [num2, setNum2] = useState('4321');
      const [simulation, setSimulation] = useState(null);
      const [currentStep, setCurrentStep] = useState(0);
      const canvasRef = useRef(null);

      // 初始化模拟数据
      const startSimulation = () => {
        if (!num1 || !num2 || isNaN(num1) || isNaN(num2)) {
          alert('请输入有效数字');
          return;
        }
        const { trace, nodes, finalRes } = generateKaratsubaTrace(num1, num2);
        const layout = calculateTreeLayout(nodes, 1000, 600);
        setSimulation({ trace, nodes, layout, finalRes });
        setCurrentStep(0);
      };

      useEffect(() => {
        startSimulation();
      }, []);

      // Canvas 渲染逻辑
      useEffect(() => {
        if (!simulation || !canvasRef.current) return;
        const ctx = canvasRef.current.getContext('2d');
        const width = canvasRef.current.width;
        const height = canvasRef.current.height;

        ctx.clearRect(0, 0, width, height);

        const { trace, nodes, layout } = simulation;

        // 根据 currentStep 构建当前树状态
        const currentState = {};
        for (const key in nodes) currentState[key] = { status: 'HIDDEN', display: '' };

        for (let i = 0; i <= currentStep; i++) {
          const stepInfo = trace[i];
          const nodeState = currentState[stepInfo.id];
          
          if (!nodeState) continue;

          switch (stepInfo.type) {
            case 'ENTER':
              nodeState.status = 'ACTIVE';
              nodeState.display = `${stepInfo.x} × ${stepInfo.y}`;
              break;
            case 'SPLIT':
              nodeState.status = 'SPLITTING';
              break;
            case 'CALC_BASE':
              nodeState.status = 'CALCULATING';
              nodeState.display = `${stepInfo.res}`;
              break;
            case 'COMBINE':
              nodeState.status = 'COMBINING';
              break;
            case 'RETURN':
              nodeState.status = 'DONE';
              nodeState.result = stepInfo.res;
              break;
          }
        }

        // 绘制连线
        Object.keys(nodes).forEach(id => {
          const node = nodes[id];
          const parentLayout = layout[id];
          const parentState = currentState[id];

          if (parentState.status !== 'HIDDEN') {
            node.children.forEach(childId => {
              const childLayout = layout[childId];
              const childState = currentState[childId];
              if (childState.status !== 'HIDDEN') {
                ctx.beginPath();
                ctx.moveTo(parentLayout.x, parentLayout.y);
                ctx.lineTo(childLayout.x, childLayout.y);
                ctx.strokeStyle = childState.status === 'DONE' ? '#10b981' : '#94a3b8'; // 绿 or 灰
                ctx.lineWidth = 2;
                ctx.stroke();
              }
            });
          }
        });

        // 绘制节点
        const boxW = 120;
        const boxH = 50;

        Object.keys(nodes).forEach(id => {
          const state = currentState[id];
          if (state.status === 'HIDDEN') return;

          const pos = layout[id];
          const nodeDef = nodes[id];

          // 节点背景色
          let bgColor = '#ffffff';
          let borderColor = '#cbd5e1';
          
          if (state.status === 'ACTIVE' || state.status === 'SPLITTING') {
            bgColor = '#fef08a'; // 黄色 (进行中)
            borderColor = '#eab308';
          } else if (state.status === 'COMBINING') {
            bgColor = '#bfdbfe'; // 蓝色 (合并中)
            borderColor = '#3b82f6';
          } else if (state.status === 'DONE') {
            bgColor = '#bbf7d0'; // 绿色 (完成)
            borderColor = '#22c55e';
          }

          // 画矩形
          ctx.fillStyle = bgColor;
          ctx.strokeStyle = borderColor;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(pos.x - boxW/2, pos.y - boxH/2, boxW, boxH, 8);
          ctx.fill();
          ctx.stroke();

          // 写文字
          ctx.fillStyle = '#1e293b';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = 'bold 14px sans-serif';
          
          // 标签 (Z0/Z1/Z2)
          ctx.font = '10px sans-serif';
          ctx.fillStyle = '#64748b';
          ctx.fillText(nodeDef.label, pos.x, pos.y - boxH/2 - 8);
          
          // 内容
          ctx.fillStyle = '#0f172a';
          ctx.font = '14px monospace';
          if (state.status === 'DONE') {
             ctx.fillText(`= ${state.result}`, pos.x, pos.y);
          } else {
             ctx.fillText(`${nodeDef.x} × ${nodeDef.y}`, pos.x, pos.y);
          }
        });

      }, [simulation, currentStep]);

      // 控制条函数
      const nextStep = () => { if (simulation && currentStep < simulation.trace.length - 1) setCurrentStep(c => c + 1); };
      const prevStep = () => { if (currentStep > 0) setCurrentStep(c => c - 1); };
      const toEnd = () => { if (simulation) setCurrentStep(simulation.trace.length - 1); };
      const toStart = () => { setCurrentStep(0); };

      // 当前操作解释文字
      let stepDescription = "点击「下一步」开始执行";
      if (simulation && simulation.trace[currentStep]) {
        const step = simulation.trace[currentStep];
        const node = simulation.nodes[step.id];
        switch (step.type) {
          case 'ENTER':
            stepDescription = `进入运算节点: 计算 ${step.x} × ${step.y}`;
            break;
          case 'SPLIT':
            stepDescription = `拆分位数为两部分: 高位(${step.x1}, ${step.y1}), 低位(${step.x0}, ${step.y0})`;
            break;
          case 'CALC_BASE':
            stepDescription = `基础情形 (1位数字乘法): ${node.x} × ${node.y} = ${step.res}`;
            break;
          case 'COMBINE':
            stepDescription = `合并结果: Z2=${step.z2}, Z1=${step.z1}, Z0=${step.z0}。计算 (Z2 * 10^${step.m * 2}) + ((Z1-Z2-Z0) * 10^${step.m}) + Z0`;
            break;
          case 'RETURN':
            stepDescription = `节点运算完成并返回结果: ${step.res}`;
            break;
        }
      }

      return (
        <div className="bg-white p-6 rounded-xl shadow-lg border border-gray-200">
          <div className="flex flex-col md:flex-row justify-between items-center mb-6">
            <div>
              <h1 className="text-2xl font-bold text-gray-800">Karatsuba 大整数乘法演示</h1>
              <p className="text-sm text-gray-500 mt-1">请使用单步执行观察递归分治和结果合并的完整过程</p>
            </div>
            <div className="flex gap-2 mt-4 md:mt-0">
              <input type="text" value={num1} onChange={e => setNum1(e.target.value)} className="border rounded px-3 py-2 w-28 text-center font-mono" placeholder="Num 1" />
              <span className="py-2">×</span>
              <input type="text" value={num2} onChange={e => setNum2(e.target.value)} className="border rounded px-3 py-2 w-28 text-center font-mono" placeholder="Num 2" />
              <button onClick={startSimulation} className="bg-indigo-600 text-white px-4 py-2 rounded shadow hover:bg-indigo-700 transition">重新生成</button>
            </div>
          </div>

          <div className="flex justify-center items-center gap-4 bg-gray-50 p-4 rounded-lg mb-6 border border-gray-200">
            <button onClick={toStart} disabled={currentStep === 0} className="px-3 py-1 bg-white border border-gray-300 rounded disabled:opacity-50 hover:bg-gray-100">|&lt; 最前</button>
            <button onClick={prevStep} disabled={currentStep === 0} className="px-4 py-1 bg-white border border-gray-300 rounded disabled:opacity-50 hover:bg-gray-100">&lt; 上一步</button>
            <span className="text-sm font-medium w-24 text-center">
              进度: {simulation ? currentStep + 1 : 0} / {simulation ? simulation.trace.length : 0}
            </span>
            <button onClick={nextStep} disabled={simulation && currentStep === simulation.trace.length - 1} className="px-4 py-1 bg-white border border-gray-300 rounded disabled:opacity-50 hover:bg-gray-100">下一步 &gt;</button>
            <button onClick={toEnd} disabled={simulation && currentStep === simulation.trace.length - 1} className="px-3 py-1 bg-white border border-gray-300 rounded disabled:opacity-50 hover:bg-gray-100">最后 &gt;|</button>
          </div>

          <div className="mb-4 p-4 bg-blue-50 border-l-4 border-blue-500 text-blue-900 font-mono text-sm h-16 flex items-center shadow-inner rounded-r">
             {stepDescription}
          </div>

          <div className="overflow-x-auto border border-gray-200 rounded-lg shadow-inner bg-[#f8fafc]">
             <canvas ref={canvasRef} width="1000" height="600" className="w-[1000px] h-[600px]"></canvas>
          </div>
          
          <div className="mt-4 text-xs text-gray-500 flex justify-center gap-6">
            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-yellow-200 border border-yellow-500 inline-block"></span> 进入/拆分中</span>
            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-blue-200 border border-blue-500 inline-block"></span> 合并运算中</span>
            <span className="flex items-center gap-1"><span className="w-3 h-3 bg-green-200 border border-green-500 inline-block"></span> 完成已返回</span>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
