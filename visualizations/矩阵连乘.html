<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵连乘动态规划可视化</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        canvas { display: block; margin: 0 auto; background: #ffffff; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="p-6">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // 矩阵连乘算法核心逻辑及执行步骤捕获
        function computeMatrixChainSteps(P) {
            const n = P.length - 1;
            const steps = [];
            
            // 初始化空表
            let m = Array(n + 1).fill(0).map(() => Array(n + 1).fill(null));
            let s = Array(n + 1).fill(0).map(() => Array(n + 1).fill(null));

            // Base case: l = 1
            for (let i = 1; i <= n; i++) {
                m[i][i] = 0;
            }
            
            steps.push({
                type: 'init',
                m: JSON.parse(JSON.stringify(m)),
                s: JSON.parse(JSON.stringify(s)),
                desc: `初始化完成：所有单个矩阵的标量乘法次数 m[i,i] 均为 0。`
            });

            // l 为矩阵链的长度
            for (let l = 2; l <= n; l++) {
                for (let i = 1; i <= n - l + 1; i++) {
                    let j = i + l - 1;
                    m[i][j] = Infinity;
                    
                    steps.push({
                        type: 'start_cell', i, j, l,
                        m: JSON.parse(JSON.stringify(m)),
                        s: JSON.parse(JSON.stringify(s)),
                        desc: `当前计算链长 L=${l}。准备计算 m[${i},${j}] (即计算矩阵 A${i} 到 A${j} 的最小乘法次数)`
                    });

                    for (let k = i; k <= j - 1; k++) {
                        let cost = m[i][k] + m[k+1][j] + P[i-1] * P[k] * P[j];
                        let isBetter = cost < m[i][j];
                        
                        if (isBetter) {
                            m[i][j] = cost;
                            s[i][j] = k;
                        }

                        steps.push({
                            type: 'eval_k', i, j, k, cost, isBetter,
                            P_left: P[i-1], P_mid: P[k], P_right: P[j],
                            m_ik: m[i][k], m_kj: m[k+1][j],
                            m: JSON.parse(JSON.stringify(m)),
                            s: JSON.parse(JSON.stringify(s)),
                            desc: `在 k=${k} 处切分: \n代价值 = m[${i},${k}] + m[${k+1},${j}] + P[${i-1}]*P[${k}]*P[${j}] \n= ${m[i][k]} + ${m[k+1][j]} + (${P[i-1]}*${P[k]}*${P[j]}) \n= ${cost}。${isBetter ? '发现更优解！更新 m 和 s 表。' : '非最优解，跳过。'}`
                        });
                    }
                    
                    steps.push({
                        type: 'finish_cell', i, j,
                        m: JSON.parse(JSON.stringify(m)),
                        s: JSON.parse(JSON.stringify(s)),
                        desc: `完成 m[${i},${j}] 的计算。最小代价为 ${m[i][j]}，最优切分点设于 k = ${s[i][j]}`
                    });
                }
            }
            
            steps.push({
                type: 'done',
                m: JSON.parse(JSON.stringify(m)),
                s: JSON.parse(JSON.stringify(s)),
                desc: `计算结束！整体最优代价为 m[1,${n}] = ${m[1][n]}。`
            });

            return { steps, m, s };
        }

        function getOptimalParens(s, i, j) {
            if (i === j) {
                return `A${i}`;
            } else {
                return `(${getOptimalParens(s, i, s[i][j])}${getOptimalParens(s, s[i][j] + 1, j)})`;
            }
        }

        const App = () => {
            // P = [30, 35, 15, 5, 10, 20, 25] 表示 6 个矩阵
            const P = useMemo(() => [30, 35, 15, 5, 10, 20, 25], []);
            const n = P.length - 1;
            const { steps, m, s } = useMemo(() => computeMatrixChainSteps(P), [P]);
            
            const [currentStep, setCurrentStep] = useState(0);
            const [isPlaying, setIsPlaying] = useState(false);
            const canvasRef = useRef(null);

            // 自动播放逻辑
            useEffect(() => {
                let timer;
                if (isPlaying && currentStep < steps.length - 1) {
                    timer = setTimeout(() => {
                        setCurrentStep(prev => prev + 1);
                    }, 500); // 500ms 一步
                } else if (currentStep >= steps.length - 1) {
                    setIsPlaying(false);
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, steps.length]);

            // 绘制 Canvas 逻辑
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const width = canvas.width;
                const height = canvas.height;
                const stepData = steps[currentStep];

                ctx.clearRect(0, 0, width, height);

                const cellSize = 45;
                const offsetX_M = 50;
                const offsetX_S = 450;
                const offsetY = 50;

                // 绘制网格函数
                const drawGrid = (ctx, title, tableData, startX, startY, isS_Table) => {
                    ctx.fillStyle = '#111827';
                    ctx.font = 'bold 16px sans-serif';
                    ctx.fillText(title, startX, startY - 20);

                    ctx.font = '14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';

                    // 绘制表头 (i, j)
                    for (let x = 1; x <= n; x++) {
                        ctx.fillStyle = '#6b7280';
                        ctx.fillText(`j=${x}`, startX + x * cellSize - cellSize/2, startY - 10);
                        ctx.fillText(`i=${x}`, startX - 20, startY + x * cellSize - cellSize/2);
                    }

                    for (let i = 1; i <= n; i++) {
                        for (let j = 1; j <= n; j++) {
                            const x = startX + (j - 1) * cellSize;
                            const y = startY + (i - 1) * cellSize;

                            // 单元格背景颜色逻辑
                            ctx.fillStyle = '#ffffff';
                            let strokeColor = '#d1d5db';
                            let lineWidth = 1;

                            if (i <= j) {
                                if (stepData.type === 'eval_k' || stepData.type === 'start_cell' || stepData.type === 'finish_cell') {
                                    if (stepData.i === i && stepData.j === j) {
                                        ctx.fillStyle = '#fef08a'; // 黄色: 当前计算目标
                                        strokeColor = '#eab308';
                                        lineWidth = 2;
                                    } else if (stepData.type === 'eval_k' && !isS_Table) {
                                        if (stepData.i === i && stepData.k === j) {
                                            ctx.fillStyle = '#bfdbfe'; // 蓝色: 左子链
                                            strokeColor = '#3b82f6';
                                            lineWidth = 2;
                                        } else if (stepData.k + 1 === i && stepData.j === j) {
                                            ctx.fillStyle = '#bbf7d0'; // 绿色: 右子链
                                            strokeColor = '#22c55e';
                                            lineWidth = 2;
                                        }
                                    }
                                }
                            } else {
                                ctx.fillStyle = '#f3f4f6'; // 下三角为空
                            }

                            ctx.fillRect(x, y, cellSize, cellSize);
                            ctx.strokeStyle = strokeColor;
                            ctx.lineWidth = lineWidth;
                            ctx.strokeRect(x, y, cellSize, cellSize);

                            // 填充文字
                            if (i <= j) {
                                const val = tableData[i][j];
                                ctx.fillStyle = '#111827';
                                if (val !== null && val !== Infinity) {
                                    ctx.fillText(val, x + cellSize/2, y + cellSize/2);
                                } else if (val === Infinity) {
                                    ctx.fillText('∞', x + cellSize/2, y + cellSize/2);
                                }
                            }
                        }
                    }
                };

                drawGrid(ctx, "代价表 m[i,j]", stepData.m, offsetX_M, offsetY, false);
                drawGrid(ctx, "切分点表 s[i,j]", stepData.s, offsetX_S, offsetY, true);

                // 如果处于依赖计算阶段，绘制辅助连接线 (仅在 m 表上)
                if (stepData.type === 'eval_k') {
                    const targetX = offsetX_M + (stepData.j - 1) * cellSize + cellSize/2;
                    const targetY = offsetY + (stepData.i - 1) * cellSize + cellSize/2;
                    
                    const leftX = offsetX_M + (stepData.k - 1) * cellSize + cellSize/2;
                    const leftY = offsetY + (stepData.i - 1) * cellSize + cellSize/2;

                    const rightX = offsetX_M + (stepData.j - 1) * cellSize + cellSize/2;
                    const rightY = offsetY + (stepData.k + 1 - 1) * cellSize + cellSize/2;

                    ctx.beginPath();
                    ctx.moveTo(leftX, leftY);
                    ctx.lineTo(targetX, targetY);
                    ctx.moveTo(rightX, rightY);
                    ctx.lineTo(targetX, targetY);
                    ctx.strokeStyle = 'rgba(239, 68, 68, 0.5)'; // 半透明红色连线
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

            }, [currentStep, steps, n]);

            const finalParens = steps[currentStep].type === 'done' ? getOptimalParens(steps[currentStep].s, 1, n) : '计算中...';

            return (
                <div className="max-w-5xl mx-auto flex flex-col gap-6">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                        <h1 className="text-2xl font-bold text-gray-800 mb-2">矩阵连乘 (Matrix Chain Multiplication)</h1>
                        <p className="text-gray-600 mb-4">
                            输入矩阵维度数组: <code className="bg-gray-100 px-2 py-1 rounded text-blue-600">P = [{P.join(', ')}]</code><br/>
                            共有 {n} 个矩阵。
                        </p>
                        
                        <div className="flex items-center gap-4 mb-4">
                            <button onClick={() => setCurrentStep(0)} className="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">重置</button>
                            <button onClick={() => setCurrentStep(p => Math.max(0, p - 1))} disabled={currentStep === 0} className="px-4 py-2 bg-blue-50 text-blue-700 rounded hover:bg-blue-100 transition disabled:opacity-50">上一步</button>
                            <button onClick={() => setCurrentStep(p => Math.min(steps.length - 1, p + 1))} disabled={currentStep === steps.length - 1} className="px-4 py-2 bg-blue-50 text-blue-700 rounded hover:bg-blue-100 transition disabled:opacity-50">下一步</button>
                            <button onClick={() => setIsPlaying(!isPlaying)} className={`px-6 py-2 text-white rounded transition ${isPlaying ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600'}`}>
                                {isPlaying ? '暂停' : '自动播放'}
                            </button>
                            <div className="text-sm text-gray-500 flex-1 text-right">进度: {currentStep + 1} / {steps.length}</div>
                        </div>

                        <div className="w-full bg-gray-200 rounded-full h-2 mb-6">
                            <div className="bg-blue-600 h-2 rounded-full transition-all duration-300" style={{ width: `${((currentStep + 1) / steps.length) * 100}%` }}></div>
                        </div>

                        <div className="flex gap-6">
                            <div className="flex-1 bg-gray-50 border border-gray-200 rounded-lg p-4 font-mono text-sm whitespace-pre-wrap text-gray-800 min-h-[120px] flex items-center">
                                {steps[currentStep].desc}
                            </div>
                        </div>
                    </div>

                    <div className="relative border border-gray-200 rounded-xl overflow-hidden bg-white">
                        <canvas ref={canvasRef} width="800" height="380" className="w-full h-auto"></canvas>
                        
                        {/* 图例 */}
                        <div className="absolute bottom-4 left-4 bg-white/90 p-2 rounded shadow border border-gray-100 text-xs flex gap-4">
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-yellow-200 border border-yellow-500"></div> 当前目标 m[i,j]</div>
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-blue-200 border border-blue-500"></div> 左子链 m[i,k]</div>
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-green-200 border border-green-500"></div> 右子链 m[k+1,j]</div>
                        </div>
                    </div>

                    {steps[currentStep].type === 'done' && (
                        <div className="bg-green-50 border border-green-200 text-green-800 p-6 rounded-xl shadow-sm">
                            <h2 className="text-lg font-bold mb-2">计算完成</h2>
                            <p className="text-lg">最优加括号方式为: <strong className="text-2xl font-mono text-blue-700">{finalParens}</strong></p>
                            <p className="mt-2 text-sm text-green-700">最小标量乘法总次数: {steps[currentStep].m[1][n]}</p>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
