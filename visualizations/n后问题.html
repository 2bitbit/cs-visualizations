<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回溯算法可视化：N 后问题</title>
  
  <!-- 引入 Tailwind CSS (浏览器端 JIT 编译) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM (核心库) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel (用于在浏览器中实时编译 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* 简单的自定义动画补充 */
    @keyframes pulse-fast {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(0.95); }
    }
    .animate-pulse-fast {
      animation: pulse-fast 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
  
  <!-- React 应用挂载点 -->
  <div id="root"></div>

  <!-- 应用程序逻辑 -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 内联 SVG 图标组件 (替代 lucide-react) ---
    const IconPlay = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    );
    const IconPause = () => (
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
    );
    const IconSkipForward = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>
    );
    const IconSkipBack = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="19 20 9 12 19 4 19 20"></polygon><line x1="5" y1="19" x2="5" y2="5"></line></svg>
    );
    const IconRotateCcw = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
    );
    const IconFastForward = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 19 22 12 13 5 13 19"></polygon><polygon points="2 19 11 12 2 5 2 19"></polygon></svg>
    );

    // --- 主应用组件 ---
    function App() {
      const [nSize, setNSize] = useState(8);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentStepIndex, setCurrentStepIndex] = useState(0);
      const [speed, setSpeed] = useState(100);

      // 核心算法：一次性生成所有回溯步骤
      const { steps, solutionsCount } = useMemo(() => {
        const generatedSteps = [];
        const board = Array(nSize).fill(-1); 
        const cols = new Set();
        const diag1 = new Set(); 
        const diag2 = new Set(); 
        let solCount = 0;

        function backtrack(row) {
          if (row === nSize) {
            solCount++;
            generatedSteps.push({ type: 'solution', board: [...board], row: -1, col: -1, solCount });
            return;
          }

          for (let col = 0; col < nSize; col++) {
            generatedSteps.push({ type: 'try', row, col, board: [...board] });

            if (cols.has(col) || diag1.has(row - col) || diag2.has(row + col)) {
              generatedSteps.push({ type: 'conflict', row, col, board: [...board] });
              continue;
            }

            board[row] = col;
            cols.add(col);
            diag1.add(row - col);
            diag2.add(row + col);
            generatedSteps.push({ type: 'place', row, col, board: [...board] });

            backtrack(row + 1);

            board[row] = -1;
            cols.delete(col);
            diag1.delete(row - col);
            diag2.delete(row + col);
            generatedSteps.push({ type: 'backtrack', row, col, board: [...board] });
          }
        }

        backtrack(0);
        return { steps: generatedSteps, solutionsCount: solCount };
      }, [nSize]);

      // 自动播放逻辑
      useEffect(() => {
        let intervalId;
        if (isPlaying && currentStepIndex < steps.length - 1) {
          intervalId = setInterval(() => {
            setCurrentStepIndex((prev) => {
              if (prev >= steps.length - 1) {
                setIsPlaying(false);
                return prev;
              }
              return prev + 1;
            });
          }, speed);
        } else if (currentStepIndex >= steps.length - 1) {
          setIsPlaying(false);
        }
        return () => clearInterval(intervalId);
      }, [isPlaying, currentStepIndex, steps.length, speed]);

      const currentStep = steps[currentStepIndex];
      const currentBoard = currentStep ? currentStep.board : Array(nSize).fill(-1);

      // 渲染棋盘格子
      const renderSquare = (row, col) => {
        const isDark = (row + col) % 2 === 1;
        const hasQueen = currentBoard[row] === col;
        
        let highlightClass = "";
        if (currentStep && currentStep.row === row && currentStep.col === col) {
          if (currentStep.type === 'try') highlightClass = "bg-blue-400 ring-4 ring-inset ring-blue-600 z-10";
          if (currentStep.type === 'conflict') highlightClass = "bg-red-500 ring-4 ring-inset ring-red-700 z-10";
          if (currentStep.type === 'place') highlightClass = "bg-green-400 ring-4 ring-inset ring-green-600 z-10";
          if (currentStep.type === 'backtrack') highlightClass = "bg-gray-400 ring-4 ring-inset ring-gray-600 opacity-80 z-10";
        } else if (currentStep && currentStep.type === 'solution' && hasQueen) {
          highlightClass = "bg-yellow-300 animate-pulse-fast ring-4 ring-inset ring-yellow-500 z-10";
        }

        const baseClass = isDark ? "bg-amber-700" : "bg-amber-200";

        return (
          <div 
            key={`${row}-${col}`} 
            className={`relative flex items-center justify-center aspect-square ${baseClass} ${highlightClass} transition-colors duration-150`}
          >
            {hasQueen && <span className="text-2xl sm:text-4xl drop-shadow-md text-black" style={{ cursor: 'default', userSelect: 'none' }}>♛</span>}
          </div>
        );
      };

      const getStatusMessage = () => {
        if (!currentStep) return "准备就绪";
        const r = currentStep.row + 1;
        const c = currentStep.col + 1;
        switch (currentStep.type) {
          case 'try': return `尝试：在第 ${r} 行，第 ${c} 列放置皇后。`;
          case 'conflict': return `冲突：第 ${r} 行，第 ${c} 列被攻击，无法放置。`;
          case 'place': return `成功：在第 ${r} 行，第 ${c} 列放置皇后，进入下一行。`;
          case 'backtrack': return `回溯：该分支无解，撤销第 ${r} 行第 ${c} 列的皇后。`;
          case 'solution': return `找到第 ${currentStep.solCount} 个完整解！`;
          default: return "";
        }
      };

      return (
        <div className="flex flex-col items-center py-8 px-4">
          <h1 className="text-3xl font-bold mb-2">回溯算法可视化：N 后问题</h1>
          <p className="text-slate-600 mb-8 text-center max-w-2xl leading-relaxed">
            观察算法如何在每一行尝试放置皇后。当遇到冲突时，立即“剪枝”并尝试下一个位置；当一行所有位置都失败时，退回上一行（回溯）。
          </p>

          <div className="w-full max-w-5xl flex flex-col lg:flex-row gap-8 items-start justify-center">
            
            {/* 左侧：棋盘 */}
            <div className="w-full max-w-md bg-white p-5 rounded-2xl shadow-xl border border-slate-100">
              <div 
                className="grid border-4 border-amber-900 rounded overflow-hidden shadow-inner" 
                style={{ gridTemplateColumns: `repeat(${nSize}, minmax(0, 1fr))` }}
              >
                {Array.from({ length: nSize }).map((_, row) => (
                  Array.from({ length: nSize }).map((_, col) => renderSquare(row, col))
                ))}
              </div>
              
              <div className="mt-5 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-20 flex items-center font-medium shadow-sm">
                <span className="mr-3 px-2.5 py-1 bg-slate-200 text-slate-700 rounded-md font-bold">状态</span>
                <span className="text-slate-600">{getStatusMessage()}</span>
              </div>
            </div>

            {/* 右侧：控制面板 */}
            <div className="w-full max-w-md bg-white p-6 rounded-2xl shadow-xl border border-slate-100 flex flex-col gap-6">
              
              <div>
                <h2 className="text-lg font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">问题设置</h2>
                <div className="flex items-center gap-4">
                  <label className="font-medium text-slate-600">棋盘大小 (N):</label>
                  <select 
                    value={nSize}
                    onChange={(e) => {
                      setNSize(Number(e.target.value));
                      setCurrentStepIndex(0);
                      setIsPlaying(false);
                    }}
                    className="border border-slate-300 rounded-lg px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 cursor-pointer"
                  >
                    <option value={4}>4 × 4</option>
                    <option value={5}>5 × 5</option>
                    <option value={6}>6 × 6</option>
                    <option value={8}>8 × 8 (经典)</option>
                  </select>
                </div>
                <div className="text-sm text-slate-500 mt-3 bg-slate-50 p-2 rounded-lg border border-slate-100">
                  当前规模的状态空间总步数：<span className="font-mono font-bold text-slate-700">{steps.length}</span> 步
                </div>
              </div>

              <div>
                <h2 className="text-lg font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">进度与播放控制</h2>
                
                <input 
                  type="range" 
                  min={0} 
                  max={steps.length - 1} 
                  value={currentStepIndex}
                  onChange={(e) => {
                    setCurrentStepIndex(Number(e.target.value));
                    setIsPlaying(false);
                  }}
                  className="w-full accent-blue-600 mb-4 h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                />
                
                <div className="flex justify-between text-sm text-slate-600 mb-5 font-mono">
                  <span>步数: {currentStepIndex + 1} / {steps.length}</span>
                  <span>已找到解: <span className="font-bold text-blue-600">{currentStep ? currentStep.solCount || 0 : 0}</span> / {solutionsCount}</span>
                </div>

                <div className="flex items-center justify-center gap-3">
                  <button 
                    onClick={() => { setCurrentStepIndex(0); setIsPlaying(false); }}
                    className="p-2.5 rounded-full hover:bg-slate-100 text-slate-600 transition duration-200"
                    title="重置"
                  >
                    <IconRotateCcw />
                  </button>
                  <button 
                    onClick={() => { setIsPlaying(false); setCurrentStepIndex(Math.max(0, currentStepIndex - 1)); }}
                    className="p-2.5 rounded-full hover:bg-slate-100 text-slate-600 transition duration-200"
                    title="上一步"
                  >
                    <IconSkipBack />
                  </button>
                  <button 
                    onClick={() => setIsPlaying(!isPlaying)}
                    className="p-4 rounded-full bg-blue-600 hover:bg-blue-700 text-white shadow-lg hover:shadow-blue-500/30 transition-all duration-200 transform hover:scale-105"
                    title={isPlaying ? "暂停" : "播放"}
                  >
                    {isPlaying ? <IconPause /> : <span className="pl-1 flex"><IconPlay /></span>}
                  </button>
                  <button 
                    onClick={() => { setIsPlaying(false); setCurrentStepIndex(Math.min(steps.length - 1, currentStepIndex + 1)); }}
                    className="p-2.5 rounded-full hover:bg-slate-100 text-slate-600 transition duration-200"
                    title="下一步"
                  >
                    <IconSkipForward />
                  </button>
                  <button 
                    onClick={() => {
                      const nextSolutionIndex = steps.findIndex((s, idx) => idx > currentStepIndex && s.type === 'solution');
                      if (nextSolutionIndex !== -1) {
                        setCurrentStepIndex(nextSolutionIndex);
                        setIsPlaying(false);
                      }
                    }}
                    className="p-2.5 rounded-full hover:bg-slate-100 text-slate-600 transition duration-200"
                    title="跳到下一个解"
                  >
                    <IconFastForward />
                  </button>
                </div>
              </div>

              <div>
                <h2 className="text-lg font-bold text-slate-800 mb-3 border-b border-slate-100 pb-2">播放速度</h2>
                <div className="flex items-center gap-4 bg-slate-50 p-3 rounded-xl border border-slate-100">
                  <span className="text-sm font-medium text-slate-500">慢</span>
                  <input 
                    type="range" 
                    min={10} 
                    max={500} 
                    step={10}
                    value={510 - speed}
                    onChange={(e) => setSpeed(510 - Number(e.target.value))}
                    className="w-full accent-slate-400 h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer"
                  />
                  <span className="text-sm font-medium text-slate-500">快</span>
                </div>
              </div>

              <div className="mt-2 text-xs text-slate-500 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100">
                <strong className="text-slate-700 block mb-2">图例说明：</strong>
                <div className="grid grid-cols-2 gap-2">
                  <span className="flex items-center"><span className="w-3 h-3 bg-blue-400 ring-2 ring-blue-600 rounded-sm inline-block mr-2"></span> 尝试放置</span>
                  <span className="flex items-center"><span className="w-3 h-3 bg-red-500 ring-2 ring-red-700 rounded-sm inline-block mr-2"></span> 发生冲突</span>
                  <span className="flex items-center"><span className="w-3 h-3 bg-green-400 ring-2 ring-green-600 rounded-sm inline-block mr-2"></span> 放置成功</span>
                  <span className="flex items-center"><span className="w-3 h-3 bg-gray-400 ring-2 ring-gray-600 rounded-sm inline-block mr-2"></span> 撤销(回溯)</span>
                  <span className="flex items-center col-span-2 mt-1"><span className="w-3 h-3 bg-yellow-300 ring-2 ring-yellow-500 rounded-sm inline-block mr-2 animate-pulse-fast"></span> 找到完整解</span>
                </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // 渲染应用到 DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
