<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪心算法 - 活动安排问题可视化</title>
    <!-- 加载 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 加载 Babel -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 加载 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; color: #1f2937; }
        canvas { display: block; width: 100%; height: auto; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 初始的复杂数据集
        const rawActivities = [
            { id: 'A', start: 1, finish: 4 },
            { id: 'B', start: 3, finish: 5 },
            { id: 'C', start: 0, finish: 6 },
            { id: 'D', start: 5, finish: 7 },
            { id: 'E', start: 3, finish: 9 },
            { id: 'F', start: 5, finish: 9 },
            { id: 'G', start: 6, finish: 10 },
            { id: 'H', start: 8, finish: 11 },
            { id: 'I', start: 8, finish: 12 },
            { id: 'J', start: 2, finish: 14 },
            { id: 'K', start: 12, finish: 16 }
        ];

        const App = () => {
            const canvasRef = useRef(null);
            
            // 状态管理
            const [activities, setActivities] = useState([...rawActivities]);
            const [isSorted, setIsSorted] = useState(false);
            const [step, setStep] = useState(-1); // -1: 未开始, 0~N-1: 正在评估对应索引的活动, N: 结束
            const [selectedIds, setSelectedIds] = useState(new Set());
            const [rejectedIds, setRejectedIds] = useState(new Set());
            const [lastFinishTime, setLastFinishTime] = useState(0);
            const [logs, setLogs] = useState(["初始化完成：显示所有活动。等待按照结束时间排序。"]);

            const MAX_TIME = 16;
            const PADDING_X = 60;
            const PADDING_Y = 40;
            const ROW_HEIGHT = 35;

            // 绘制 Canvas
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                
                // 设置内部高分辨率尺寸
                const width = 800;
                const height = PADDING_Y * 2 + activities.length * ROW_HEIGHT;
                
                canvas.width = width * dpr;
                canvas.height = height * dpr;
                ctx.scale(dpr, dpr);

                // 清空画布
                ctx.clearRect(0, 0, width, height);

                const chartWidth = width - PADDING_X * 2;
                const timeScale = chartWidth / MAX_TIME;

                // 绘制时间轴网格和标签
                ctx.beginPath();
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 1;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.font = '12px sans-serif';
                ctx.fillStyle = '#6b7280';

                for (let t = 0; t <= MAX_TIME; t++) {
                    const x = PADDING_X + t * timeScale;
                    ctx.moveTo(x, PADDING_Y - 10);
                    ctx.lineTo(x, height - PADDING_Y + 10);
                    ctx.fillText(t.toString(), x, height - PADDING_Y + 15);
                }
                ctx.stroke();

                // 绘制活动条块
                ctx.textBaseline = 'middle';
                activities.forEach((act, index) => {
                    const y = PADDING_Y + index * ROW_HEIGHT;
                    const xStart = PADDING_X + act.start * timeScale;
                    const blockWidth = (act.finish - act.start) * timeScale;

                    // 判断颜色
                    let fillColor = '#d1d5db'; // 默认灰
                    let strokeColor = '#9ca3af';
                    
                    if (isSorted) fillColor = '#bfdbfe'; // 排序后默认浅蓝

                    if (step === index) {
                        fillColor = '#fde047'; // 正在评估，高亮黄色
                        strokeColor = '#eab308';
                    } else if (selectedIds.has(act.id)) {
                        fillColor = '#86efac'; // 选中，绿色
                        strokeColor = '#22c55e';
                    } else if (rejectedIds.has(act.id)) {
                        fillColor = '#fca5a5'; // 拒绝，红色
                        strokeColor = '#ef4444';
                    }

                    // 绘制矩形
                    ctx.fillStyle = fillColor;
                    ctx.strokeStyle = strokeColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.roundRect(xStart, y, blockWidth, ROW_HEIGHT - 10, 4);
                    ctx.fill();
                    ctx.stroke();

                    // 绘制文字
                    ctx.fillStyle = '#111827';
                    ctx.font = 'bold 12px sans-serif';
                    ctx.fillText(`${act.id} [${act.start}, ${act.finish}]`, xStart + 10, y + (ROW_HEIGHT - 10) / 2);
                });

                // 绘制当前 lastFinishTime 参考线
                if (step >= 0 && lastFinishTime > 0) {
                    const xLine = PADDING_X + lastFinishTime * timeScale;
                    ctx.beginPath();
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.moveTo(xLine, PADDING_Y - 20);
                    ctx.lineTo(xLine, height - PADDING_Y + 10);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#ef4444';
                    ctx.fillText(`最后结束时间: ${lastFinishTime}`, xLine, PADDING_Y - 25);
                }

            }, [activities, isSorted, step, selectedIds, rejectedIds, lastFinishTime]);

            // 操作逻辑
            const handleSort = () => {
                const sorted = [...activities].sort((a, b) => a.finish - b.finish);
                setActivities(sorted);
                setIsSorted(true);
                addLog("执行步骤 1：已将所有活动按照『结束时间』从小到大排序。现在可以开始单步执行。");
            };

            const handleNextStep = () => {
                if (!isSorted) {
                    alert("请先按照结束时间排序！");
                    return;
                }

                if (step >= activities.length - 1) {
                    if (step === activities.length - 1) {
                         setStep(activities.length);
                         addLog("所有活动评估完毕！贪心算法执行结束。");
                    }
                    return;
                }

                const nextStep = step + 1;
                const act = activities[nextStep];
                
                // 评估逻辑
                if (act.start >= lastFinishTime) {
                    // 选择
                    setSelectedIds(prev => new Set(prev).add(act.id));
                    setLastFinishTime(act.finish);
                    addLog(`评估活动 ${act.id} [${act.start}, ${act.finish}]：其开始时间 (${act.start}) >= 当前最后结束时间 (${lastFinishTime})。✅ 接受该活动，并将最后结束时间更新为 ${act.finish}。`);
                } else {
                    // 拒绝
                    setRejectedIds(prev => new Set(prev).add(act.id));
                    addLog(`评估活动 ${act.id} [${act.start}, ${act.finish}]：其开始时间 (${act.start}) < 当前最后结束时间 (${lastFinishTime})。❌ 产生冲突，拒绝该活动。`);
                }
                
                setStep(nextStep);
            };

            const handleReset = () => {
                setActivities([...rawActivities]);
                setIsSorted(false);
                setStep(-1);
                setSelectedIds(new Set());
                setRejectedIds(new Set());
                setLastFinishTime(0);
                setLogs(["系统已重置。等待按照结束时间排序。"]);
            };

            const addLog = (msg) => {
                setLogs(prev => [msg, ...prev]);
            };

            return (
                <div className="max-w-6xl mx-auto bg-white rounded-xl shadow-lg p-6">
                    <h1 className="text-2xl font-bold mb-2">贪心算法：活动安排问题可视化</h1>
                    <p className="text-gray-600 mb-6">目标：在同一条时间线上，选出最大数量且互不重叠的活动。核心逻辑：优先选择<b>结束最早</b>的活动。</p>
                    
                    <div className="flex flex-wrap gap-4 mb-6">
                        <button 
                            onClick={handleSort} 
                            disabled={isSorted}
                            className={`px-4 py-2 rounded-lg font-medium text-white transition-colors ${isSorted ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700'}`}
                        >
                            1. 按结束时间排序
                        </button>
                        <button 
                            onClick={handleNextStep}
                            disabled={!isSorted || step >= activities.length}
                            className={`px-4 py-2 rounded-lg font-medium text-white transition-colors ${(!isSorted || step >= activities.length) ? 'bg-gray-400 cursor-not-allowed' : 'bg-amber-500 hover:bg-amber-600'}`}
                        >
                            2. 单步执行贪心评估
                        </button>
                        <button 
                            onClick={handleReset}
                            className="px-4 py-2 rounded-lg font-medium border border-gray-300 text-gray-700 hover:bg-gray-50 transition-colors"
                        >
                            重置状态
                        </button>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 border border-gray-200 rounded-lg overflow-hidden bg-gray-50">
                            <canvas ref={canvasRef} className="w-full"></canvas>
                        </div>

                        <div className="border border-gray-200 rounded-lg p-4 bg-gray-50 flex flex-col h-full max-h-[600px]">
                            <h3 className="font-bold text-lg mb-3">执行日志面板</h3>
                            <div className="flex flex-wrap gap-2 mb-4 text-sm">
                                <span className="px-2 py-1 bg-[#bfdbfe] border border-blue-300 rounded">等待评估</span>
                                <span className="px-2 py-1 bg-[#fde047] border border-yellow-500 rounded">当前评估</span>
                                <span className="px-2 py-1 bg-[#86efac] border border-green-500 rounded text-green-900">已选择</span>
                                <span className="px-2 py-1 bg-[#fca5a5] border border-red-500 rounded text-red-900">因冲突拒绝</span>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                                {logs.map((log, i) => (
                                    <div key={i} className={`p-3 rounded text-sm ${i === 0 ? 'bg-blue-50 border-l-4 border-blue-500 text-blue-900 font-medium shadow-sm' : 'bg-white border border-gray-100 text-gray-600'}`}>
                                        {log}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
